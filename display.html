<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Customer Display</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    /* ล็อกหน้าจอให้อยู่กึ่งกลางสมบูรณ์ 100% เสมอ */
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #FDFCF0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow: hidden; /* ตัดปัญหาแถบ Scroll Bar ทุกกรณี */
    }

    .container {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; width: 100%; height: 100%;
    }

    .standby-text {
      color: #B0A69D; font-size: clamp(24px, 5vmin, 32px); font-weight: bold; letter-spacing: 2px;
    }

    .active-container {
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }

    .pts-badge {
      background-color: #A3B18A; color: white; padding: 10px 40px; border-radius: 30px;
      font-size: clamp(28px, 6vmin, 40px); font-weight: 800; margin-bottom: 2vh;
      box-shadow: 0 4px 15px rgba(163, 177, 138, 0.4);
    }

    /* กล่อง QR หดขยายตามขนาดหน้าจอโดยอัตโนมัติ โดยอิงจากด้านที่แคบที่สุด (vmin) */
    .qr-wrapper {
      background: white; padding: 3vmin; border-radius: 20px;
      box-shadow: 0 10px 30px rgba(140, 122, 107, 0.15);
    }
    
    #qrcode img {
      width: 60vmin !important; height: 60vmin !important; max-width: 400px; max-height: 400px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="standby" class="standby-text">
      ☕ ยินดีต้อนรับสู่ KUB CAFE
    </div>
    
    <div id="active" class="active-container">
      <div id="pts-display" class="pts-badge">+0 แต้ม</div>
      <div class="qr-wrapper">
        <div id="qrcode"></div>
      </div>
      <div style="margin-top: 2vh; color: #8C7A6B; font-size: clamp(14px, 3vmin, 18px); font-weight: bold;">
        สแกนเพื่อสะสมแต้มผ่าน LINE
      </div>
    </div>
  </div>

  <script>
    const LIFF_URL = "https://liff.line.me/2010206186-u1XRJldq"; 
    const posChannel = new BroadcastChannel('kub_pos_channel');
    let qrGenerator = null;

    posChannel.onmessage = (event) => {
      const data = event.data;
      
      if (data.type === 'SHOW_QR') {
        document.getElementById('standby').style.display = 'none';
        document.getElementById('active').style.display = 'flex';
        document.getElementById('pts-display').innerText = `+${data.points} แต้ม`;

        const link = `${LIFF_URL}?code=${data.code}`;
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = ""; 
        
        qrGenerator = new QRCode(qrContainer, {
          text: link,
          width: 300, /* ค่าเริ่มต้น CSS vmin จะคุมขนาดจริงอีกที */
          height: 300,
          colorDark : "#4A3F35",
          colorLight : "#ffffff",
          correctLevel : QRCode.CorrectLevel.H
        });
      } 
      else if (data.type === 'CLEAR_QR') {
        document.getElementById('active').style.display = 'none';
        document.getElementById('standby').style.display = 'block';
      }
    };
  </script>
</body>
</html>
