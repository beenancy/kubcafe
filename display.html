<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Customer Display v5.1</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #FDFCF0; display: flex; align-items: center; justify-content: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden;
    }

    .container {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; width: 100%; height: 100%;
    }

    .standby-text { color: #B0A69D; font-size: clamp(24px, 5vmin, 32px); font-weight: bold; letter-spacing: 2px; }

    .active-container { display: none; flex-direction: column; align-items: center; justify-content: center; }

    .pts-badge {
      background-color: #A3B18A; color: white; padding: 10px 40px; border-radius: 30px;
      font-size: clamp(28px, 6vmin, 40px); font-weight: 800; margin-bottom: 2vh;
      box-shadow: 0 4px 15px rgba(163, 177, 138, 0.4);
    }

    .qr-wrapper {
      background: white; padding: 3vmin; border-radius: 20px; box-shadow: 0 10px 30px rgba(140, 122, 107, 0.15);
    }
    
    #qrcode img { width: 60vmin !important; height: 60vmin !important; max-width: 400px; max-height: 400px; }
  </style>
</head>
<body>

  <div class="container">
    <div id="standby" class="standby-text">☕ ยินดีต้อนรับสู่ KUB CAFE</div>
    
    <div id="active" class="active-container">
      <div id="pts-display" class="pts-badge">+0 แต้ม</div>
      <div class="qr-wrapper">
        <div id="qrcode"></div>
      </div>
      <div style="margin-top: 2vh; color: #8C7A6B; font-size: clamp(14px, 3vmin, 18px); font-weight: bold;">
        สแกนเพื่อสะสมแต้มผ่าน LINE
      </div>
    </div>
  </div>

  <script>
    const LIFF_URL = "https://liff.line.me/2010206186-u1XRJldq"; 
    const FIREBASE_PROJECT_ID = "kub-cafe-pos";
    const FIREBASE_API_KEY = "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tLE";
    
    let qrGenerator = null;
    let lastTimestamp = 0; // เก็บเวลาล่าสุดที่อัปเดต เพื่อไม่ให้หน้าจอกระพริบซ้ำๆ

    // ฟังก์ชันเช็กคำสั่งจาก Admin ผ่าน Firebase
    async function checkCloudStatus() {
      const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/system/display_state?key=${FIREBASE_API_KEY}`;
      
      try {
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          const fields = data.fields || {};
          
          const status = fields.status?.stringValue;
          const code = fields.code?.stringValue;
          const points = fields.points?.integerValue;
          const ts = fields.timestamp?.integerValue;

          // ถ้ามีการกดปุ่มใหม่ (เวลาเปลี่ยน) ถึงจะสั่งให้หน้าจอเปลี่ยนตาม
          if (ts && ts !== lastTimestamp) {
            lastTimestamp = ts;

            if (status === 'active') {
              // โชว์ QR Code
              document.getElementById('standby').style.display = 'none';
              document.getElementById('active').style.display = 'flex';
              document.getElementById('pts-display').innerText = `+${points} แต้ม`;

              const link = `${LIFF_URL}?code=${code}`;
              const qrContainer = document.getElementById("qrcode");
              qrContainer.innerHTML = ""; 
              
              qrGenerator = new QRCode(qrContainer, {
                text: link, width: 300, height: 300,
                colorDark : "#4A3F35", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
              });
            } else {
              // กลับสู่โหมดสแตนด์บาย (ล้างหน้าจอ)
              document.getElementById('active').style.display = 'none';
              document.getElementById('standby').style.display = 'block';
            }
          }
        }
      } catch (e) {
        // หากเชื่อมต่อเน็ตไม่ได้ ให้เช็กเงียบๆ ต่อไป
      }
    }

    // วิ่งเช็กระบบคลาวด์ทุกๆ 2 วินาที
    setInterval(checkCloudStatus, 2000);
  </script>
</body>
</html>
