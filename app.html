  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap');
    
    :root { 
      --bg-cream: #FDFCF0; 
      --matcha: #A3B18A; 
      --matcha-dark: #7A8B62; 
      --text-main: #4A3F35; 
      --text-light: #B0A69D; 
      --border: #E8E2D9; 
      --shadow-light: #ffffff;
      --shadow-dark: #c9c4b8;
    }
    
    body, html { margin: 0; padding: 0; width: 100%; height: 100vh; font-family: 'Prompt', sans-serif; background-color: var(--bg-cream); overflow: hidden; display: flex; flex-direction: column; color: var(--text-main); }
    
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-cream); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--matcha-dark); transition: opacity 0.3s; }
    
    /* Newton's Cradle Loader */
    .newtons-cradle {
      --uib-size: 50px;
      --uib-speed: 1.2s;
      --uib-color: var(--matcha-dark);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--uib-size);
      height: var(--uib-size);
      margin-bottom: 20px;
    }
    .newtons-cradle__dot {
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
      width: 25%;
      transform-origin: center top;
    }
    .newtons-cradle__dot::after {
      content: '';
      display: block;
      width: 100%;
      height: 25%;
      border-radius: 50%;
      background-color: var(--uib-color);
    }
    .newtons-cradle__dot:first-child {
      animation: swing var(--uib-speed) linear infinite;
    }
    .newtons-cradle__dot:last-child {
      animation: swing2 var(--uib-speed) linear infinite;
    }
    @keyframes swing {
      0% { transform: rotate(0deg); animation-timing-function: ease-out; }
      25% { transform: rotate(70deg); animation-timing-function: ease-in; }
      50% { transform: rotate(0deg); animation-timing-function: linear; }
    }
    @keyframes swing2 {
      0% { transform: rotate(0deg); animation-timing-function: linear; }
      50% { transform: rotate(0deg); animation-timing-function: ease-out; }
      75% { transform: rotate(-70deg); animation-timing-function: ease-in; }
    }

    .app-content { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    
    .view-section { display: none; height: 100%; flex-direction: column; padding: 15px 15px 10px 15px; box-sizing: border-box; overflow: hidden; }
    .view-section.active { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .header-title { font-size: 20px; font-weight: 700; margin: 0 0 12px 0; color: var(--matcha-dark); text-align: center; flex-shrink: 0; }
    
    .member-card { background: linear-gradient(135deg, #A3B18A, #8b9d70); border-radius: 20px; padding: 18px 15px; color: white; text-align: center; box-shadow: 0 10px 20px rgba(163, 177, 138, 0.2); margin-bottom: 12px; flex-shrink: 0; }
    .profile-pic { width: 55px; height: 55px; border-radius: 50%; border: 2.5px solid white; object-fit: cover; margin-bottom: 6px; }
    .points-number { font-size: 42px; font-weight: 700; line-height: 1; margin: 2px 0; }
    
    .action-box { background: white; padding: 12px; border-radius: 16px; text-align: center; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.01); cursor: pointer; transition: 0.2s; }
    .action-box:active { transform: scale(0.97); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; flex-shrink: 0; }
    
    .scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }
    
    /* 🎨 Colorful Reward Card */
    .card-box { background: linear-gradient(135deg, #FFFAF0, #FFF0D4); border-radius: 16px; padding: 15px 12px; text-align: center; border: 1px solid #FFE0A3; box-shadow: 0 4px 10px rgba(230, 81, 0, 0.05); margin-bottom: 10px; }
    .card-icon { font-size: 40px; margin-bottom: 5px; }
    
    .btn-matcha { background: var(--matcha); color: white; border: none; padding: 8px; border-radius: 12px; font-weight: 600; font-family: 'Prompt'; margin-top: 10px; width: 100%; cursor: pointer; transition: 0.2s; font-size: 13px; }
    .btn-matcha:active { transform: scale(0.95); }
    .btn-matcha:disabled { background: #E8E2D9; color: var(--text-light); cursor: not-allowed; transform: none; }

    .list-header { display: flex; justify-content: space-between; padding: 10px 16px; font-size: 12px; color: var(--text-light); font-weight: 600; background: #FFFFFF; border: 1px solid var(--border); border-bottom: none; border-radius: 16px 16px 0 0; flex-shrink: 0; box-sizing: border-box; }

    .swal-btn-cancel {

    function safeSetText(id, text) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = text;
    }

    async function showMinimalAlert(iconEmoji, title, text, btnText, isError = false) {
      const html = `
        <div style="text-align: center; padding: 10px 0 5px 0;">
          <div style="font-size: 42px; margin-bottom: 10px; line-height: 1;">${iconEmoji}</div>
          <div style="color: ${isError ? '#C57B57' : '#A3B18A'}; font-size: 18px; font-weight: 800; margin-bottom: 6px;">${title}</div>
          <div style="color: #6B705C; font-size: 14px; line-height: 1.4; margin-bottom: 5px;">${text}</div>
        </div>
      `;
      await Swal.fire({
        html: html, customClass: { popup: 'custom-swal-popup', confirmButton: 'swal-btn-confirm' },
        buttonsStyling: false, confirmButtonText: btnText
      });
    }

    async function initApp() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const profile = await liff.getProfile();
        globalUserId = profile.userId; globalUserName = profile.displayName;
        document.getElementById('userProfilePic').src = profile.pictureUrl || "https://via.placeholder.com/70";

        const currentUrl = window.location.href.toLowerCase();
        let targetTab = 'home'; 
        if (currentUrl.includes('tab=rewards')) targetTab = 'rewards';
        else if (currentUrl.includes('tab=history')) targetTab = 'history';
        else if (currentUrl.includes('tab=menu') || currentUrl.includes('tab=more')) targetTab = 'menu';
        else if (currentUrl.includes('tab=promo')) targetTab = 'promo';
        
        switchTab(targetTab); 
        await fetchMemberData();

        document.getElementById('loading-overlay').style.opacity = "0";
        setTimeout(() => document.getElementById('loading-overlay').style.display = "none", 400);
      } catch (err) { showMinimalAlert('❌', 'Error', 'ไม่สามารถเชื่อมต่อ LINE ได้', 'OK', true); }
    }

    async function fetchMemberData() {
      try {
        const idToken = liff.getIDToken(); 
        const fetchUrl = `${API_URL}/api/get-member?userId=${globalUserId}&idToken=${idToken || ''}&t=${Date.now()}`;
        const res = await fetch(fetchUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bypassCache: true })
        }); 
        const result = await res.json();
        
        if (result.status === "success") {
          globalTotalPoints = result.data.totalPoints;
          globalLang = result.data.lang || "TH"; 
          document.getElementById('userPoints').innerText = globalTotalPoints;
          
          let historyData = result.data.history || [];
          historyData.sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());

          applyLanguage(); 
          renderHistory(historyData); 
        }
      } catch (err) { console.error("Fetch Data Error:", err); }
    }

    function applyLanguage() {
      try {
        const t = i18n[globalLang];
        safeSetText('txt-home-title', t.homeTitle);
        safeSetText('txt-pts-label', t.ptsLabel);
        safeSetText('txt-welcome', `${t.welcome} <span style="font-weight:bold;">${globalUserName}</span>`);
        safeSetText('txt-scan-btn', t.scanBtn);
        safeSetText('txt-go-reward-btn', t.goRewardBtn);
        safeSetText('txt-recent-history', t.recentHistory);
        safeSetText('txt-reward-title', t.rewardTitle);
        safeSetText('txt-history-title', t.historyTitle);
        safeSetText('txt-menu-title', t.menuTitle);
        safeSetText('txt-promo-title', t.promoTitle);
        safeSetText('txt-cs-2', t.comingSoon2); 
        safeSetText('txt-list-header', `<span>${t.colActivity}</span><span>${t.colPoints}</span>`);
        
        document.querySelectorAll('.text-close-btn').forEach(el => el.innerText = t.closeBtn);
        
        let rewardHtml = "";
        t.rewards.forEach(rw => {
          const isEnough = globalTotalPoints >= rw.cost;
          const btnClass = isEnough ? "btn-matcha" : "btn-matcha disabled";
          const btnAttr = isEnough ? `onclick="redeemPoints(${rw.cost}, '${rw.logName}', '${rw.name}')"` : "disabled";
          const btnText = isEnough ? t.btnRedeem : t.btnNoPts;
          
          rewardHtml += `
            <div class="card-box" style="margin-bottom: 0;">
              <div class="card-icon">${rw.icon}</div>
              <div style="font-weight: 700; font-size: 14px; color: #D97706;">${rw.name}</div>
              <div style="font-size: 11px; color: #92400E; margin-top: 3px; font-weight: 600;">${rw.req}</div>
              <button class="${btnClass}" ${btnAttr}>${btnText}</button>
            </div>
          `;
        });
        document.getElementById('rewardGridContainer').innerHTML = rewardHtml;

        // Render Menu with default 'coffee' selection upon language change
        renderMenu('coffee');

      } catch (err) { console.error(err); }
    }

    // ☕ ฟังก์ชัน Render แผงเมนูโดยรับพารามิเตอร์หมวดหมู่
    function renderMenu(category, btnElement = null) {
      if (btnElement) {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
      } else {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        const firstCatBtn = document.querySelector('.cat-btn');
        if (firstCatBtn) firstCatBtn.classList.add('active');
      }

      const t = i18n[globalLang];
      const container = document.getElementById('menuGridContainer');
      if (!container) return;
      let menuHtml = "";

      const filteredData = menuData.filter(item => item.category === category);
      
      filteredData.forEach(item => {
        const nameToDisplay = globalLang === "EN" ? item.nameEN : item.nameTH;
        const subNameToDisplay = globalLang === "EN" ? item.nameTH : item.nameEN;
        
        const hotClass = item.hot === "-" ? "price-val dash" : "price-val";
        const icedClass = item.iced === "-" ? "price-val dash" : "price-val";

        let priceBoxHtml = "";
        if (item.category === "additional") {
          priceBoxHtml = `
            <div class="price-box" style="justify-content: center;">
              <div class="price-item">
                <div class="price-label">${globalLang === "EN" ? "PRICE" : "ราคา"}</div>
                <div class="price-val">+${item.iced}</div>
              </div>
            </div>
          `;
        } else {
          priceBoxHtml = `
            <div class="price-box">
              <div class="price-item">
                <div class="price-label">${t.lblHot}</div>
                <div class="${hotClass}">${item.hot}</div>
              </div>
              <div class="price-item">
                <div class="price-label">${t.lblIced}</div>
                <div class="${icedClass}">${item.iced}</div>
              </div>
            </div>
          `;
        }

        menuHtml += `
          <div class="menu-card-item">
            <img class="menu-image" src="${item.img || 'https://via.placeholder.com/150'}" alt="${nameToDisplay}" onerror="this.src='https://via.placeholder.com/150'">
            <div class="menu-name-th">${nameToDisplay}</div>
            <div class="menu-name-en">${subNameToDisplay}</div>
            ${priceBoxHtml}
          </div>
        `;
      });

      container.innerHTML = menuHtml;
    }

    function renderHistory(historyArr) {
      try {
        const fullContainer = document.getElementById('historyContainer');
        const recentContainer = document.getElementById('recentHistoryContainer');
        const t = i18n[globalLang];
        
        if (!historyArr || historyArr.length === 0) {
          const emptyHtml = `<div style="padding: 20px; text-align: center; color: var(--text-light); font-size:13px;">${t.noHistory}</div>`;
          if (fullContainer) fullContainer.innerHTML = emptyHtml;
          if (recentContainer) recentContainer.innerHTML = emptyHtml;
          return;
        }

        let fullHtml = "";
        let recentHtml = "";

        historyArr.forEach((item, index) => {
          const d = new Date(item.timestamp);
          const dateStr = d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
          
          let icon = "☕"; let title = t.txtEarn; let ptsText = `+${item.points}`; let ptsColor = "#A3B18A";
          if (item.type === "redeem") { icon = "🎁"; title = t.txtRedeem; ptsText = `-${item.points}`; ptsColor = "#C57B57"; }
          else if (item.type === "edit") { icon = "⚙️"; title = t.txtEdit; ptsText = item.points > 0 ? `+${item.points}` : item.points; }

          const itemHtml = `
            <div class="list-item">
              <div><div style="font-weight:600; font-size:13px; color:var(--text-main);">${icon} ${title}</div><div style="font-size:11px; color:var(--text-light); margin-top:2px;">${dateStr}</div></div>
              <div style="color: ${ptsColor}; font-weight: 700; font-size: 16px;">${ptsText}</div>
            </div>
          `;
          fullHtml += itemHtml;
          if(index < 2) recentHtml += itemHtml;
        });
        
        if (fullContainer) fullContainer.innerHTML = fullHtml;
        if (recentContainer) recentContainer.innerHTML = recentHtml;

      } catch (err) { console.error(err); }
    }

    async function redeemPoints(pointsNeeded, logName, displayRewardName) {
      if (globalTotalPoints < pointsNeeded) return;
      
      const txtConfirm = globalLang === "EN" ? `Confirm to use <b style="color:#C57B57">${pointsNeeded} PTS</b><br>for ${displayRewardName}?` : `ยืนยันใช้ <b style="color:#C57B57">${pointsNeeded} แต้ม</b><br>เพื่อแลก ${displayRewardName}?`;
      const txtYes = globalLang === "EN" ? "Yes" : "ยืนยันแลก";
      const txtNo = globalLang === "EN" ? "Cancel" : "ยกเลิก";

      const confirmHtml = `
        <div style="text-align: center; padding: 10px 0 5px 0;">
          <div style="font-size: 42px; margin-bottom: 10px; line-height: 1;">❓</div>
          <div style="color: #4A3F35; font-size: 18px; font-weight: 800; margin-bottom: 6px;">${globalLang === "EN" ? 'Confirm?' : 'ยืนยันการแลก?'}</div>
          <div style="color: #6B705C; font-size: 14px; line-height: 1.4; margin-bottom: 5px;">${txtConfirm}</div>
        </div>
      `;

      const confirmResult = await Swal.fire({
        html: confirmHtml,
        showCancelButton: true,
        confirmButtonText: txtYes, cancelButtonText: txtNo, reverseButtons: true,
        customClass: { popup: 'custom-swal-popup', confirmButton: 'swal-btn-confirm', cancelButton: 'swal-btn-cancel' },
        buttonsStyling: false
      });

      if (!confirmResult.isConfirmed) return;

      Swal.fire({ title: globalLang === "EN" ? 'Processing...' : 'กำลังดำเนินการ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }, customClass: { popup: 'custom-swal-popup' }});

      try {
        const idToken = liff.getIDToken();
        const res = await fetch(`${API_URL}/api/redeem-reward`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: globalUserId, idToken: idToken, customerName: globalUserName, pointsUsed: pointsNeeded, rewardName: logName })
        });
        const data = await res.json();
        
        if (data.status === "success") {
          const successHtml = `
            <div style="text-align: center; padding: 10px 0 5px 0;">
              <div style="font-size: 42px; margin-bottom: 10px; line-height: 1;">🎉</div>
              <div style="color: #A3B18A; font-size: 18px; font-weight: 800; margin-bottom: 6px;">${globalLang === "EN" ? 'Success!' : 'แลกรางวัลสำเร็จ!'}</div>
              <div style="color: #6B705C; font-size: 13px; line-height: 1.4; margin-bottom: 15px;">${globalLang === "EN" ? 'Please show this screen to staff.' : 'โปรดแสดงหน้าจอนี้ให้พนักงาน'}</div>
              <div style="background: #FDFCF0; border: 1.5px dashed #A3B18A; border-radius: 12px; padding: 10px; color: #4A3F35; font-weight: 800; font-size: 16px; letter-spacing: 1px;">
                ${data.refCode}
              </div>
            </div>
          `;
          Swal.fire({
            html: successHtml, customClass: { popup: 'custom-swal-popup', confirmButton: 'swal-btn-confirm' },
            buttonsStyling: false, confirmButtonText: 'OK'
          }).then(() => { switchTab('home'); });
          await fetchMemberData(); 
        } else { showMinimalAlert('❌', globalLang === "EN" ? 'Failed' : 'ไม่สำเร็จ', data.message, 'OK', true); }
      } catch (err) { showMinimalAlert('❌', 'Network Error', 'เครือข่ายขัดข้อง กรุณาลองใหม่', 'OK', true); }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      const targetView = document.getElementById('view-' + tabId);
      if (targetView) { targetView.classList.add('active'); } 
      else { document.getElementById('view-home').classList.add('active'); }
      window.scrollTo(0, 0); 
    }

    function openQRScanner() {
      if (liff.isApiAvailable('scanCodeV2')) {
        liff.scanCodeV2().then(result => {
          const value = result && result.value ? result.value : "";
          if (!value) return;
          if (value.startsWith("http")) { window.location.href = value; return; }
          window.location.href = `https://beenancy.github.io/kubcafe/scan.html?code=${encodeURIComponent(value)}`;
        }).catch(() => { window.location.href = "https://line.me/R/nv/QRCodeReader"; });
      } else { window.location.href = "https://line.me/R/nv/QRCodeReader"; }
    }

    function closeAppAndGoToLINE() {
      if (typeof liff !== "undefined" && liff.isInClient()) {
        liff.closeWindow();
      }
    }

    window.onload = initApp;
  </script>
</body>
</html>
