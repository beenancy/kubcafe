<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>KUB Cafe - Customer Display</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="manifest" href="manifest-display.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KUB Display">
  <meta name="theme-color" content="#FDFCF0">

  <!-- 🔤 นำเข้าฟอนต์ Google Fonts ดีไซน์สวยงามระดับพรีเมียม -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Prompt:wght@300;500;700;900&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    :root {
      --bg-cream: #FDFCF0; --card-white: #FFFFFF; --text-brown: #4A3F35;
      --text-light: #B0A69D; --matcha-green: #A3B18A; --matcha-dark: #7A8B62; --line-green: #06C755;
      --border-color: #E8E2D9;
    }

    /* 🔒 ล็อกหน้าจอ 100% ห้ามเลื่อนห้ามขยับ */
    body, html {
      margin: 0; padding: 0; 
      width: 100%; height: 100dvh; 
      background-color: var(--bg-cream);
      font-family: 'Outfit', 'Prompt', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden; /* ล็อกการเลื่อนหน้าจอ */
      -webkit-user-select: none; 
    }

    /* 📦 กรอบหลัก (Card) ที่ขยายเหลือขอบรอบนอกประมาณ 10px */
    .display-card {
      background: var(--card-white);
      width: calc(100vw - 20px);    /* เว้นขอบซ้าย-ขวา ข้างละ 10px */
      height: calc(100dvh - 20px);  /* เว้นขอบบน-ล่าง ข้างละ 10px */
      max-width: 420px;
      max-height: 680px; 
      border-radius: 28px;
      box-shadow: 0 15px 40px rgba(140, 122, 107, 0.08);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: clamp(15px, 3vh, 25px) 3px; /* บนล่างพอเหมาะ ซ้ายขวาชิดขอบการ์ด 3px */
      box-sizing: border-box;
      position: relative;
      border: 1px solid var(--border-color);
    }

    /* ⚡ ถอด Animation ออก เพื่อให้เปลี่ยนจอทันที (Instant) */
    .instant-content {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; height: 100%;
    }

    /* 1. โหมดสแตนด์บาย */
    .logo-icon { 
      font-size: clamp(45px, 11vh, 65px); 
      margin-bottom: 8px; 
      animation: floatCup 3s ease-in-out infinite; 
    }
    .cafe-name { 
      font-size: clamp(24px, 6.5vw, 30px); 
      font-weight: 900; 
      color: var(--text-brown); 
      letter-spacing: 1.5px; 
      margin-bottom: 5px; 
    }
    .cafe-desc { 
      font-size: clamp(13px, 3.5vw, 15px); 
      color: var(--text-light); 
      margin-bottom: clamp(20px, 5vh, 35px); 
      text-align: center; 
      font-weight: 300;
      line-height: 1.4;
    }
    
    .add-friend-box { 
      background: var(--bg-cream); 
      padding: clamp(12px, 3vw, 18px); 
      border-radius: 20px; 
      border: 1px dashed var(--matcha-green); 
      box-shadow: 0 4px 15px rgba(140, 122, 107, 0.03);
    }
    .add-friend-title { 
      font-size: clamp(10px, 3vw, 11px); 
      font-weight: bold; 
      color: var(--matcha-green); 
      letter-spacing: 1.5px; 
      margin-bottom: 8px; 
      text-transform: uppercase; 
      text-align: center;
    }
    .add-friend-qr { 
      width: clamp(110px, 35vmin, 140px); 
      height: clamp(110px, 35vmin, 140px); 
      border-radius: 12px; 
      display: block;
      margin: 0 auto;
    }

    /* 2. โหมดรับแต้ม / โหมด LINE */
    .badge-title { 
      color: white; 
      padding: clamp(8px, 2vh, 12px) clamp(20px, 6vw, 30px); 
      border-radius: 25px; 
      font-size: clamp(20px, 6vw, 26px); 
      font-weight: 800; 
      margin-bottom: clamp(15px, 3vh, 25px); 
      box-shadow: 0 6px 15px rgba(0,0,0,0.1); 
      text-align: center;
      line-height: 1.2;
      animation: pulseGlow 2.5s infinite ease-in-out;
      width: calc(100% - 24px); /* บีบขนาดด้านข้างไม่ให้ย้วยไปชนขอบ 3px */
      box-sizing: border-box;
    }
    .badge-matcha { background-color: var(--matcha-green); }
    .badge-line { background-color: var(--line-green); }
    .badge-blue { background-color: #0079C1; }
    .badge-orange { background-color: #FF6600; }
    
    .qr-box, .payment-qr-box { 
      background: transparent; 
      border: none; 
      margin-bottom: clamp(15px, 3vh, 25px); 
      position: relative;
      overflow: hidden; /* ล็อกกรอบให้เส้นเลเซอร์สแกนและไฟวิ่งวิ่งเฉพาะด้านใน */
      width: 100%; /* กางเต็มความกว้างการ์ด เพื่อให้ QR โค้ดใหญ่ที่สุด */
      max-width: clamp(180px, 47dvh, 340px); /* ยืดหยุ่นตามความสูงของหน้าจอ ป้องกันการล้นแนวตั้งบนจอเล็ก */
      aspect-ratio: 1/1;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 15px 35px rgba(140, 122, 107, 0.15);
      z-index: 1;
    }

    /* 🚀 เอฟเฟกต์ลูกไฟวิ่งรอบกรอบ (Rotating Border Beam) */
    .qr-box::before, .payment-qr-box::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 160%;
      height: 160%;
      transform: translate(-50%, -50%) rotate(0deg);
      animation: rotate-beam 3s linear infinite;
      z-index: -2;
    }

    /* 🎨 โทนสีไฟวิ่งตามโหมด */
    .glow-points::before {
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        transparent 40%,
        #A3B18A 45%, /* เขียวมัทฉะ */
        #FF6600 50%, /* แดงไฟแรง */
        #FFCC00 55%, /* ส้มทองสว่าง */
        transparent 60%,
        transparent 100%
      );
    }
    .glow-line::before {
      background: conic-gradient(from 0deg, transparent 40%, #06C755 45%, #ffffff 50%, #06C755 55%, transparent 60%);
    }
    .glow-bank::before {
      background: conic-gradient(from 0deg, transparent 40%, #1565C0 45%, #ffffff 50%, #1565C0 55%, transparent 60%);
    }
    .glow-true::before {
      background: conic-gradient(from 0deg, transparent 40%, #FF6600 45%, #ffffff 50%, #FF6600 55%, transparent 60%);
    }

    @keyframes rotate-beam {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .qr-box img, .payment-qr-box img, .payment-img { 
      width: calc(100% - 6px); /* หักออกฝั่งละ 3px เพื่อเว้นที่ให้กรอบไฟวิ่ง */
      height: calc(100% - 6px); 
      aspect-ratio: 1/1;
      object-fit: contain; 
      display: block;
      background: white;
      border-radius: 20px;
      padding: clamp(6px, 1.5vmin, 12px);
      box-sizing: border-box;
      z-index: 1;
    }

    
    
    .timer-pill { 
      background: #FDFCF0; 
      border: 1px solid #E8E2D9; 
      color: #C57B57; 
      padding: 6px 15px; 
      border-radius: 15px; 
      font-weight: bold; 
      font-size: clamp(12px, 3.5vw, 14px); 
      margin-bottom: 5px; 
    }
    .timer-warning { 
      font-size: clamp(10px, 3vw, 12px); 
      color: var(--text-light); 
    }
    
    .payment-img { 
      width: calc(100% - 6px) !important;
      height: calc(100% - 6px) !important;
    }
    
    /* 🥛 กรอบแจ้งเตือนโอนเงินสไตล์กระจกฝ้าโปร่งแสง (Glassmorphism) */
    .payment-note { 
      background: rgba(255, 249, 230, 0.65); 
      color: #B08D2A; 
      padding: 12px; 
      border-radius: 16px; 
      font-size: clamp(11px, 3.5vw, 13px); 
      font-weight: bold; 
      width: calc(100% - 20px); /* เว้นระยะห่างด้านข้างพอเหมาะเพื่อความสวยงาม */
      box-sizing: border-box; 
      border: 1px solid rgba(255, 235, 179, 0.8); 
      line-height: 1.4; 
      text-align: center; 
      backdrop-filter: blur(8px); 
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    .true-note { 
      background: rgba(255, 240, 230, 0.65); 
      color: #D35400; 
      border-color: rgba(255, 218, 179, 0.8); 
    }

    /* 🎞️ คีย์เฟรมแอนิเมชันถ้วยลอยเบาๆ */
    @keyframes floatCup {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* 🎞️ คีย์เฟรมแอนิเมชันปุ่มเรืองแสงชีพจรเต้น */
    @keyframes pulseGlow {
      0% { transform: scale(1); box-shadow: 0 6px 15px rgba(163, 177, 138, 0.2); }
      50% { transform: scale(1.03); box-shadow: 0 8px 25px rgba(163, 177, 138, 0.6); }
      100% { transform: scale(1); box-shadow: 0 6px 15px rgba(163, 177, 138, 0.2); }
    }

    

    /* 📱 สำหรับ iPhone 5s / SE (1st Gen) - ดึงให้อยู่กึ่งกลางจอแบบ Fix เป๊ะๆ ไม่เลื่อนไหล */
    @media (max-width: 330px) and (max-height: 570px) {
      body, html {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0; left: 0; right: 0; bottom: 0;
        overflow: hidden;
      }
      .display-card {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 548px;
        max-height: 548px;
        padding: 10px 3px;
        border-radius: 20px;
      }
      .logo-icon {
        font-size: 40px;
      }
      .cafe-name {
        font-size: 20px;
      }
      .cafe-desc {
        margin-bottom: 12px;
      }
      .add-friend-box {
        padding: 8px;
      }
      .add-friend-qr {
        width: 90px;
        height: 90px;
      }
      .qr-box, .payment-qr-box {
        width: 280px;
        height: 280px;
        max-width: 280px;
        margin-bottom: 12px;
      }
      .badge-title {
        font-size: 18px;
        padding: 6px 12px;
        margin-bottom: 12px;
      }
      .laser-scanner {
        height: 2px;
      }
    }
  </style>
</head>
<body>

  <div class="display-card" id="main-display"></div>

  <script>
    // 📱 Service Worker ลงทะเบียนให้รองรับ PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Failed!', err));
      });
    }

    const SCAN_LIFF_ID = "2010206186-u1XRJldq"; 
    const SECRET_SALT = 'KUB_SECRET_TOKEN_2026'; 
    const STORE_LINE_OA_LINK = "https://line.me/R/ti/p/@848dmzja"; 
    const PAYMENT_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/main/qr%20kshop.jpg";
    const TRUE_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/main/truescan.jpg";

    const firebaseConfig = {
      apiKey: "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tlE",
      authDomain: "kub-cafe-pos.firebaseapp.com",
      databaseURL: "https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kub-cafe-pos",
      storageBucket: "kub-cafe-pos.firebasestorage.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const displayCard = document.getElementById('main-display');
    let timerInterval;

    let lastHash = "";

    db.ref('pos_display').on('value', (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      handleStateUpdate(data);
    });

    // 🌐 ระบบเช็กอัปเดตสำรองผ่าน REST API (ทุกๆ 2.5 วินาที) เผื่อเครือข่าย WebSockets ค้าง/หลุดช่วงเครื่องสลีป
    function pollDatabaseFallback() {
      fetch("https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app/pos_display.json")
        .then(r => r.json())
        .then(data => {
          if (!data) return;
          const currentHash = `${data.mode}-${data.points}-${data.timestamp}`;
          if (currentHash !== lastHash) {
            console.log("Fallback sync updated!");
            handleStateUpdate(data);
            forceFirebaseReconnect(); // สั่งให้ท่อ WebSocket เชื่อมต่อใหม่ทันทีในเบื้องหลัง
          }
        })
        .catch(err => console.log("Database fallback poll error:", err));
    }
    setInterval(pollDatabaseFallback, 2500);

    function handleStateUpdate(data) {
      const currentHash = `${data.mode}-${data.points}-${data.timestamp}`;
      lastHash = currentHash;
      if (data.mode === "idle") {
        renderStandby();
      } else {
        renderActive(data);
      }
    }

    // 🔄 บังคับให้ระบบเชื่อมต่อใหม่ทันทีเมื่อเบราว์เซอร์ตื่นจากโหมดสลีป (Sleep) หรือเมื่อสลับกลับมาโฟกัสที่แท็บเล็ต
    function forceFirebaseReconnect() {
      try {
        db.goOffline();
        db.goOnline();
      } catch(e) {
        console.error("Firebase reconnect error:", e);
      }
    }
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") { forceFirebaseReconnect(); }
    });
    window.addEventListener("focus", forceFirebaseReconnect);

    function renderStandby() {
      clearInterval(timerInterval);
      displayCard.innerHTML = `
        <div class="instant-content">
          <div class="logo-icon">🍵</div>
          <div class="cafe-name">KUB CAFÉ</div>
          <div class="cafe-desc">ยินดีต้อนรับค่ะ<br>สั่งเครื่องดื่มและขนมได้ที่บาร์นะคะ</div>
          
          <div class="add-friend-box">
            <div class="add-friend-title">Add Line Official</div>
            <img class="add-friend-qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(STORE_LINE_OA_LINK)}">
          </div>
        </div>
      `;
    }

    function renderActive(data) {
      clearInterval(timerInterval); 
      let htmlContent = '';

      if (data.mode === "points") {
        const points = data.points;
        const timestamp = data.timestamp;
        const hash = CryptoJS.MD5(`${points}-${timestamp}-${SECRET_SALT}`).toString();
        const secretCode = `KUBBAR-${points}-${timestamp}-${hash}`; 
        const liffUrl = `https://liff.line.me/${SCAN_LIFF_ID}?code=${secretCode}`;
        
        htmlContent = `
          <div class="instant-content">
            <div class="badge-title badge-matcha">สแกนรับ +${points} แต้ม</div>
            <div class="qr-box glow-points">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(liffUrl)}">
            </div>
            <div id="timer-display" class="timer-pill">รีเฟรชใหม่ใน: 05:00</div>
            <div class="timer-warning">⚠️ คิวอาร์โค้ดรับแต้มมีอายุ 5 นาที</div>
          </div>
        `;
        startTimer(timestamp);
      } 
      else if (data.mode === "store_line") {
        htmlContent = `
          <div class="instant-content">
            <div class="badge-title badge-line">LINE Official 💬</div>
            <div class="qr-box glow-line">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(STORE_LINE_OA_LINK)}">
            </div>
            <div class="timer-warning" style="margin-top:10px;">สแกนเพื่อเพิ่มเพื่อนและดูเมนู</div>
          </div>
        `;
      } 
      else if (data.mode === "payment") {
        htmlContent = `
          <div class="instant-content">
            <div class="badge-title badge-blue">พร้อมเพย์ (PromptPay) 🌐</div>
            <div class="payment-qr-box glow-bank">
              <img src="${PAYMENT_IMAGE_URL}" class="payment-img">
            </div>
            <div class="payment-note">
              ⚠️ กรุณาใช้ <span style="color:#d35400;">"แอปธนาคาร"</span> สแกนจ่ายเท่านั้น<br>
              <span style="font-size: clamp(9px, 2.5vw, 11px); color:#888; font-weight: normal;">(สแกนด้วยแอป LINE จะดึงไปที่ LINE BK)</span>
            </div>
          </div>
        `;
      } 
      else if (data.mode === "true_payment") {
        htmlContent = `
          <div class="instant-content">
            <div class="badge-title badge-orange">TrueMoney / ทรูมันนี่ 🔸</div>
            <div class="payment-qr-box glow-true">
              <img src="${TRUE_IMAGE_URL}" class="payment-img">
            </div>
            <div class="payment-note true-note">
              🔸 รองรับสแกนผ่าน <span style="color:#ff6600;">TrueMoney</span> และแอปธนาคาร
            </div>
          </div>
        `;
      }

      displayCard.innerHTML = htmlContent;
    }

    function startTimer(startTimeMs) {
      const limitSeconds = 5 * 60; 
      
      timerInterval = setInterval(() => {
        const display = document.getElementById('timer-display');
        if (!display) return;
 
        const elapsed = Math.floor((new Date().getTime() - startTimeMs) / 1000);
        const remain = limitSeconds - elapsed;
        
        if (remain < 0) { 
          clearInterval(timerInterval); 
          renderStandby(); 
          return; 
        }
        
        let m = Math.floor(remain / 60);
        let s = remain % 60;
        display.innerText = `รีเฟรชใหม่ใน: ${m}:${s < 10 ? '0'+s : s}`;
      }, 1000);
    }
  </script>
</body>
</html>
