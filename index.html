<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>KUB Cafe - Customer Display</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FDFCF0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    /* 🎨 โทนสี Cozy Minimal */
    :root {
      --bg-cream: #FDFCF0; --card-white: #FFFFFF; --text-brown: #4A3F35;
      --text-light: #B0A69D; --matcha-green: #A3B18A; --line-green: #06C755;
      --border-color: #E8E2D9;
    }

    body, html {
      margin: 0; padding: 0; 
      width: 100%; height: 100dvh; /* ใช้ 100dvh เพื่อหักลบแถบ Safari อัตโนมัติ */
      background-color: var(--bg-cream);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden; 
      -webkit-user-select: none; /* กันลูกค้าเผลอกดคลุมดำ */
    }

    /* 📦 กรอบหลักที่ยืดหยุ่นตามหน้าจอ */
    .display-card {
      background: var(--card-white);
      width: 92vw; max-width: 420px;
      height: 94dvh; max-height: 680px; 
      border-radius: 28px;
      box-shadow: 0 15px 40px rgba(140, 122, 107, 0.1);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: clamp(15px, 4vw, 30px); /* ยืดหยุ่นขอบ */
      box-sizing: border-box;
      position: relative;
      border: 1px solid var(--border-color);
    }

    .fade-content {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    /* =========================================
       1. โหมดสแตนด์บาย
       ========================================= */
    .logo-icon { font-size: clamp(40px, 10vh, 55px); margin-bottom: 5px; }
    .cafe-name { font-size: clamp(22px, 6vw, 28px); font-weight: 900; color: var(--text-brown); letter-spacing: 1px; margin-bottom: 5px; }
    .cafe-desc { font-size: clamp(13px, 3.5vw, 15px); color: var(--text-light); margin-bottom: clamp(20px, 5vh, 40px); text-align: center; }
    
    .add-friend-box { background: var(--bg-cream); padding: clamp(10px, 3vw, 15px); border-radius: 20px; border: 1px dashed var(--matcha-green); }
    .add-friend-title { font-size: clamp(10px, 3vw, 12px); font-weight: bold; color: var(--matcha-green); letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
    .add-friend-qr { width: clamp(110px, 35vmin, 150px); height: clamp(110px, 35vmin, 150px); border-radius: 12px; }

    /* =========================================
       2. โหมดรับแต้ม / โหมด LINE
       ========================================= */
    .badge-title { 
      color: white; 
      padding: clamp(8px, 2vh, 12px) clamp(20px, 6vw, 30px); 
      border-radius: 25px; 
      font-size: clamp(20px, 6vw, 26px); /* หดตัวหนังสือลงในจอเล็ก */
      font-weight: 800; 
      margin-bottom: clamp(15px, 3vh, 25px); 
      box-shadow: 0 6px 15px rgba(0,0,0,0.1); 
      text-align: center;
      line-height: 1.2;
    }
    .badge-matcha { background-color: var(--matcha-green); }
    .badge-line { background-color: var(--line-green); }
    
    .qr-box { 
      background: white; 
      padding: clamp(10px, 3vmin, 15px); 
      border-radius: 24px; 
      border: 3px solid var(--border-color); 
      margin-bottom: clamp(15px, 3vh, 25px); 
    }
    .qr-box img { 
      width: clamp(180px, 55vmin, 260px); /* สำคัญ! ล็อก QR ให้ย่อตามหน้าจอ */
      height: clamp(180px, 55vmin, 260px); 
      object-fit: contain; 
    }
    
    .timer-pill { background: #FDFCF0; border: 1px solid #E8E2D9; color: #C57B57; padding: 6px 15px; border-radius: 15px; font-weight: bold; font-size: clamp(12px, 3.5vw, 14px); margin-bottom: 5px; }
    .timer-warning { font-size: clamp(10px, 3vw, 12px); color: var(--text-light); }

    /* =========================================
       3. โหมดจ่ายเงิน
       ========================================= */
    .payment-img { width: 100%; height: auto; max-height: 55dvh; object-fit: contain; border-radius: 20px; margin-bottom: 15px; }
    .payment-note { background: #FFF9E6; color: #B08D2A; padding: 10px; border-radius: 14px; font-size: clamp(11px, 3.5vw, 13px); font-weight: bold; width: 100%; box-sizing: border-box; border: 1px solid #FFEBB3; line-height: 1.4; text-align: center; }
    .true-note { background: #FFF0E6; color: #D35400; border-color: #FFDAB3; }
  </style>
</head>
<body>

  <div class="display-card" id="main-display"></div>

  <script>
    const SCAN_LIFF_ID = "2010206186-u1XRJldq"; 
    const SECRET_SALT = 'KUB_SECRET_TOKEN_2026'; 
    const STORE_LINE_OA_LINK = "https://line.me/R/ti/p/@848dmzja"; 
    const PAYMENT_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/eccfab9beafd7e3dbab13523292cd3cb15dbff74/qr%20kshop.jpg";
    const TRUE_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/914d5947e4c635a2bf03f3f123dd837c2b0b29a2/truescan.jpg";

    const firebaseConfig = {
      apiKey: "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tlE",
      authDomain: "kub-cafe-pos.firebaseapp.com",
      databaseURL: "https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kub-cafe-pos",
      storageBucket: "kub-cafe-pos.firebasestorage.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const displayCard = document.getElementById('main-display');
    let timerInterval;

    // 📡 รอรับคำสั่ง
    db.ref('pos_display').on('value', (snapshot) => {
      const data = snapshot.val();
      if (!data || data.mode === "idle") {
        renderStandby();
      } else {
        renderActive(data);
      }
    });

    // 🍵 1. หน้าจอ Standby
    function renderStandby() {
      clearInterval(timerInterval);
      displayCard.innerHTML = `
        <div class="fade-content">
          <div class="logo-icon">☕</div>
          <div class="cafe-name">KUB CAFÉ</div>
          <div class="cafe-desc">ยินดีต้อนรับ<br>กรุณาสั่งเครื่องดื่มที่บาร์ค่ะ</div>
          
          <div class="add-friend-box">
            <div class="add-friend-title">Add Line Official</div>
            <img class="add-friend-qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(STORE_LINE_OA_LINK)}">
          </div>
        </div>
      `;
    }

    // 🚀 2. หน้าจอ Active
    function renderActive(data) {
      clearInterval(timerInterval); 
      let htmlContent = '';

      if (data.mode === "points") {
        const points = data.points;
        const timestamp = data.timestamp;
        const hash = CryptoJS.MD5(`${points}-${timestamp}-${SECRET_SALT}`).toString();
        const secretCode = `KUBBAR-${points}-${timestamp}-${hash}`; 
        const liffUrl = `https://liff.line.me/${SCAN_LIFF_ID}?code=${secretCode}`;
        
        htmlContent = `
          <div class="fade-content">
            <div class="badge-title badge-matcha">สแกนรับ +${points} แต้ม</div>
            <div class="qr-box">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(liffUrl)}">
            </div>
            <div id="timer-display" class="timer-pill">รีเฟรชใหม่ใน: 05:00</div>
            <div class="timer-warning">⚠️ คิวอาร์โค้ดรับแต้มมีอายุ 5 นาที</div>
          </div>
        `;
        startTimer(timestamp);
      } 
      else if (data.mode === "store_line") {
        htmlContent = `
          <div class="fade-content">
            <div class="badge-title badge-line">LINE Official 💬</div>
            <div class="qr-box">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(STORE_LINE_OA_LINK)}">
            </div>
            <div class="timer-warning" style="margin-top:10px;">สแกนเพื่อเพิ่มเพื่อนและดูเมนู</div>
          </div>
        `;
      } 
      else if (data.mode === "payment") {
        htmlContent = `
          <div class="fade-content" style="justify-content: center;">
            <img src="${PAYMENT_IMAGE_URL}" class="payment-img">
            <div class="payment-note">
              ⚠️ กรุณาใช้ <span style="color:#d35400;">"แอปธนาคาร"</span> สแกนจ่ายเท่านั้น<br>
              <span style="font-size: clamp(9px, 2.5vw, 11px); color:#888; font-weight: normal;">(สแกนด้วยแอป LINE จะดึงไปที่ LINE BK)</span>
            </div>
          </div>
        `;
      } 
      else if (data.mode === "true_payment") {
        htmlContent = `
          <div class="fade-content" style="justify-content: center;">
            <img src="${TRUE_IMAGE_URL}" class="payment-img">
            <div class="payment-note true-note">
              🔸 รองรับสแกนผ่าน <span style="color:#ff6600;">TrueMoney</span> และแอปธนาคาร
            </div>
          </div>
        `;
      }

      displayCard.innerHTML = htmlContent;
    }

    // ⏱️ ระบบนับถอยหลัง
    function startTimer(startTimeMs) {
      const limitSeconds = 5 * 60; 
      
      timerInterval = setInterval(() => {
        const display = document.getElementById('timer-display');
        if (!display) return;

        const elapsed = Math.floor((new Date().getTime() - startTimeMs) / 1000);
        const remain = limitSeconds - elapsed;
        
        if (remain < 0) { 
          clearInterval(timerInterval); 
          renderStandby(); 
          return; 
        }
        
        let m = Math.floor(remain / 60);
        let s = remain % 60;
        display.innerText = `รีเฟรชใหม่ใน: ${m}:${s < 10 ? '0'+s : s}`;
      }, 1000);
    }
  </script>
</body>
</html>
