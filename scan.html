<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Cafe - Processing</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    /* 🎌 Japan Minimal Base */
    body { background-color: #F9F8F6; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0 20px; text-align: center; }
    
    .loader { border: 4px solid #EAE5D9; border-top: 4px solid #7B8D62; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    h2 { color: #3E3A37; font-size: 18px; margin: 0 0 8px 0; font-weight: 600; }
    .sub-text { font-size: 13px; color: #9A958F; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* 🎨 Japan Minimal Popup Style */
    .custom-swal-popup { 
      width: 85% !important; 
      max-width: 320px !important; 
      padding: 30px 20px 25px 20px !important; 
      border-radius: 12px !important; /* ขอบไม่มนเกินไป */
      background-color: #FFFFFF !important; 
      border: 1px solid #EAE5D9 !important;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04) !important;
    }
    
    /* 📉 ย่อขนาดไอคอนให้มินิมอล ไม่ตะโกน */
    .swal2-icon { 
      transform: scale(0.55) !important; 
      margin: -20px auto 0 auto !important; 
    }
    /* แต่งสีไอคอนให้ละมุน */
    .swal2-icon.swal2-success { border-color: #7B8D62 !important; color: #7B8D62 !important; }
    .swal2-icon.swal2-success [class^=swal2-success-line] { background-color: #7B8D62 !important; }
    .swal2-icon.swal2-success .swal2-success-ring { border-color: rgba(123, 141, 98, 0.2) !important; }
    .swal2-icon.swal2-error { border-color: #C57B57 !important; color: #C57B57 !important; }
    .swal2-icon.swal2-error [class^=swal2-x-mark-line] { background-color: #C57B57 !important; }
    
    .custom-swal-title { 
      font-size: 18px !important; 
      font-weight: 600 !important; 
      color: #3E3A37 !important; 
      margin-bottom: 15px !important;
    }
    .custom-swal-html { 
      font-size: 14px !important; 
      color: #6C6863 !important; 
      line-height: 1.5 !important; 
    }
    
    /* 🔘 ปุ่มกดสไตล์ Muji (เรียบหรู ดูแพง) */
    .custom-swal-btn { 
      font-size: 15px !important; 
      padding: 10px 0 !important; 
      border-radius: 6px !important; 
      font-weight: 500 !important; 
      letter-spacing: 0.5px !important;
      width: 100% !important; 
      background-color: #7B8D62 !important; /* สีมัทฉะ */
      color: #FFFFFF !important;
      border: none !important;
      transition: all 0.2s ease !important;
      margin-top: 5px !important;
    }
    .custom-swal-btn:active {
      transform: scale(0.97) !important;
      background-color: #6A7A53 !important;
    }
    .custom-swal-btn-error {
      background-color: #C57B57 !important; /* สีอิฐ/ชาไทย ตอน Error */
    }
    .custom-swal-btn-error:active {
      background-color: #A86646 !important;
    }
  </style>
</head>
<body>
  
  <div class="loader"></div>
  <h2 id="status-text">Processing...</h2>
  <div class="sub-text">Please wait / กรุณารอสักครู่</div>

  <script>
    const LIFF_ID = "2010206186-u1XRJldq"; 
    const API_URL = "https://kub-backend.nan23082526.workers.dev/"; 
    const lineOA_ID = "@848dmzja"; 
    
    let isProcessing = false; 

    function redirectToLINE() {
      if (liff.isInClient()) {
        liff.closeWindow(); 
      } else {
        window.location.replace("https://line.me/R/ti/p/" + lineOA_ID); 
      }
    }

    async function showAlert(title, text, icon, btnText, isError = false) {
      if (typeof Swal !== 'undefined') {
        await Swal.fire({
          title: title, 
          html: text, 
          icon: icon,
          customClass: { 
            popup: 'custom-swal-popup', 
            title: 'custom-swal-title', 
            htmlContainer: 'custom-swal-html', 
            confirmButton: isError ? 'custom-swal-btn custom-swal-btn-error' : 'custom-swal-btn' 
          },
          allowOutsideClick: false, 
          confirmButtonText: btnText,
          buttonsStyling: false 
        });
      } else {
        alert(title + "\n" + text.replace(/<[^>]*>?/gm, ''));
      }
    }

    async function processPoints() {
      if (isProcessing) return;
      isProcessing = true;

      try {
        if (!navigator.onLine) {
          await showAlert('No Internet', 'กรุณาตรวจสอบอินเทอร์เน็ตค่ะ', 'error', 'OK', true);
          redirectToLINE(); return;
        }

        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }

        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');

        if (!shopCode) {
          await showAlert('Invalid QR', 'QR Code ไม่ถูกต้องค่ะ', 'error', 'OK', true);
          redirectToLINE(); return;
        }

        const profile = await liff.getProfile();
        const cleanedName = encodeURIComponent((profile.displayName || '').replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, ''));
        
        const response = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&name=${cleanedName}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await response.json();
        
        // 🌐 เช็กภาษาที่รับมาจากสมองกล (ถ้าไม่มีให้เดาว่าเป็น TH ไว้ก่อน)
        const isEN = data.lang === "EN";
        const btnText = isEN ? 'OK' : 'ตกลง';
        
        if (data && data.status === "success") {
          const titleText = isEN ? 'Points Added' : 'สะสมแต้มสำเร็จ';
          const ptsText = `<div style="font-size:32px; font-weight:600; color:#D4A373; margin:15px 0 20px 0; line-height: 1;">+${data.ptsAdded} ${isEN ? 'PTS' : 'แต้ม'}</div>`;
          const totalLabel = isEN ? 'Total Balance:' : 'ยอดสะสมทั้งหมด:';
          const totalText = `<div style="font-size:14px; color:#6C6863; margin-bottom:20px;">${totalLabel} <span style="color:#7B8D62; font-size:16px; font-weight:600;">${data.totalPts}</span></div>`;
          
          const remarkLabel = isEN 
            ? '(Check history & redeem via menu below)' 
            : '(เช็กแต้มและแลกรางวัล ได้ที่เมนูด้านล่างในแชท)';
          const remark = `<div style="font-size:11px; color:#B4B0A9; border-top: 1px solid #F0ECE4; padding-top: 15px; margin-top: 5px;">${remarkLabel}</div>`;
          
          await showAlert(titleText, ptsText + totalText + remark, 'success', btnText, false);
          redirectToLINE(); 
          
        } else {
          // แจ้ง Error แบบแปลภาษาแล้ว
          const titleError = isEN ? 'Scan Failed' : 'สแกนไม่สำเร็จ';
          await showAlert(titleError, `${data.message || 'รหัสผ่านหรือสิทธิ์ไม่ถูกต้อง'}`, 'error', btnText, true);
          redirectToLINE();
        }

      } catch (err) {
        await showAlert('System Error', 'ระบบขัดข้อง กรุณาลองใหม่อีกครั้งค่ะ', 'error', 'OK', true);
        redirectToLINE();
      }
    }
    
    document.addEventListener("DOMContentLoaded", processPoints);
  </script>
</body>
</html>
