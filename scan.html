<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>KUB Cafe - Scan</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap');
    body { font-family: 'Prompt', sans-serif; background-color: #FDFCF0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    .loader { border: 4px solid #E8E2D9; border-left-color: #A3B18A; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .text { color: #A3B18A; font-weight: bold; font-size: 14px; }
    
    /* 🚀 สไตล์ย่อส่วน Popup ให้สั้นที่สุด (Vertically Compact) */
    .custom-swal-popup { padding: 15px !important; width: 280px !important; border-radius: 20px !important; }
    .custom-swal-title { font-size: 18px !important; margin: 5px 0 0 0 !important; padding: 0 !important; color: #4A3F35 !important; }
    .custom-swal-html { margin: 10px 0 !important; font-size: 14px !important; padding: 0 !important; }
    .swal2-icon { transform: scale(0.65); margin: 0 auto -10px auto !important; }
    .matcha-btn { background-color: #A3B18A !important; color: white !important; border-radius: 12px !important; font-family: 'Prompt' !important; font-weight: bold !important; padding: 8px 25px !important; font-size: 14px !important; margin-top: 5px !important; }
  </style>
</head>
<body>
  <div class="loader" id="spinner"></div>
  <div class="text" id="statusText">กำลังตรวจสอบคิวอาร์โค้ด...</div>

  <script>
    const API_URL = "https://kub-backend.nan23082526.workers.dev";
    const LIFF_ID_SCAN = "2010206186-u1XRJldq"; // LIFF ของหน้าสแกน

    async function initScan() {
      try {
        await liff.init({ liffId: LIFF_ID_SCAN });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const profile = await liff.getProfile();
        const userId = profile.userId;
        const displayName = profile.displayName;
        const currentUrl = new URL(window.location.href);
        const shopCode = currentUrl.searchParams.get('code');

        if (!shopCode) {
          await showAlert('เกิดข้อผิดพลาด', 'ไม่พบรหัสคิวอาร์โค้ด', 'error');
          liff.closeWindow(); return;
        }

        const res = await fetch(`${API_URL}/api/get-member?action=scanAddPoint&userId=${userId}&name=${encodeURIComponent(displayName)}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await res.json();
        
        const isEN = data.lang === "EN";

        if (data.status === "success") {
          const ptsText = `<div style="font-size:24px; color:#A3B18A; font-weight:bold; margin-bottom:5px;">+${data.ptsAdded}</div>`;
          const totalText = `<div style="color:#7A8B62; font-size:13px; margin-bottom:10px;">${isEN ? 'Total' : 'รวม'} <span style="font-size:16px; font-weight:900;">${data.totalPts}</span> ${isEN ? 'PTS' : 'แต้ม'}</div>`;
          const remarkLabel = isEN ? 'Loading Member App...' : 'พาท่านเข้าสู่หน้าเช็กแต้ม...';
          const remark = `<div style="font-size:12px; font-weight:600; color:#A3B18A; border-top: 1px dashed #E8E2D9; padding-top: 8px;">${remarkLabel}</div>`;
          
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('statusText').style.display = 'none';
          
          Swal.fire({
            icon: 'success', title: isEN ? 'SUCCESS!' : 'รับแต้มสำเร็จ', html: ptsText + totalText + remark,
            showConfirmButton: true, confirmButtonText: isEN ? 'OK' : 'ตกลง',
            customClass: { popup: 'custom-swal-popup', title: 'custom-swal-title', htmlContainer: 'custom-swal-html', confirmButton: 'matcha-btn' },
            buttonsStyling: false, timer: 2500, timerProgressBar: true
          }).then(() => { redirectToMemberApp(); });

        } else if (data.status === "cooldown") {
          await showCooldownCountdown(data.remain || 30, data.lang);
        } else {
          await showAlert(isEN ? 'Failed' : 'ไม่สำเร็จ', `${data.message}`, 'error', isEN ? 'OK' : 'ตกลง');
          liff.closeWindow();
        }
      } catch (err) {
        await showAlert('Error', 'ไม่สามารถเชื่อมต่อระบบได้', 'error', 'OK');
        liff.closeWindow();
      }
    }

    async function showCooldownCountdown(remainSec, lang) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('statusText').style.display = 'none';
      
      let timerInterval;
      const isEN = lang === "EN";
      const titleTxt = isEN ? "Please Wait" : "กรุณารอสักครู่";
      const descTxt = isEN ? "You scan too fast." : "ท่านสแกนรับแต้มไวเกินไปค่ะ";
      const secTxt = isEN ? "sec" : "วินาที";

      await Swal.fire({
        icon: 'warning', title: titleTxt,
        html: `${descTxt}<br>ลองใหม่ใน <b></b> ${secTxt}`,
        timer: remainSec * 1000, timerProgressBar: true, allowOutsideClick: false,
        customClass: { popup: 'custom-swal-popup', title: 'custom-swal-title', htmlContainer: 'custom-swal-html' },
        didOpen: () => {
          const b = Swal.getHtmlContainer().querySelector('b');
          b.textContent = remainSec;
          timerInterval = setInterval(() => { b.textContent = Math.ceil(Swal.getTimerLeft() / 1000); }, 1000);
        },
        willClose: () => { clearInterval(timerInterval); }
      });
      liff.closeWindow();
    }

    function showAlert(title, text, icon, btnText = 'ตกลง') {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('statusText').style.display = 'none';
      return Swal.fire({ 
        icon: icon, title: title, text: text, confirmButtonText: btnText,
        customClass: { popup: 'custom-swal-popup', title: 'custom-swal-title', htmlContainer: 'custom-swal-html', confirmButton: 'matcha-btn' }, buttonsStyling: false 
      });
    }

    function redirectToMemberApp() { window.location.replace(`https://liff.line.me/2010206186-p1vWfgui?tab=home`); }

    window.onload = initScan;
  </script>
</body>
</html>
