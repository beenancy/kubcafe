<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบประมวลผลแต้ม KUB Cafe</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background-color: #FDFCF0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Prompt', 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0 20px; text-align: center; }
    #loading-ui { display: flex; flex-direction: column; align-items: center; }
    .loader { border: 4px solid #E8E2D9; border-top: 4px solid #A3B18A; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    h2 { color: #4A3F35; font-size: 16px; margin: 0 0 8px 0; }
    .sub-text { font-size: 12px; color: #B0A69D; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .custom-swal-popup { width: 75% !important; max-width: 280px !important; padding: 1.5em 1.2em 1.2em !important; border-radius: 20px !important; background-color: #FFFFFF !important; box-shadow: 0 10px 25px rgba(140, 122, 107, 0.15) !important; overflow: hidden; }
    .custom-swal-title { font-size: 18px !important; font-weight: 800 !important; color: #4A3F35 !important; margin-bottom: 5px !important; }
    .custom-swal-html { font-size: 14px !important; color: #6B705C !important; line-height: 1.4 !important; }
    
    .matcha-btn { font-size: 14px !important; padding: 10px 24px !important; min-width: 120px !important; border-radius: 12px !important; font-weight: 600 !important; background-color: #A3B18A !important; color: #ffffff !important; border: none !important; box-shadow: 0 4px 10px rgba(163, 177, 138, 0.3) !important; cursor: pointer; transition: transform 0.1s; margin-top: 5px !important;}
    .matcha-btn:active { transform: scale(0.95); }
    .warning-btn { background-color: #C57B57 !important; box-shadow: 0 4px 10px rgba(197, 123, 87, 0.3) !important; }
  </style>
</head>
<body>
  <div id="loading-ui">
    <div class="loader"></div>
    <h2 id="status-text">กำลังประมวลผลแต้ม...</h2>
    <div class="sub-text">กรุณารอสักครู่ ห้ามปิดหน้าจอ</div>
  </div>

  <audio id="dingSound" src="https://assets.mixkit.co/active_storage/sfx/2218/2218-preview.mp3" preload="auto"></audio>

  <script>
    const LIFF_ID = "2010206186-u1XRJldq"; 
    const API_URL = "https://kub-backend.nan23082526.workers.dev"; 
    
    let isProcessing = false; 

    function redirectToMemberApp() {
      window.location.replace("https://beenancy.github.io/kubcafe/member.html?tab=home");
    }

    async function showAlert(title, text, icon, btnText, isWarning = false) {
      document.getElementById('loading-ui').style.display = 'none';
      await Swal.fire({
        title: title, html: text, icon: icon,
        customClass: { popup: 'custom-swal-popup', title: 'custom-swal-title', htmlContainer: 'custom-swal-html', confirmButton: isWarning ? 'matcha-btn warning-btn' : 'matcha-btn' },
        allowOutsideClick: false, confirmButtonText: btnText, buttonsStyling: false 
      });
      redirectToMemberApp();
    }

    async function showCooldownCountdown(remainSec, lang) {
      document.getElementById('loading-ui').style.display = 'none';
      let currentRemain = remainSec;
      let countdownInterval;
      const isEN = lang === "EN";
      
      await Swal.fire({
        title: isEN ? 'Wait a moment ⏱️' : 'ใจเย็นๆ น้า ⏱️',
        html: isEN ? `Next scan available in<br><span style="font-size:30px; font-weight:900; color:#A3B18A;" id="cd-timer">${currentRemain}</span> sec` : `สแกนรอบถัดไปได้ในอีก<br><span style="font-size:30px; font-weight:900; color:#A3B18A;" id="cd-timer">${currentRemain}</span> วิ`,
        icon: 'warning',
        customClass: { popup: 'custom-swal-popup', title: 'custom-swal-title', htmlContainer: 'custom-swal-html', confirmButton: 'matcha-btn warning-btn' },
        allowOutsideClick: false, showConfirmButton: true, confirmButtonText: isEN ? 'OK' : 'ตกลง', buttonsStyling: false,
        didOpen: () => {
          const timerSpan = document.getElementById('cd-timer');
          countdownInterval = setInterval(() => {
            currentRemain--;
            if (timerSpan) timerSpan.innerText = currentRemain;
            if (currentRemain <= 0) { clearInterval(countdownInterval); if (timerSpan) timerSpan.innerText = "0"; }
          }, 1000);
        },
        willClose: () => { clearInterval(countdownInterval); }
      });
      redirectToMemberApp();
    }

    async function processPoints() {
      if (isProcessing) return;
      isProcessing = true;
      try {
        if (!navigator.onLine) { await showAlert('ไม่มีเน็ต', 'กรุณาเช็กอินเทอร์เน็ตค่ะ', 'error', 'ตกลง', true); return; }
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
        
        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');
        if (!shopCode) { await showAlert('ไม่พบข้อมูล', '❌ สแกนผิดวิธีค่ะ', 'error', 'ตกลง', true); return; }
        
        const profile = await liff.getProfile();
        const cleanedName = encodeURIComponent((profile.displayName || '').replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, ''));
        const response = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&name=${cleanedName}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await response.json();
        
        const isEN = data.lang === "EN";
        
        if (data.status === "success") {
          // เสียงติ๊งสไตล์มินิมอล
          try { document.getElementById('dingSound').play().catch(()=>{}); } catch(e) {}

          const ptsText = `<div style="font-size:26px; font-weight:900; color:#A3B18A; margin:8px 0; line-height: 1;">+${data.ptsAdded} ${isEN ? 'PTS' : 'แต้ม'} ☕</div>`;
          const totalText = `<div style="font-size:14px; color:#4A3F35; font-weight:bold; margin-bottom:12px;">${isEN ? 'Total:' : 'สะสมรวม:'} <span style="color:#E65100; font-size:20px; font-weight:900;">${data.totalPts}</span> ${isEN ? 'PTS' : 'แต้ม'}</div>`;
          
          const remarkLabel = isEN ? 'Loading Member App...' : 'กำลังพาท่านเข้าสู่หน้าสมาชิก...';
          const remark = `<div style="font-size:12px; font-weight:600; color:#A3B18A; border-top: 1px dashed #E8E2D9; padding-top: 12px; margin-top: 5px;">${remarkLabel}</div>`;
          
          document.getElementById('loading-ui').style.display = 'none';
          
          Swal.fire({
            icon: 'success',
            title: isEN ? 'SUCCESS! 🎉' : 'รับแต้มสำเร็จ 🎉',
            html: ptsText + totalText + remark,
            showConfirmButton: true,
            confirmButtonText: isEN ? 'Go to App' : 'เข้าสู่หน้าสมาชิก',
            customClass: { popup: 'custom-swal-popup', title: 'custom-swal-title', htmlContainer: 'custom-swal-html', confirmButton: 'matcha-btn' },
            buttonsStyling: false,
            timer: 3000,
            timerProgressBar: true
          }).then(() => {
            redirectToMemberApp(); 
          });

        } else if (data.status === "cooldown") {
          await showCooldownCountdown(data.remain || 30, data.lang);
        } else {
          await showAlert(isEN ? 'Failed' : 'ไม่สำเร็จ', `${data.message}`, 'error', isEN ? 'OK' : 'ตกลง', true);
        }
      } catch (err) { 
        await showAlert('ระบบขัดข้อง', 'กรุณาสแกนใหม่ค่ะ', 'error', 'ตกลง', true);
      }
    }
    
    document.addEventListener("DOMContentLoaded", processPoints);
  </script>
</body>
</html>
