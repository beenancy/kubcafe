KUB Cafe - Customer Scan Frontend (V.4.5 MASTER)
Changelog: Extreme Minimal UI, Button Countdown, Enforce Deep Link, Add Haptic Feedback
======================================================

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>KUB Cafe - Scan</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #FDFCF0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    /* Newton's Cradle Loader */
    .newtons-cradle {
      --uib-size: 50px;
      --uib-speed: 1.2s;
      --uib-color: #7A8B62;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--uib-size);
      height: var(--uib-size);
      margin-bottom: 20px;
    }
    .newtons-cradle__dot {
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
      width: 25%;
      transform-origin: center top;
    }
    .newtons-cradle__dot::after {
      content: '';
      display: block;
      width: 100%;
      height: 25%;
      border-radius: 50%;
      background-color: var(--uib-color);
    }
    .newtons-cradle__dot:first-child {
      animation: swing var(--uib-speed) linear infinite;
    }
    .newtons-cradle__dot:last-child {
      animation: swing2 var(--uib-speed) linear infinite;
    }
    @keyframes swing {
      0% { transform: rotate(0deg); animation-timing-function: ease-out; }
      25% { transform: rotate(70deg); animation-timing-function: ease-in; }
      50% { transform: rotate(0deg); animation-timing-function: linear; }
    }
    @keyframes swing2 {
      0% { transform: rotate(0deg); animation-timing-function: linear; }
      50% { transform: rotate(0deg); animation-timing-function: ease-out; }
      75% { transform: rotate(-70deg); animation-timing-function: ease-in; }
    }
    .text { color: #7A8B62; font-weight: bold; font-size: 16px; margin-top: 10px; }
    
    /* 🎨 Extreme Minimal Popup Styling (Uniform Size) */
    .swal2-popup { border-radius: 20px !important; font-family: 'Prompt', sans-serif !important; padding: 1.2em 1em !important; }
    .custom-swal-popup { 
      width: 80% !important; 
      max-width: 280px !important; 
      background-color: #FFFDF9 !important; 
      box-shadow: 
        inset 4px 4px 8px #ffffff, 
        inset -4px -4px 8px rgba(180, 170, 150, 0.2), 
        0 25px 50px rgba(74, 63, 53, 0.15) !important; 
      overflow: hidden; 
      border: none !important;
      padding: 12px 10px !important;
    }
    .custom-swal-popup .swal2-title { font-size: 16px !important; margin: 0.2em 0 !important; line-height: 1.3 !important; }
    .custom-swal-popup .swal2-html-container { font-size: 13px !important; margin: 0.2em 0 !important; line-height: 1.4 !important; }
    .custom-swal-popup .swal2-icon { width: 40px !important; height: 40px !important; margin: 0.5em auto !important; border-width: 2px !important; }
    .custom-swal-popup .swal2-icon .swal2-icon-content { font-size: 24px !important; }
    .custom-swal-popup .swal2-success-ring { border-width: 2px !important; }
    .custom-swal-popup .swal2-success-line-tip { top: 22px !important; left: 6px !important; width: 12px !important; height: 3px !important; }
    .custom-swal-popup .swal2-success-line-long { top: 19px !important; right: 4px !important; width: 22px !important; height: 3px !important; }
    .custom-swal-popup .swal2-actions {
      display: flex !important;
      flex-direction: column !important;
      align-items: stretch !important;
      width: 100% !important;
      gap: 8px !important;
      margin-top: 1em !important;
    }
    .matcha-btn { 
      font-size: 14px !important; 
      padding: 10px 20px !important; 
      border-radius: 20px !important; 
      font-weight: 700 !important; 
      background-color: #7A8B62 !important; 
      color: #ffffff !important; 
      border: none !important; 
      width: 100% !important; 
      margin-top: 10px !important;
      cursor: pointer !important;
      box-shadow: 
        inset 2px 2px 4px rgba(255, 255, 255, 0.4), 
        inset -2px -2px 4px rgba(0, 0, 0, 0.1), 
        0 8px 16px rgba(122, 139, 98, 0.35) !important;
      transition: all 0.2s;
    }
    .matcha-btn:active {
      transform: scale(0.96) !important;
      box-shadow: 
        inset 4px 4px 8px rgba(0, 0, 0, 0.15), 
        inset -4px -4px 8px rgba(255, 255, 255, 0.2) !important;
    }
    .warning-btn { 
      background-color: #C57B57 !important; 
      box-shadow: 
        inset 2px 2px 4px rgba(255, 255, 255, 0.4), 
        inset -2px -2px 4px rgba(0, 0, 0, 0.1), 
        0 8px 16px rgba(197, 123, 87, 0.35) !important;
    }
    .warning-btn:active {
      box-shadow: 
        inset 4px 4px 8px rgba(0, 0, 0, 0.15), 
        inset -4px -4px 8px rgba(255, 255, 255, 0.2) !important;
    }
  </style>
</head>
<body>

  <div class="newtons-cradle" id="spinner">
    <div class="newtons-cradle__dot"></div>
    <div class="newtons-cradle__dot"></div>
    <div class="newtons-cradle__dot"></div>
    <div class="newtons-cradle__dot"></div>
  </div>
  <div class="text" id="statusText">กำลังประมวลผลรับแต้ม...</div>
  <audio id="dingSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

  <script>
    const API_URL = "https://kub-backend.nan23082526.workers.dev";
    const SCAN_LIFF_ID = "2010206186-u1XRJldq"; 

    // 🚀 ฟังก์ชันกระชากเข้า LINE OA แบบบังคับ 100%
    function closeAppAndGoToLINE() {
      window.location.href = "https://line.me/R/ti/p/@848dmzja";
    }

    // 🎨 ปรับโฉมหน้าต่างแจ้งเตือนข้อผิดพลาด/สแกนซ้ำ ให้มินิมอลและสั้นกะทัดรัด
    async function showAlert(title, text, icon, btnText, isWarning = false) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('statusText').style.display = 'none';
      
      let emoji = "&#128276;";
      if (icon === "error") emoji = "&#10060;";
      if (icon === "warning") emoji = "&#9888;&#65039;";

      const alertHtml = `
        <div style="text-align: center; padding: 10px 0 5px 0;">
          <div style="font-size: 42px; margin-bottom: 10px; line-height: 1;">${emoji}</div>
          <div style="color: #4A3F35; font-size: 18px; font-weight: 800; margin-bottom: 6px;">${title}</div>
          <div style="color: #6B705C; font-size: 14px; line-height: 1.4; margin-bottom: 5px;">${text}</div>
        </div>
      `;

      await Swal.fire({
        html: alertHtml,
        customClass: { popup: 'custom-swal-popup', confirmButton: isWarning ? 'matcha-btn warning-btn' : 'matcha-btn' },
        allowOutsideClick: false, confirmButtonText: btnText, buttonsStyling: false 
      });
      closeAppAndGoToLINE(); 
    }

    // 🎨 ปรับโฉมหน้าต่างคูลดาวน์ (หน่วงเวลาสแกนซ้ำ) ให้เป็นทรงสั้นแบบกล่องจัตุรัส เท่ากับหน้าต่างสำเร็จ
    async function showCooldownCountdown(remainSec, lang) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('statusText').style.display = 'none';
      let currentRemain = remainSec; let countdownInterval; const isEN = lang === "EN";
      
      const cooldownHtml = `
        <div style="text-align: center; padding: 10px 0 5px 0;">
          <div style="font-size: 42px; margin-bottom: 10px; line-height: 1;">&#9201;&#65039;</div>
          <div style="color: #C57B57; font-size: 18px; font-weight: 800; margin-bottom: 6px;">${isEN ? 'Wait a moment' : 'ใจเย็นๆ น้า'}</div>
          <div style="color: #6B705C; font-size: 14px; margin-bottom: 2px;">
            ${isEN ? 'Next scan available in' : 'สแกนรอบถัดไปได้ในอีก'}
          </div>
          <div style="margin-bottom: 5px;">
            <span style="font-size: 36px; font-weight: 900; color: #C57B57;" id="cd-timer">${currentRemain}</span>
            <span style="font-size: 14px; color: #B0A69D; font-weight: 600; margin-left: 2px;">${isEN ? 'sec' : 'วิ'}</span>
          </div>
        </div>
      `;

      await Swal.fire({
        html: cooldownHtml,
        customClass: { popup: 'custom-swal-popup', confirmButton: 'matcha-btn warning-btn' },
        allowOutsideClick: false, showConfirmButton: true, confirmButtonText: isEN ? 'OK' : 'ตกลง', buttonsStyling: false,
        didOpen: () => {
          const timerSpan = document.getElementById('cd-timer');
          countdownInterval = setInterval(() => {
            currentRemain--;
            if (timerSpan) timerSpan.innerText = currentRemain;
            if (currentRemain <= 0) { clearInterval(countdownInterval); if (timerSpan) timerSpan.innerText = "0"; }
          }, 1000);
        },
        willClose: () => { clearInterval(countdownInterval); }
      });
      closeAppAndGoToLINE(); 
    }

    async function processPoints() {
      try {
        if (!navigator.onLine) { await showAlert('ไม่มีเน็ต', 'กรุณาเช็กอินเทอร์เน็ตค่ะ', 'error', 'ตกลง', true); return; }
        await liff.init({ liffId: SCAN_LIFF_ID });

        // 🛡️ ป้องกันแฮกเกอร์ใช้ PC
        if (liff.getOS() === "web") {
          await showAlert('ปฏิเสธการเข้าถึง', '&#10060; กรุณาสแกนผ่านมือถือเท่านั้นค่ะ', 'error', 'ตกลง', true);
          return;
        }

        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
        
        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');
        if (!shopCode) { await showAlert('ไม่พบข้อมูล', '&#10060; สแกนผิดวิธีค่ะ', 'error', 'ตกลง', true); return; }
        
        const profile = await liff.getProfile();
        const idToken = liff.getIDToken(); 
        const cleanedName = encodeURIComponent((profile.displayName || '').replace(/[-]|���[���-���]|���[���-���]|[‑-⛿]|���[���-���]/g, ''));
        
        const response = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&idToken=${idToken || ''}&name=${cleanedName}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await response.json();
        const isEN = data.lang === "EN";
        
        if (data.status === "success") {
          // 📳 ระบบเสียงและระบบสั่นตอบสนอง (Haptic Feedback) เพื่อความพรีเมียม
          try { document.getElementById('dingSound').play().catch(()=>{}); } catch(e) {}
          try { if (navigator.vibrate) navigator.vibrate(200); } catch(e) {}

          // ✨ Extreme Minimal Custom HTML (Tight Compact layout)
          const minimalHtml = `
            <div style="text-align: center; padding: 10px 0 5px 0;">
              <div style="display: flex; align-items: flex-end; justify-content: center; gap: 5px; margin-bottom: 15px;">
                <span style="font-size: 32px; line-height: 1; margin-bottom: -4px;">&#9749;</span>
                <span style="color: #A3B18A; font-size: 56px; font-weight: 900; line-height: 1;">+${data.ptsAdded}</span>
                <span style="color: #A3B18A; font-size: 14px; font-weight: 600; padding-bottom: 5px;">${isEN ? 'PTS' : 'แต้ม'}</span>
              </div>
              <div style="background: #FDFCF0; border: 1px solid #E8E2D9; border-radius: 12px; padding: 8px 12px; display: inline-block; font-size: 14px; color: #4A3F35; margin-bottom: 10px;">
                ${isEN ? 'Total Points:' : 'คะแนนสะสมรวม:'} <span style="color: #E65100; font-size: 17px; font-weight: 900; margin-left: 4px;">${data.totalPts}</span>
              </div>
            </div>
          `;
          
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('statusText').style.display = 'none';
          
          let timerInterval;
          Swal.fire({
            html: minimalHtml,
            showConfirmButton: true, 
            confirmButtonText: isEN ? 'OK (5)' : 'ตกลง (5)',
            customClass: { popup: 'custom-swal-popup', confirmButton: 'matcha-btn' },
            buttonsStyling: false, 
            timer: 5000, // ⏱️ ตั้งเวลาไว้ที่ 5 วินาที
            timerProgressBar: false, // ❌ ปิดหลอดเวลา ให้ดูคลีน
            allowOutsideClick: false,
            didOpen: () => {
              const btn = Swal.getConfirmButton();
              timerInterval = setInterval(() => {
                const timeLeft = Math.ceil(Swal.getTimerLeft() / 1000);
                if(btn) btn.innerHTML = isEN ? `OK (${timeLeft})` : `ตกลง (${timeLeft})`;
              }, 100);
            },
            willClose: () => { clearInterval(timerInterval); }
          }).then(() => { 
            closeAppAndGoToLINE(); 
          });

        } else if (data.status === "cooldown") {
          await showCooldownCountdown(data.remain || 30, data.lang);
        } else {
          await showAlert(isEN ? 'Scan Failed' : 'สแกนไม่สำเร็จ', `${data.message}`, 'error', isEN ? 'OK' : 'ตกลง', true);
        }
      } catch (err) { 
        await showAlert('ระบบขัดข้อง', 'กรุณาสแกนใหม่ค่ะ', 'error', 'ตกลง', true);
      }
    }
    
    document.addEventListener("DOMContentLoaded", processPoints);
  </script>
</body>
</html>
