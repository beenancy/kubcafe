<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Cafe - Loading</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background-color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; padding: 0 20px; text-align: center; }
    
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #27ae60; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    h2 { color: #2d3436; font-size: 18px; margin: 0 0 10px 0; font-weight: bold; }
    .sub-text { font-size: 13px; color: #636e72; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* สไตล์ Popup แบบ Standard ชัดเจน ปุ่มกดง่าย */
    .swal-popup { padding-bottom: 25px !important; border-radius: 16px !important; }
    .swal-title { font-size: 20px !important; font-weight: 800 !important; color: #2d3436 !important; }
    .swal-content { font-size: 16px !important; color: #444 !important; }
    .swal-btn { padding: 14px 40px !important; font-size: 16px !important; font-weight: 700 !important; border-radius: 8px !important; width: 100%; }
    .btn-green { background-color: #27ae60 !important; }
    .btn-red { background-color: #e74c3c !important; }
  </style>
</head>
<body>
  
  <div class="loader"></div>
  <h2 id="status-text">Processing...</h2>
  <div class="sub-text">กรุณารอสักครู่ / Please wait</div>

  <script>
    const LIFF_ID = "2010206186-u1XRJldq"; 
    const API_URL = "https://kub-backend.nan23082526.workers.dev/"; 
    const lineOA_ID = "@848dmzja"; 
    
    let isProcessing = false; 

    function redirectToLINE() {
      if (liff.isInClient()) {
        liff.closeWindow(); 
      } else {
        window.location.replace("https://line.me/R/ti/p/" + lineOA_ID); 
      }
    }

    async function showAlert(title, text, icon, btnColor, isSuccess) {
      await Swal.fire({
        title: title, 
        html: text, 
        icon: icon,
        confirmButtonText: 'ตกลง',
        confirmButtonColor: btnColor,
        customClass: { popup: 'swal-popup', title: 'swal-title', htmlContainer: 'swal-content', confirmButton: 'swal-btn' },
        allowOutsideClick: false
      });
    }

    async function processPoints() {
      if (isProcessing) return;
      isProcessing = true;

      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }

        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');

        if (!shopCode) {
          await showAlert('Error', 'QR Code ไม่ถูกต้อง', 'error', '#e74c3c', false);
          redirectToLINE(); return;
        }

        const profile = await liff.getProfile();
        const cleanedName = encodeURIComponent((profile.displayName || '').replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, ''));
        
        const response = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&name=${cleanedName}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await response.json();
        
        // กำหนดภาษาตามที่ Server ส่งกลับมา
        const isEN = (data.lang === "EN");
        
        if (data && data.status === "success") {
          const title = isEN ? 'Success!' : 'สะสมแต้มสำเร็จ!';
          const body = `<div style="font-size:22px; font-weight:bold; margin-bottom:10px;">+${data.ptsAdded} ${isEN ? 'PTS' : 'แต้ม'}</div>
                        <div style="font-size:16px;">${isEN ? 'Total Balance:' : 'ยอดสะสมทั้งหมด:'} <b>${data.totalPts}</b></div>
                        <div style="font-size:12px; color:#999; margin-top:20px;">${isEN ? '(Check history via menu)' : '(เช็กแต้มและแลกรางวัลที่เมนูในแชท)'}</div>`;
          
          await showAlert(title, body, 'success', '#27ae60', true);
          redirectToLINE();
          
        } else {
          // แจ้ง Error ตามภาษาของ User ที่ได้จาก data.lang
          const titleError = isEN ? 'Scan Failed' : 'สแกนไม่สำเร็จ';
          await showAlert(titleError, data.message || 'รหัสไม่ถูกต้อง', 'error', '#e74c3c', false);
          redirectToLINE();
        }

      } catch (err) {
        await showAlert('System Error', 'ระบบขัดข้อง กรุณาลองใหม่อีกครั้ง', 'error', '#e74c3c', false);
        redirectToLINE();
      }
    }
    
    document.addEventListener("DOMContentLoaded", processPoints);
  </script>
</body>
</html>
