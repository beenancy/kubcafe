<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Cafe - Scan</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #FDFCF0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    .loader { border: 4px solid #E8E2D9; border-left-color: #A3B18A; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .text { color: #A3B18A; font-weight: bold; font-size: 16px; }
    .swal2-popup { border-radius: 20px !important; font-family: 'Prompt', sans-serif !important; }
  </style>
</head>
<body>

  <div class="loader" id="spinner"></div>
  <div class="text" id="statusText">กำลังประมวลผลรับแต้ม...</div>
  <audio id="dingSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

  <script>
    const API_URL = "https://kub-backend.nan23082526.workers.dev";
    
    // ⚠️ LIFF ID ของการสแกน (ใช้ตัวเดิมของคุณบี)
    const SCAN_LIFF_ID = "2010206186-u1XRJldq"; 

    // 🚀 ฟังก์ชันเด้งไปหน้าแอป Member (พร้อมระบุหน้าแรก)
    function redirectToMemberApp() {
      // ⚠️ เปลี่ยนไปที่หน้า member.html ที่อยู่ใน GitHub ของคุณบี
      window.location.replace("https://beenancy.github.io/kubcafe/member.html?tab=home");
    }

    async function initScan() {
      try {
        await liff.init({ liffId: SCAN_LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');
        
        if (!shopCode) {
          Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่พบรหัส QR', confirmButtonColor: '#C57B57' }).then(redirectToMemberApp);
          return;
        }

        const profile = await liff.getProfile();
        
        const res = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&name=${encodeURIComponent(profile.displayName)}&shopCode=${encodeURIComponent(shopCode)}`);
        const result = await res.json();

        document.getElementById('spinner').style.display = 'none';

        if (result.status === "success") {
          // เล่นเสียง ติ๊ง
          document.getElementById('dingSound').play().catch(()=>{});
          document.getElementById('statusText').innerText = "รับแต้มสำเร็จ!";
          
          // เด้ง Alert มินิมอล โชว์ 1.5 วินาทีแล้วเด้งไปหน้า member.html อัตโนมัติ
          Swal.fire({
            icon: 'success',
            title: result.lang === "EN" ? 'Success!' : 'สำเร็จ!',
            text: result.lang === "EN" ? `+${result.ptsAdded} Points` : `ได้รับ ${result.ptsAdded} แต้ม`,
            showConfirmButton: false,
            timer: 1500,
            timerProgressBar: true
          }).then(() => {
            redirectToMemberApp();
          });

        } else if (result.status === "cooldown") {
          Swal.fire({ icon: 'warning', title: 'รอสักครู่', text: `กรุณารออีก ${result.remain} วินาที ก่อนสแกนใหม่`, confirmButtonColor: '#A3B18A' }).then(redirectToMemberApp);
        } else {
          Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: result.message, confirmButtonColor: '#C57B57' }).then(redirectToMemberApp);
        }
      } catch (err) {
        document.getElementById('spinner').style.display = 'none';
        Swal.fire({ icon: 'error', title: 'เชื่อมต่อล้มเหลว', text: 'กรุณาลองใหม่อีกครั้ง', confirmButtonColor: '#C57B57' }).then(redirectToMemberApp);
      }
    }

    window.onload = initScan;
  </script>
</body>
</html>
