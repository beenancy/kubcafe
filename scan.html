<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบประมวลผลแต้ม KUB Cafe</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { background-color: #fdfdfd; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
    .loader { border: 5px solid #f3f3f3; border-top: 5px solid #c1f2a1; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    h2 { color: #2d3436; font-size: 18px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .custom-swal-title { font-size: 24px !important; font-weight: bold !important; color: #2d3436 !important; }
    .custom-swal-html { font-size: 18px !important; color: #636e72 !important; line-height: 1.5; }
    .custom-swal-btn { font-size: 16px !important; padding: 10px 30px !important; border-radius: 12px !important; font-weight: bold !important; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h2 id="status-text">กำลังประมวลผลแต้ม...</h2>
  <div style="font-size: 12px; color: #b2bec3; margin-top: 10px;">กรุณารอสักครู่ ห้ามปิดหน้าจอ</div>

  <script>
    const LIFF_ID = "2010206186-u1XRJldq"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbxpWU8NlPwIk4EChzbG93IJ0RxFf3qSbs4TDT5MSVOgVWLO3cQAYseD_xAWzOeewJvHrg/exec"; 
    const lineOA_ID = "@848dmzja"; 
    let isProcessing = false; // ป้องกันการทำสแกนเบิ้ล (Double Submissions Flag)

    async function showAlert(title, text, icon, btnColor) {
      try {
        if (typeof Swal !== 'undefined') {
          await Swal.fire({
            title: title, html: text, icon: icon, confirmButtonText: 'ตกลง', confirmButtonColor: btnColor,
            customClass: { title: 'custom-swal-title', htmlContainer: 'custom-swal-html', confirmButton: 'custom-swal-btn' },
            allowOutsideClick: false
          });
        } else {
          alert(title + "\n" + text.replace(/<[^>]*>?/gm, ''));
        }
      } catch (e) { alert(title + "\n" + text.replace(/<[^>]*>?/gm, '')); }
    }

    function redirectToLINE() {
      const lineLink = "https://line.me/R/ti/p/" + lineOA_ID;
      window.location.href = lineLink;
      setTimeout(() => {
        if (liff.isInClient()) { liff.closeWindow(); }
      }, 1000);
    }

    async function processPoints() {
      if (isProcessing) return;
      isProcessing = true;

      try {
        if (!navigator.onLine) {
          await showAlert('ไม่มีสัญญาณเน็ต', 'กรุณาตรวจสอบอินเทอร์เน็ตของมือถือค่ะ', 'error', '#ffb3b3');
          redirectToLINE(); return;
        }

        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { 
          liff.login({ redirectUri: window.location.href }); 
          return; 
        }

        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');

        if (!shopCode) {
          await showAlert('ไม่พบข้อมูลแต้ม', '❌ ข้อมูลแต้มไม่ถูกต้อง หรือสแกนผิดวิธีค่ะ', 'error', '#ffb3b3');
          redirectToLINE(); return;
        }

        // ข้อแนะนำเชิงสถาปัตยกรรม: นำโค้ดพาร์ทเช็กอายุ (hoursDiff) ไปรันในไฟล์ .gs ทั้งหมด 
        // เพราะฝั่ง Server มีเวลาที่เป็น Standard แน่นอนกว่าเครื่องปลายทางของลูกค้าแต่ละท่านครับ

        document.getElementById('status-text').innerText = "กำลังบันทึกข้อมูลเข้าสู่ระบบ...";
        const profile = await liff.getProfile();
        const cleanedName = encodeURIComponent((profile.displayName || '').replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, ''));
        
        const response = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&name=${cleanedName}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await response.json();
        
        if(data && data.status === "success") {
          await showAlert('สะสมแต้มสำเร็จ!', `☕ ${data.message}`, 'success', '#c1f2a1');
        } else {
          await showAlert('สะสมแต้มไม่สำเร็จ', `⚠️ ${data.message || 'รหัสผ่านหรือสิทธิ์ไม่ถูกต้อง'}`, 'warning', '#ffeaa7');
        }
        
        redirectToLINE();

      } catch (err) {
        console.error(err);
        alert("ระบบขัดข้องชั่วคราวค่ะ กรุณาสแกนใหม่อีกครั้งนะคะ");
        redirectToLINE();
      }
    }
    
    // ป้องกันการยิงสคริปต์ซ้ำซ้อนและแก้ปัญหาวินโดว์โหลดเสร็จก่อน SDK
    if (document.readyState === "complete" || document.readyState === "interactive") {
        processPoints();
    } else {
        document.addEventListener("DOMContentLoaded", processPoints);
    }
  </script>
</body>
</html>
