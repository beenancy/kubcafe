<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบประมวลผลแต้ม KUB Cafe</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    /* ⚡ Architect Update: Fluid UI & Responsive Design */
    body { 
      background-color: #fdfdfd; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      font-family: sans-serif; 
      margin: 0; 
      padding: 0 20px; /* เพิ่มขอบซ้ายขวาไม่ให้ข้อความชิดขอบจอเกินไป */
      text-align: center;
    }
    
    .loader { 
      border: 5px solid #f3f3f3; 
      border-top: 5px solid #c1f2a1; 
      border-radius: 50%; 
      width: clamp(40px, 10vw, 50px); /* ย่อขยายขนาด Loader ตามจอ */
      height: clamp(40px, 10vw, 50px); 
      animation: spin 1s linear infinite; 
      margin-bottom: 20px; 
    }
    
    h2 { 
      color: #2d3436; 
      font-size: clamp(16px, 5vw, 20px); /* ยืดหยุ่นตั้งแต่ 16px ถึง 20px */
      margin: 0 0 10px 0;
    }
    
    .sub-text {
      font-size: clamp(11px, 3.5vw, 14px);
      color: #b2bec3;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* 🎨 SweetAlert2 Custom Responsive Classes */
    .custom-swal-popup { 
      width: 85% !important; /* บังคับให้ป๊อปอัปมีความกว้างแค่ 85% ของจอ */
      max-width: 400px !important; /* แต่ห้ามกว้างเกิน 400px ในจอใหญ่ */
      padding: 1.5em 1em !important; 
      border-radius: 20px !important; 
    }
    .custom-swal-title { 
      font-size: clamp(18px, 5.5vw, 22px) !important; 
      font-weight: bold !important; 
      color: #2d3436 !important; 
    }
    .custom-swal-html { 
      font-size: clamp(14px, 4vw, 16px) !important; 
      color: #636e72 !important; 
      line-height: 1.5 !important; 
    }
    .custom-swal-btn { 
      font-size: clamp(14px, 4vw, 16px) !important; 
      padding: 10px 24px !important; 
      border-radius: 12px !important; 
      font-weight: bold !important; 
      width: 100% !important; /* ให้ปุ่มกดกว้างเต็มสัดส่วนในมือถือ */
      max-width: 200px !important;
    }
  </style>
</head>
<body>
  
  <div class="loader"></div>
  <h2 id="status-text">กำลังประมวลผลแต้ม...</h2>
  <div class="sub-text">กรุณารอสักครู่ ห้ามปิดหน้าจอ</div>

  <script>
    const LIFF_ID = "2010206186-u1XRJldq"; 
    // ⚠️ นำลิงก์ Cloudflare API หรือ GAS ของคุณบีมาใส่แทนที่ตรงนี้
    const API_URL = "https://script.google.com/macros/s/AKfycbxpWU8NlPwIk4EChzbG93IJ0RxFf3qSbs4TDT5MSVOgVWLO3cQAYseD_xAWzOeewJvHrg/exec"; 
    const lineOA_ID = "@848dmzja"; 
    
    let isProcessing = false; 

    async function showAlert(title, text, icon, btnColor, autoClose = false) {
      try {
        if (typeof Swal !== 'undefined') {
          let swalConfig = {
            title: title, 
            html: text, 
            icon: icon,
            customClass: { 
              popup: 'custom-swal-popup', // ⚡ เสียบ Class ควบคุมขนาดป๊อปอัป
              title: 'custom-swal-title', 
              htmlContainer: 'custom-swal-html', 
              confirmButton: 'custom-swal-btn' 
            },
            allowOutsideClick: false
          };

          if (autoClose) {
            swalConfig.showConfirmButton = false; 
            swalConfig.timer = 800; 
          } else {
            swalConfig.confirmButtonText = 'ตกลง (OK)';
            swalConfig.confirmButtonColor = btnColor;
          }

          await Swal.fire(swalConfig);
        } else {
          if (!autoClose) alert(title + "\n" + text.replace(/<[^>]*>?/gm, ''));
        }
      } catch (e) { console.error("Alert Error:", e); }
    }

    function redirectToLINE() {
      const lineLink = "https://line.me/R/ti/p/" + lineOA_ID;
      window.location.href = lineLink;
      setTimeout(() => { if (liff.isInClient()) { liff.closeWindow(); } }, 1000);
    }

    async function processPoints() {
      if (isProcessing) return;
      isProcessing = true;

      try {
        if (!navigator.onLine) {
          await showAlert('ไม่มีสัญญาณเน็ต\n(No Internet)', 'กรุณาตรวจสอบอินเทอร์เน็ตของมือถือค่ะ', 'error', '#ffb3b3', false);
          redirectToLINE(); return;
        }

        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }

        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');

        if (!shopCode) {
          await showAlert('ไม่พบข้อมูลแต้ม\n(Invalid QR)', '❌ ข้อมูลแต้มไม่ถูกต้อง หรือสแกนผิดวิธีค่ะ', 'error', '#ffb3b3', false);
          redirectToLINE(); return;
        }

        document.getElementById('status-text').innerText = "กำลังบันทึกข้อมูลเข้าสู่ระบบ...";
        const profile = await liff.getProfile();
        const cleanedName = encodeURIComponent((profile.displayName || '').replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, ''));
        
        const response = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&name=${cleanedName}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await response.json();
        
        if (data && data.status === "success") {
          await showAlert('สะสมแต้มสำเร็จ! 🎉', `${data.message}`, 'success', '#c1f2a1', true);
          redirectToLINE();
          
        } else if (data && data.status === "rate_limit") {
          let timeLeft = data.remaining;
          let timerInterval;
          
          await Swal.fire({
            title: 'สะสมแต้มไม่สำเร็จ\n(Please wait)',
            html: `⏳ กรุณารอสักครู่... รหัสใหม่จะพร้อมใช้งานในอีก <b>${timeLeft}</b> วินาที<br><br><span style="font-size:13px; color:#999;">Please wait <b>${timeLeft}</b> seconds before scanning again.</span>`,
            icon: 'warning',
            allowOutsideClick: false,
            showConfirmButton: true,
            confirmButtonText: 'รับทราบ (Got it)',
            confirmButtonColor: '#ffeaa7',
            customClass: { 
              popup: 'custom-swal-popup', 
              title: 'custom-swal-title', 
              htmlContainer: 'custom-swal-html', 
              confirmButton: 'custom-swal-btn' 
            },
            didOpen: () => {
              const content = Swal.getHtmlContainer();
              const bTags = content.querySelectorAll('b'); 
              timerInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft >= 0 && bTags.length >= 2) {
                  bTags[0].textContent = timeLeft;
                  bTags[1].textContent = timeLeft;
                }
              }, 1000);
            },
            willClose: () => {
              clearInterval(timerInterval);
            }
          });
          redirectToLINE();

        } else {
          await showAlert('สะสมแต้มไม่สำเร็จ\n(Scan Failed)', `${data.message || 'รหัสผ่านหรือสิทธิ์ไม่ถูกต้อง'}`, 'error', '#ffb3b3', false);
          redirectToLINE();
        }

      } catch (err) {
        console.error("System Error:", err);
        await showAlert('ระบบขัดข้องชั่วคราว\n(System Error)', 'กรุณาสแกนใหม่อีกครั้งนะคะ', 'error', '#ffb3b3', false);
        redirectToLINE();
      }
    }
    
    if (document.readyState === "complete" || document.readyState === "interactive") {
        processPoints();
    } else {
        document.addEventListener("DOMContentLoaded", processPoints);
    }
  </script>
</body>
</html>
