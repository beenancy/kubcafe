<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบประมวลผลแต้ม KUB Cafe</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background-color: #fdfdfd; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; padding: 0 20px; text-align: center; }
    .loader { border: 5px solid #f3f3f3; border-top: 5px solid #A3B18A; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    h2 { color: #4A3F35; font-size: 18px; margin: 0 0 10px 0; }
    .sub-text { font-size: 13px; color: #b2bec3; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* 🎨 Cozy Minimal Popup Style */
    .custom-swal-popup { 
      width: 85% !important; 
      max-width: 310px !important; 
      padding: 2em 1.5em !important; 
      border-radius: 24px !important; 
      background-color: #FDFCF0 !important; 
      box-shadow: 0 10px 30px rgba(140, 122, 107, 0.15) !important;
    }
    
    .swal2-icon { 
      transform: scale(0.65) !important; 
      margin: -15px auto 5px auto !important; 
    }
    
    .custom-swal-title { 
      font-size: 20px !important; 
      font-weight: 700 !important; 
      color: #4A3F35 !important; 
      margin-bottom: 10px !important;
    }
    .custom-swal-html { 
      font-size: 15px !important; 
      color: #6B705C !important; 
      line-height: 1.5 !important; 
    }
    
    /* 🔘 แก้ไขปุ่ม: บังคับความกว้างให้สวยงาม ไม่หดตัวตามข้อความ */
    .custom-swal-btn { 
      font-size: 16px !important; 
      padding: 12px 30px !important; /* เพิ่มระยะซ้าย-ขวา */
      min-width: 140px !important; /* บังคับปุ่มให้กว้างกำลังดีเสมอ */
      border-radius: 14px !important; 
      font-weight: 600 !important; 
      background-color: #5cd969 !important; 
      color: #ffffff !important;
      border: none !important;
      box-shadow: 0 4px 15px rgba(163, 177, 138, 0.3) !important;
      cursor: pointer;
    }
  </style>
</head>
<body>
  
  <div class="loader"></div>
  <h2 id="status-text">กำลังประมวลผลแต้ม...</h2>
  <div class="sub-text">กรุณารอสักครู่ ห้ามปิดหน้าจอ</div>

  <script>
    const LIFF_ID = "2010206186-u1XRJldq"; 
    const API_URL = "https://kub-backend.nan23082526.workers.dev/"; 
    const lineOA_ID = "@848dmzja"; 
    
    let isProcessing = false; 

    function redirectToLINE() {
      if (liff.isInClient()) {
        liff.closeWindow(); 
      } else {
        window.location.replace("https://line.me/R/ti/p/" + lineOA_ID); 
      }
    }

    async function showAlert(title, text, icon, btnText) {
      if (typeof Swal !== 'undefined') {
        await Swal.fire({
          title: title, 
          html: text, 
          icon: icon,
          customClass: { popup: 'custom-swal-popup', title: 'custom-swal-title', htmlContainer: 'custom-swal-html', confirmButton: 'custom-swal-btn' },
          allowOutsideClick: false, 
          confirmButtonText: btnText,
          buttonsStyling: false 
        });
      } else {
        alert(title + "\n" + text.replace(/<[^>]*>?/gm, ''));
      }
    }

    async function processPoints() {
      if (isProcessing) return;
      isProcessing = true;

      try {
        if (!navigator.onLine) {
          await showAlert('ไม่มีสัญญาณเน็ต', 'กรุณาตรวจสอบอินเทอร์เน็ตค่ะ', 'error', 'ตกลง (OK)');
          redirectToLINE(); return;
        }

        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }

        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');

        if (!shopCode) {
          await showAlert('ไม่พบข้อมูลแต้ม', '❌ ข้อมูลแต้มไม่ถูกต้อง หรือสแกนผิดวิธีค่ะ', 'error', 'ตกลง (OK)');
          redirectToLINE(); return;
        }

        const profile = await liff.getProfile();
        const cleanedName = encodeURIComponent((profile.displayName || '').replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, ''));
        
        const response = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&name=${cleanedName}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await response.json();
        
        if (data && data.status === "success") {
          
          const isEN = data.lang === "EN";
          const titleText = isEN ? 'Points Added! 🎉' : 'สะสมแต้มสำเร็จ! 🎉';
          const btnText = isEN ? 'OK' : 'ตกลง (OK)';
          
          const ptsText = `<div style="font-size:32px; font-weight:900; color:#ff4d4d; margin:10px 0; line-height: 1;">+${data.ptsAdded} ${isEN ? 'PTS' : 'แต้ม'} ☕</div>`;
          const totalLabel = isEN ? 'Total Balance:' : 'แต้มสะสมทั้งหมด:';
          
          // ใช้ white-space: nowrap เพื่อบังคับให้ตัวเลขกับคำว่า PTS อยู่บรรทัดเดียวกันเสมอ
          const totalText = `<div style="font-size:16px; color:#4A3F35; margin-bottom:20px; font-weight:bold;">${totalLabel} <span style="white-space: nowrap;"><span style="color:#00C851; font-size:22px; font-weight:900;">${data.totalPts}</span> ${isEN ? 'PTS' : 'แต้ม'}</span></div>`;
          
          const remarkLabel = isEN 
            ? '(Check history and redeem rewards via the menu below)' 
            : '(เช็กแต้มย้อนหลังและแลกรางวัล ได้ที่เมนูด้านล่างในแชท)';
          const remark = `<div style="font-size:12px; color:#B0A69D; border-top: 1px dashed #E8E2D9; padding-top: 15px;">${remarkLabel}</div>`;
          
          await showAlert(titleText, ptsText + totalText + remark, 'success', btnText);
          redirectToLINE(); 
          
        } else {
          await showAlert('สะสมแต้มไม่สำเร็จ', `${data.message || 'รหัสผ่านหรือสิทธิ์ไม่ถูกต้อง'}`, 'error', 'ตกลง (OK)');
          redirectToLINE();
        }

      } catch (err) {
        await showAlert('ระบบขัดข้องชั่วคราว', 'กรุณาสแกนใหม่อีกครั้งนะคะ', 'error', 'ตกลง (OK)');
        redirectToLINE();
      }
    }
    
    document.addEventListener("DOMContentLoaded", processPoints);
  </script>
</body>
</html>
