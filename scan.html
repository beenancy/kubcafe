<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Cafe - Processing</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background-color: #fdfdfd; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; padding: 0 20px; text-align: center; }
    .loader { border: 5px solid #f3f3f3; border-top: 5px solid #27ae60; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    h2 { color: #2d3436; font-size: 20px; margin: 0 0 10px 0; }
    .sub-text { font-size: 14px; color: #636e72; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* สไตล์ปุ่มที่กดง่ายและชัดเจน */
    .swal-custom-popup { padding-bottom: 20px !important; }
    .swal-custom-btn { 
      padding: 12px 30px !important; 
      font-size: 18px !important; 
      font-weight: bold !important; 
      border-radius: 10px !important; 
    }
    .swal-btn-success { background-color: #27ae60 !important; }
    .swal-btn-error { background-color: #e74c3c !important; }
  </style>
</head>
<body>
  
  <div class="loader"></div>
  <h2 id="status-text">กำลังประมวลผล...</h2>
  <div class="sub-text">ห้ามปิดหน้าจอจนกว่าจะเสร็จ</div>

  <script>
    const LIFF_ID = "2010206186-u1XRJldq"; 
    const API_URL = "https://kub-backend.nan23082526.workers.dev/"; 
    const lineOA_ID = "@848dmzja"; 
    
    let isProcessing = false; 

    function redirectToLINE() {
      if (liff.isInClient()) {
        liff.closeWindow(); 
      } else {
        window.location.replace("https://line.me/R/ti/p/" + lineOA_ID); 
      }
    }

    async function showAlert(title, text, icon, btnText, isSuccess) {
      await Swal.fire({
        title: title, 
        html: text, 
        icon: icon,
        confirmButtonText: btnText,
        confirmButtonColor: isSuccess ? '#27ae60' : '#e74c3c',
        customClass: {
          popup: 'swal-custom-popup',
          confirmButton: 'swal-custom-btn'
        },
        allowOutsideClick: false
      });
    }

    async function processPoints() {
      if (isProcessing) return;
      isProcessing = true;

      try {
        if (!navigator.onLine) {
          await showAlert('ไม่มีสัญญาณอินเทอร์เน็ต', 'กรุณาตรวจสอบการเชื่อมต่อของคุณ', 'error', 'ตกลง', false);
          redirectToLINE(); return;
        }

        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }

        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');

        if (!shopCode) {
          await showAlert('ไม่พบรหัส QR', 'ข้อมูลแต้มไม่ถูกต้องค่ะ', 'error', 'ตกลง', false);
          redirectToLINE(); return;
        }

        const profile = await liff.getProfile();
        const cleanedName = encodeURIComponent((profile.displayName || '').replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, ''));
        
        const response = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&name=${cleanedName}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await response.json();
        
        const isEN = (data.lang === "EN");
        const btnText = isEN ? 'OK' : 'ตกลง';

        if (data && data.status === "success") {
          const title = isEN ? 'Success!' : 'สะสมแต้มสำเร็จ!';
          const body = `<div style="font-size:24px; font-weight:bold;">+${data.ptsAdded} แต้ม</div>
                        <div style="font-size:16px; margin:10px 0;">แต้มทั้งหมด: ${data.totalPts}</div>
                        <div style="font-size:12px; color:#7f8c8d; margin-top:15px;">${isEN ? '(Check history via menu)' : '(เช็กแต้มและแลกรางวัลที่เมนูในแชท)'}</div>`;
          
          await showAlert(title, body, 'success', btnText, true);
          redirectToLINE();
          
        } else {
          // แจ้ง Error ตามภาษาของ User
          const titleError = isEN ? 'Scan Failed' : 'สแกนไม่สำเร็จ';
          await showAlert(titleError, data.message || 'รหัสไม่ถูกต้อง', 'error', btnText, false);
          redirectToLINE();
        }

      } catch (err) {
        await showAlert('ระบบขัดข้อง', 'กรุณาสแกนใหม่อีกครั้งค่ะ', 'error', 'ตกลง', false);
        redirectToLINE();
      }
    }
    
    document.addEventListener("DOMContentLoaded", processPoints);
  </script>
</body>
</html>
