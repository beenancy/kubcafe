<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Cafe - Scan</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { background-color: #fdfdfd; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; padding: 20px; text-align: center;}
    .loader { border: 5px solid #f3f3f3; border-top: 5px solid #c1f2a1; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    h2 { color: #2d3436; font-size: 20px; margin-bottom: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  
  <div class="loader" id="loading-spinner"></div>
  <h2 id="status-text">กำลังตรวจสอบรหัส...</h2>

  <script>
    const LIFF_ID = "2010206186-u1XRJldq"; 
    
    async function processPoints() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }

        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');

        if (!shopCode) {
          document.getElementById('status-text').innerText = "❌ รหัสไม่ถูกต้อง";
          setTimeout(() => liff.closeWindow(), 1500); return;
        }

        // 🚀 พระเอกของเรา: สั่งให้ LIFF ส่งข้อความเข้าแชทแทนลูกค้า
        if (liff.isInClient()) {
          await liff.sendMessages([{
            type: "text",
            text: "☕ สแกนโค้ดรับแต้ม: " + shopCode
          }]);
          // ส่งข้อความเสร็จ ปิดหน้าต่างทันที!
          liff.closeWindow();
        } else {
          document.getElementById('status-text').innerText = "❌ กรุณาสแกนผ่านแอป LINE โดยตรงค่ะ";
        }
      } catch (err) {
        document.getElementById('status-text').innerText = "ระบบขัดข้องชั่วคราว";
        setTimeout(() => liff.closeWindow(), 2000);
      }
    }
    
    document.addEventListener("DOMContentLoaded", processPoints);
  </script>
</body>
</html>
