<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUB Cafe Member</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f7fafc;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #2d3436;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .header-text {
            margin-bottom: 30px;
            color: #4a5568;
            font-weight: 600;
            font-size: 18px;
        }
        .sub-text {
            font-size: 14px;
            font-weight: 400;
            color: #a0aec0;
            margin-top: 5px;
        }
        /* วงกลมแสดงคะแนนสไตล์พาสเทล */
        .point-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c1f2a1, #e0ccff);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 8px solid white;
            margin-bottom: 40px;
        }
        .point-number {
            font-size: 90px;
            font-weight: bold;
            line-height: 1;
            color: #2d3436;
        }
        .point-label {
            font-size: 16px;
            letter-spacing: 2px;
            color: #4a5568;
            margin-top: -5px;
        }
        /* กล่องข้อความ Info */
        .info-box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            font-size: 14px;
            color: #636e72;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .divider {
            border-top: 1px dashed #e2e8f0;
            margin: 15px 0;
        }
        /* ปุ่มปิดหน้าต่าง */
        .btn-close {
            display: block;
            width: 100%;
            max-width: 350px;
            padding: 16px;
            background: #edf2f7;
            color: #4a5568;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-close:active {
            background: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="header-text">
        แต้มสะสมของคุณปัจจุบัน
        <div class="sub-text">Your Current Points</div>
    </div>

    <div class="point-circle">
        <div class="point-number" id="pointDisplay">...</div>
        <div class="point-label">POINTS</div>
    </div>

    <div class="info-box">
        <span style="color: #3498db;">ℹ️</span> ครบ 10 แต้ม รับส่วนลด 1 แก้ว 50%<br>
        (กดปุ่ม <b>"Get Rewards"</b> ในแชทได้เลยค่ะ)
        <div class="divider"></div>
        Collect 10 pts to get 50% off 1 drink<br>
        (Press <b>"Get Rewards"</b> button in chat)
    </div>

    <button class="btn-close" onclick="liff.closeWindow()">✕ ปิดหน้าต่างนี้ / Close</button>

    <script>
        const FIREBASE_DB_URL = "https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app";
        const NEW_LIFF_URL = "https://liff.line.me/2010206186-p1vWfgui";

        async function initializeLiff() {
            try {
                // เริ่มระบบ LIFF เก่า
                await liff.init({ liffId: "2010206186-8JwWgQug" }); 
                
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    // 1. ส่งรายงานลูกค้าเข้าระบบเก่าไปยัง Firebase
                    await reportOldSystemAccess(profile.userId, profile.displayName);
                    // 2. รีไดเรกต์ลูกค้าไปยัง LINE Web App ตัวใหม่ทันที
                    window.location.replace(NEW_LIFF_URL);
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init/Login Error:", err);
                // ป้องกันหน้าจอดับ ให้สลับไปหน้าใหม่ทันทีเป็นแผนสำรอง
                window.location.replace(NEW_LIFF_URL);
            }
        }

        async function reportOldSystemAccess(userId, displayName) {
            try {
                const now = new Date();
                const logData = {
                    displayName: displayName,
                    timestamp: now.getTime(),
                    timeStr: now.toLocaleString('th-TH')
                };
                
                // ใช้ REST API ในการบันทึกข้อมูลลูกค้าที่เปิดหน้าเก่า ลงใน Firebase RTDB
                await fetch(`${FIREBASE_DB_URL}/old_system_access/${userId}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(logData)
                });
            } catch (e) {
                console.error("Failed to report access:", e);
            }
        }

        // เริ่มทำงานเมื่อเปิดหน้าเว็บ
        initializeLiff();
    </script>
</body>
</html>
