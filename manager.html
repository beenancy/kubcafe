<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB CAFE MANAGER v5.5</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --bg-color: #FDFCF0; --card-bg: #FFFFFF; --text-main: #4A3F35; --text-muted: #B0A69D; --primary-matcha: #A3B18A; --matcha-dark: #7A8B62; --accent-brick: #C57B57; --border-color: #E8E2D9; }
    body, html { background-color: var(--bg-color); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; width: 100%; height: 100%; color: var(--text-main); }
    #pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--text-main); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.3s; }
    #pin-overlay h2 { margin-bottom: 20px; font-size: 24px; letter-spacing: 2px; color: var(--primary-matcha); }
    #pin-overlay p { margin-top: -10px; margin-bottom: 30px; font-size: 14px; color: var(--text-muted); }
    #pin-input { width: 150px; text-align: center; font-size: 28px; padding: 10px; border: 3px solid var(--primary-matcha); border-radius: 15px; background: rgba(255,255,255,0.1); color: white; font-weight: bold; margin-bottom: 20px; outline: none; }
    #pin-input::placeholder { color: rgba(255,255,255,0.3); }
    #btn-unlock { background: var(--primary-matcha); color: white; border: none; padding: 12px 40px; border-radius: 20px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
    #main-app { display: none; padding: 15px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: clamp(20px, 5vw, 26px); color: #6B705C; margin: 0; letter-spacing: 1px; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 5px 15px rgba(140, 122, 107, 0.05); text-align: center; }
    .stat-card h3 { margin: 0; font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
    .stat-card .num { font-size: clamp(24px, 6vw, 36px); font-weight: 800; color: var(--primary-matcha); margin-top: 5px; }
    .card { background-color: var(--card-bg); border-radius: 16px; box-shadow: 0 5px 20px rgba(140, 122, 107, 0.08); padding: clamp(15px, 4vw, 30px); border: 1px solid var(--border-color); overflow: hidden; }
    .toolbar { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed var(--border-color); }
    @media (min-width: 600px) { .toolbar { flex-direction: row; justify-content: space-between; align-items: center; } }
    .search-box { width: 100%; position: relative; }
    @media (min-width: 600px) { .search-box { flex: 1; max-width: 350px; } }
    .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px; border: 1px solid var(--border-color); font-size: 14px; outline: none; background: #FCFBF7; box-sizing: border-box; }
    .search-box input:focus { border-color: var(--primary-matcha); background: #fff; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
    .btn-group { display: flex; gap: 10px; width: 100%; justify-content: space-between; flex-wrap: wrap; }
    @media (min-width: 600px) { .btn-group { width: auto; justify-content: flex-end; } }
    .btn { padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; border: none; color: #fff; display: flex; align-items: center; justify-content: center; gap: 5px; flex: 1; min-width: 100px; }
    @media (min-width: 600px) { .btn { flex: none; } }
    .btn-refresh { background-color: #8C7A6B; }
    .btn-clean { background-color: var(--accent-brick); }
    .btn-lock { background-color: #D32F2F; }
    .btn-edit { background-color: var(--primary-matcha); padding: 8px 12px; font-size: 12px; }
    .btn-history { background-color: #D4A373; padding: 8px 12px; font-size: 12px; }
    .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    th { color: var(--text-muted); font-size: 12px; padding: 12px 10px; border-bottom: 2px solid var(--border-color); text-align: left; white-space: nowrap; }
    td { padding: 15px 10px; border-bottom: 1px solid #F4F1EC; vertical-align: middle; font-size: 14px; }
    .profile-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .no-pic { width: 40px; height: 40px; border-radius: 50%; background-color: #EAE5D9; display: flex; justify-content: center; align-items: center; font-size: 18px; flex-shrink: 0; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-name-text { font-weight: 600; color: var(--text-main); display: block; }
    .alert-badge { display: inline-block; background: #ffeaa7; color: #d35400; font-size: 10px; padding: 2px 6px; border-radius: 6px; margin-top: 4px; font-weight: bold; border: 1px solid #fdcb6e; }
    .pill-pts { background-color: #FDFCF0; color: #D35400; padding: 5px 12px; border-radius: 10px; font-weight: 800; border: 1px solid #FAE5D3; }
    .action-group { display: flex; gap: 6px; }
    .history-item { text-align: left; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .history-date { font-size: 11px; color: #999; }
    .pts-plus { color: #27ae60; font-weight: bold; }
    .pts-minus { color: #e74c3c; font-weight: bold; }
  </style>
</head>
<body>

  <div id="pin-overlay">
    <h2>MANAGER PRO</h2>
    <p>Data Privacy Secured</p>
    <input type="password" id="pin-input" inputmode="numeric" pattern="[0-9]*" placeholder="PIN" maxlength="4">
    <button id="btn-unlock" onclick="checkPin()">UNLOCK</button>
  </div>

  <div id="main-app">
    <div class="container">
      <div class="header-container">
        <h1>☕ KUB CAFE <span style="font-weight:200; color:var(--text-muted);">| PRO</span></h1>
      </div>
      <div class="summary-grid">
        <div class="stat-card">
          <h3>Members</h3>
          <div class="num" id="stat-users">0</div>
        </div>
        <div class="stat-card">
          <h3>Total Points</h3>
          <div class="num" id="stat-points">0</div>
        </div>
      </div>
      <div class="card">
        <div class="toolbar">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อลูกค้า..." onkeyup="filterTable()">
          </div>
          <div class="btn-group">
            <button class="btn btn-refresh" onclick="fetchData()">🔄 โหลดใหม่</button>
            <button class="btn btn-clean" onclick="clearQRGarbage()">🧹 ล้างขยะ</button>
            <button class="btn btn-lock" onclick="lockSystem()">🔒 ล็อกหน้าจอ</button>
          </div>
        </div>
        <div class="table-responsive">
          <table>
            <thead>
              <tr><th>ลำดับ</th><th>ชื่อลูกค้า</th><th>แต้มปัจจุบัน</th><th>แต้มเก่า</th><th>อัปเดตล่าสุด</th><th>จัดการ</th></tr>
            </thead>
            <tbody id="user-table-body">
              <tr><td colspan="6" style="text-align:center; padding:40px; color:#ccc;">กรุณาปลดล็อกเพื่อดูข้อมูล...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 🌐 [ สำคัญมาก 🌟 ] ลิงก์ Cloudflare Worker
    const CLOUDFLARE_WORKER_URL = "https://kub-backend.nan23082526.workers.dev";

    if(localStorage.getItem("kub_manager_unlocked") === "true") {
      document.getElementById('pin-overlay').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      initApp();
    }

    function checkPin() {
      const pin = document.getElementById('pin-input').value;
      if(pin.length === 4) {
        fetch(`${CLOUDFLARE_WORKER_URL}/api/manager-users`, {
          method: 'GET', headers: { 'X-Admin-PIN': pin }
        }).then(res => {
          if(res.status === 200) {
            localStorage.setItem("kub_manager_pin", pin);
            localStorage.setItem("kub_manager_unlocked", "true");
            location.reload();
          } else { alert('รหัส PIN หลังบ้านไม่ถูกต้องครับ'); }
        }).catch(() => alert('เชื่อมต่อระบบความปลอดภัยหลังบ้านล้มเหลว'));
      }
    }

    function lockSystem() {
      localStorage.removeItem("kub_manager_unlocked");
      localStorage.removeItem("kub_manager_pin");
      location.reload(); 
    }

    function initApp() {
      window.allUsersData = [];
      window.todayEarnCounts = {}; 
      fetchData();
    }

    function formatThaiDate(isoString) {
      if (!isoString) return "-";
      const date = new Date(isoString);
      const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
      return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
    }

    async function fetchData() {
      const tbody = document.getElementById('user-table-body');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">กำลังโหลดข้อมูล...</td></tr>';
      const activePin = localStorage.getItem("kub_manager_pin");
      try {
        window.todayEarnCounts = {};
        const todayStart = new Date(); todayStart.setHours(0,0,0,0); 

        const txRes = await fetch(`${CLOUDFLARE_WORKER_URL}/api/manager-today-tx`, {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': activePin },
          body: JSON.stringify({ structuredQuery: { from: [{ collectionId: "transactions" }], where: { fieldFilter: { field: { fieldPath: "timestamp" }, op: "GREATER_THAN_OR_EQUAL", value: { timestampValue: todayStart.toISOString() } } }, limit: 500 } })
        }).then(r => r.json());
        
        if (Array.isArray(txRes)) {
          txRes.forEach(item => {
            if (item.document && item.document.fields) {
              const f = item.document.fields;
              if (f.type?.stringValue === 'earn') {
                const uid = f.userId?.stringValue;
                if(uid) window.todayEarnCounts[uid] = (window.todayEarnCounts[uid] || 0) + 1;
              }
            }
          });
        }

        const uRes = await fetch(`${CLOUDFLARE_WORKER_URL}/api/manager-users`, {
          method: 'GET', headers: { 'X-Admin-PIN': activePin }
        }).then(r => r.json());
        
        if (!uRes.documents) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">ยังไม่มีสมาชิก</td></tr>'; return; }

        let totalPts = 0;
        window.allUsersData = uRes.documents.map(doc => {
          const fields = doc.fields || {}; const paths = doc.name.split('/');
          const p = parseInt(fields.totalPoints?.integerValue) || 0; totalPts += p;
          return {
            id: paths[paths.length - 1],
            displayName: fields.displayName?.stringValue || 'Guest',
            pictureUrl: fields.pictureUrl?.stringValue || '',
            totalPoints: p,
            legacyPoints: Math.max(0, parseInt(fields.legacyPoints?.integerValue) || 0),
            lastUpdated: fields.lastUpdated?.timestampValue || ''
          };
        }).sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated));

        document.getElementById('stat-users').innerText = window.allUsersData.length;
        document.getElementById('stat-points').innerText = totalPts.toLocaleString();
        renderTable(window.allUsersData);
      } catch (error) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red; padding:40px;">โหลดข้อมูลไม่สำเร็จ</td></tr>'; }
    }

    function renderTable(users) {
      const tbody = document.getElementById('user-table-body'); tbody.innerHTML = '';
      users.forEach((user, index) => {
        const pic = user.pictureUrl ? `<img src="${user.pictureUrl}" class="profile-pic">` : `<div class="no-pic">👤</div>`;
        const todayCount = window.todayEarnCounts[user.id] || 0;
        const alertHtml = todayCount > 1 ? `<div class="alert-badge">🚨 สแกนวันนี้ ${todayCount} ครั้ง</div>` : '';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:#B0A69D; font-size:12px;">${index + 1}</td>
          <td><div class="user-info">${pic}<div><span class="user-name-text">${user.displayName}</span>${alertHtml}</div></div></td>
          <td><span class="pill-pts">${user.totalPoints}</span></td>
          <td style="color:#B0A69D;">${user.legacyPoints}</td>
          <td style="font-size:12px; color:#9A958F;">${formatThaiDate(user.lastUpdated)}</td>
          <td><div class="action-group"><button class="btn btn-edit" onclick="editPoints('${user.id}', '${user.displayName}', ${user.totalPoints})">✏️ แก้ไข</button><button class="btn btn-history" onclick="viewHistory('${user.id}', '${user.displayName}')">📜 ประวัติ</button></div></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = window.allUsersData.filter(u => u.displayName.toLowerCase().includes(q));
      renderTable(filtered);
    }

    async function editPoints(userId, name, current) {
      const { value: val } = await Swal.fire({ title: 'แก้ไขแต้ม', html: `ระบุแต้มใหม่สำหรับ <b>${name}</b>`, input: 'number', inputValue: current, showCancelButton: true, confirmButtonColor: '#A3B18A' });
      if (val) {
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const activePin = localStorage.getItem("kub_manager_pin");
        try {
          await fetch(`${CLOUDFLARE_WORKER_URL}/api/manager-edit?userId=${userId}`, {
            method: 'PATCH', headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': activePin },
            body: JSON.stringify({ newPts: val, oldPts: current }) // 🚀 ส่งแต้มเก่าและใหม่ ไปประมวลผลเป็น Edit Transaction
          });
          Swal.fire('สำเร็จ!', 'อัปเดตแต้มเรียบร้อย', 'success').then(fetchData);
        } catch (e) { Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error'); }
      }
    }

    async function viewHistory(userId, name) {
      Swal.fire({ title: 'กำลังดึงประวัติ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      const activePin = localStorage.getItem("kub_manager_pin");
      try {
        const data = await fetch(`${CLOUDFLARE_WORKER_URL}/api/manager-history`, {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': activePin },
          body: JSON.stringify({ 
            structuredQuery: { 
              from: [{ collectionId: "transactions" }], 
              where: { fieldFilter: { field: { fieldPath: "userId" }, op: "EQUAL", value: { stringValue: userId } } }, 
              limit: 200 
            } 
          })
        }).then(r => r.json());
        
        let logs = [];
        if (Array.isArray(data)) { data.forEach(item => { if (item.document && item.document.fields) logs.push(item.document.fields); }); }
        if (logs.length === 0) return Swal.fire('ไม่พบประวัติ', 'ลูกค้าท่านนี้ยังไม่มีรายการเคลื่อนไหวครับ', 'info');
        
        logs.sort((a,b) => new Date(b.timestamp.timestampValue) - new Date(a.timestamp.timestampValue));
        logs = logs.slice(0, 50);

        let html = `<div style="max-height: 350px; overflow-y: auto;">`;
        logs.forEach(l => {
          const type = l.type?.stringValue || 'earn'; 
          const pts = parseInt(l.points?.integerValue || 0);
          
          let title = "", sign = "", cssClass = "";
          if (type === 'earn') { title = '☕ สะสมแต้ม'; sign = '+'; cssClass = 'pts-plus'; }
          else if (type === 'redeem') { title = '🎁 แลกรางวัล'; sign = '-'; cssClass = 'pts-minus'; }
          else if (type === 'edit') { title = '🛠️ แอดมินแก้ไข'; sign = pts >= 0 ? '+' : ''; cssClass = pts >= 0 ? 'pts-plus' : 'pts-minus'; }

          html += `<div class="history-item"><div><div style="font-weight:bold;">${title}</div><div class="history-date">${formatThaiDate(l.timestamp.timestampValue)}</div></div><div class="history-points ${cssClass}">${sign}${pts}</div></div>`;
        });
        html += `</div>`;
        Swal.fire({ title: `ประวัติคุณ ${name}`, html: html, confirmButtonColor: '#8C7A6B' });
      } catch (e) { Swal.fire('Error', 'ไม่สามารถโหลดประวัติได้', 'error'); }
    }

    async function clearQRGarbage() {
      const ask = await Swal.fire({ title: 'ล้างขยะ QR?', text: 'ลบประวัติการสแกนเพื่อประหยัดพื้นที่', icon: 'warning', showCancelButton: true, confirmButtonColor: '#C57B57' });
      if (ask.isConfirmed) {
        Swal.fire({ title: 'กำลังกวาดขยะ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const activePin = localStorage.getItem("kub_manager_pin");
        try {
          await fetch(`${CLOUDFLARE_WORKER_URL}/api/manager-clean`, { method: 'POST', headers: { 'X-Admin-PIN': activePin } });
          Swal.fire('สำเร็จ!', 'ล้างขยะ QR เรียบร้อยแล้วครับ', 'success');
        } catch(e) { Swal.fire('Error', 'ล้างขยะไม่สำเร็จ', 'error'); }
      }
    }
  </script>
</body>
</html>
