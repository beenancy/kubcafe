<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KUB CAFE MANAGER v4.5</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root {
      --bg-color: #FDFCF0; /* Cream Washi Paper */
      --card-bg: #FFFFFF;
      --text-main: #4A3F35; /* Wood Brown */
      --text-muted: #B0A69D;
      --primary-matcha: #A3B18A; /* Matcha Green */
      --accent-brick: #C57B57; /* Tea Orange */
      --border-color: #E8E2D9;
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      color: var(--text-main);
    }

    .container { max-width: 1100px; margin: 0 auto; }

    /* 📊 Header & Dashboard */
    .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    h1 { font-size: 26px; color: #6B705C; margin: 0; letter-spacing: 1px; }

    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .stat-card {
      background: var(--card-bg); padding: 25px; border-radius: 16px;
      border: 1px solid var(--border-color); box-shadow: 0 8px 25px rgba(140, 122, 107, 0.08);
      text-align: center; transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-5px); }
    .stat-card h3 { margin: 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .num { font-size: 36px; font-weight: 800; color: var(--primary-matcha); margin-top: 8px; }

    /* 📋 Main Management Card */
    .card {
      background-color: var(--card-bg); border-radius: 20px;
      box-shadow: 0 10px 30px rgba(140, 122, 107, 0.1); padding: 30px; border: 1px solid var(--border-color);
    }

    .toolbar {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;
      margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed var(--border-color);
    }

    /* 🔍 Search Box */
    .search-box { flex: 1; min-width: 280px; position: relative; }
    .search-box input {
      width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px;
      border: 1px solid var(--border-color); font-size: 15px; outline: none; background: #FCFBF7;
    }
    .search-box input:focus { border-color: var(--primary-matcha); background: #fff; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; }

    .btn-group { display: flex; gap: 12px; }

    .btn {
      padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600;
      font-size: 14px; border: none; transition: all 0.2s; color: #fff; display: flex; align-items: center; gap: 6px;
    }
    .btn-refresh { background-color: #8C7A6B; }
    .btn-refresh:hover { background-color: #726357; }
    .btn-clean { background-color: var(--accent-brick); }
    .btn-edit { background-color: var(--primary-matcha); padding: 6px 12px; font-size: 12px; }
    .btn-history { background-color: #D4A373; padding: 6px 12px; font-size: 12px; }

    /* 📅 Table Styles */
    table { width: 100%; border-collapse: collapse; }
    th { color: var(--text-muted); font-size: 12px; text-transform: uppercase; padding: 15px 10px; border-bottom: 2px solid var(--border-color); text-align: left; }
    td { padding: 18px 10px; border-bottom: 1px solid #F4F1EC; vertical-align: middle; font-size: 14px; }

    .profile-pic { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid #FDFCF0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .no-pic { width: 42px; height: 42px; border-radius: 50%; background-color: #EAE5D9; display: flex; justify-content: center; align-items: center; font-size: 20px; }

    .pill-pts { background-color: #FDFCF0; color: #D35400; padding: 5px 12px; border-radius: 10px; font-weight: 800; border: 1px solid #FAE5D3; }
    .user-name { display: flex; align-items: center; gap: 12px; font-weight: 600; color: var(--text-main); }
    .action-group { display: flex; gap: 6px; }

    /* 📜 History Modal Styles */
    .history-item { 
      text-align: left; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;
    }
    .history-date { font-size: 11px; color: #999; }
    .history-points { font-weight: bold; }
    .pts-plus { color: #27ae60; }
    .pts-minus { color: #e74c3c; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-container">
      <h1>☕ KUB CAFE <span style="font-weight:200; color:var(--text-muted);">| MANAGER</span></h1>
      <div style="font-size: 12px; color: var(--text-muted);">Version 4.5 PRO</div>
    </div>

    <div class="summary-grid">
      <div class="stat-card">
        <h3>Members</h3>
        <div class="num" id="stat-users">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Points in System</h3>
        <div class="num" id="stat-points">0</div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="ค้นหาชื่อลูกค้า..." onkeyup="filterTable()">
        </div>
        <div class="btn-group">
          <button class="btn btn-refresh" onclick="fetchUsers()">🔄 Refresh</button>
          <button class="btn btn-clean" onclick="clearQRGarbage()">🧹 Clean QR</button>
        </div>
      </div>

      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>ลำดับ</th>
              <th>ชื่อลูกค้า</th>
              <th>แต้มปัจจุบัน</th>
              <th>แต้มเก่า</th>
              <th>อัปเดตล่าสุด</th>
              <th>จัดการ</th>
            </tr>
          </thead>
          <tbody id="user-table-body">
            <tr><td colspan="6" style="text-align:center; padding:50px; color:#ccc;">กำลังดึงข้อมูลจากญี่ปุ่น...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const FIREBASE_PROJECT_ID = "kub-cafe-pos";
    const FIREBASE_API_KEY = "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tLE";
    const BASE_URL = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents`;

    let allUsersData = [];

    function formatThaiDate(isoString) {
      if (!isoString) return "-";
      const date = new Date(isoString);
      const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
      return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
    }

    // 🔄 1. โหลดข้อมูลลูกค้าทั้งหมด
    async function fetchUsers() {
      const tbody = document.getElementById('user-table-body');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px;">กำลังโหลด...</td></tr>';

      try {
        const response = await fetch(`${BASE_URL}/users?key=${FIREBASE_API_KEY}&pageSize=500`);
        const data = await response.json();
        
        if (!data.documents) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px;">ยังไม่มีสมาชิก</td></tr>';
          return;
        }

        let totalPts = 0;
        allUsersData = data.documents.map(doc => {
          const fields = doc.fields || {};
          const paths = doc.name.split('/');
          const p = parseInt(fields.totalPoints?.integerValue) || 0;
          totalPts += p;

          return {
            id: paths[paths.length - 1],
            displayName: fields.displayName?.stringValue || 'Guest',
            pictureUrl: fields.pictureUrl?.stringValue || '',
            totalPoints: p,
            legacyPoints: Math.max(0, parseInt(fields.legacyPoints?.integerValue) || 0),
            lastUpdated: fields.lastUpdated?.timestampValue || ''
          };
        }).sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated));

        document.getElementById('stat-users').innerText = allUsersData.length;
        document.getElementById('stat-points').innerText = totalPts.toLocaleString();

        renderTable(allUsersData);
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red; padding:50px;">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
      }
    }

    // 🎨 2. วาดตารางข้อมูล
    function renderTable(users) {
      const tbody = document.getElementById('user-table-body');
      tbody.innerHTML = '';

      users.forEach((user, index) => {
        const pic = user.pictureUrl ? `<img src="${user.pictureUrl}" class="profile-pic">` : `<div class="no-pic">👤</div>`;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:#B0A69D; font-size:12px;">${index + 1}</td>
          <td><div class="user-name">${pic} ${user.displayName}</div></td>
          <td><span class="pill-pts">${user.totalPoints}</span></td>
          <td style="color:#B0A69D;">${user.legacyPoints}</td>
          <td style="font-size:12px; color:#9A958F;">${formatThaiDate(user.lastUpdated)}</td>
          <td>
            <div class="action-group">
              <button class="btn btn-edit" onclick="editPoints('${user.id}', '${user.displayName}', ${user.totalPoints})">✏️ แก้ไข</button>
              <button class="btn btn-history" onclick="viewHistory('${user.id}', '${user.displayName}')">📜 ประวัติ</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 🔍 3. ระบบค้นหา
    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allUsersData.filter(u => u.displayName.toLowerCase().includes(q));
      renderTable(filtered);
    }

    // ✏️ 4. แก้ไขแต้ม
    async function editPoints(userId, name, current) {
      const { value: val } = await Swal.fire({
        title: 'แก้ไขแต้ม',
        html: `ระบุแต้มใหม่สำหรับ <b>${name}</b>`,
        input: 'number', inputValue: current,
        showCancelButton: true, confirmButtonColor: '#A3B18A'
      });

      if (val) {
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
          await fetch(`${BASE_URL}/users/${userId}?updateMask.fieldPaths=totalPoints&updateMask.fieldPaths=lastUpdated&key=${FIREBASE_API_KEY}`, {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { totalPoints: { integerValue: val }, lastUpdated: { timestampValue: new Date().toISOString() } } })
          });
          Swal.fire('สำเร็จ!', 'อัปเดตแต้มเรียบร้อย', 'success').then(fetchUsers);
        } catch (e) { Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error'); }
      }
    }

    // 📜 5. ดูประวัติการใช้งาน (New!)
    async function viewHistory(userId, name) {
      Swal.fire({ title: 'กำลังดึงประวัติ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        // ดึง 50 รายการล่าสุดจาก Transaction
        const res = await fetch(`${BASE_URL}/transactions?key=${FIREBASE_API_KEY}&pageSize=100`);
        const data = await res.json();
        
        if (!data.documents) {
          Swal.fire('ไม่พบประวัติ', 'ลูกค้าท่านนี้ยังไม่มีรายการเคลื่อนไหวครับ', 'info');
          return;
        }

        // กรองเฉพาะของ User คนนี้
        const logs = data.documents
          .map(doc => doc.fields)
          .filter(f => f.userId?.stringValue === userId)
          .sort((a,b) => new Date(b.timestamp.timestampValue) - new Date(a.timestamp.timestampValue));

        if (logs.length === 0) {
          Swal.fire('ไม่พบประวัติ', 'ยังไม่มีข้อมูลการสะสมหรือแลกแต้มครับ', 'info');
          return;
        }

        let html = `<div style="max-height: 350px; overflow-y: auto;">`;
        logs.forEach(l => {
          const isEarn = l.type.stringValue === 'earn';
          const pts = l.points.integerValue;
          html += `
            <div class="history-item">
              <div>
                <div style="font-weight:bold;">${isEarn ? '☕ สะสมแต้ม' : '🎁 แลกรางวัล'}</div>
                <div class="history-date">${formatThaiDate(l.timestamp.timestampValue)}</div>
              </div>
              <div class="history-points ${isEarn ? 'pts-plus' : 'pts-minus'}">
                ${isEarn ? '+' : '-'}${pts}
              </div>
            </div>`;
        });
        html += `</div>`;

        Swal.fire({
          title: `ประวัติคุณ ${name}`,
          html: html,
          confirmButtonColor: '#8C7A6B'
        });

      } catch (e) { Swal.fire('Error', 'ไม่สามารถโหลดประวัติได้', 'error'); }
    }

    // 🧹 6. ล้างขยะ QR
    async function clearQRGarbage() {
      const ask = await Swal.fire({
        title: 'ล้างขยะ QR?', text: 'ลบประวัติการสแกนเพื่อประหยัดพื้นที่', icon: 'warning',
        showCancelButton: true, confirmButtonColor: '#C57B57'
      });

      if (ask.isConfirmed) {
        Swal.fire({ title: 'กำลังกวาดขยะ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const res = await fetch(`${BASE_URL}/used_qrs?key=${FIREBASE_API_KEY}&pageSize=100`);
        const data = await res.json();
        if (data.documents) {
          for (const doc of data.documents) {
            await fetch(`https://firestore.googleapis.com/v1/${doc.name}?key=${FIREBASE_API_KEY}`, { method: 'DELETE' });
          }
          Swal.fire('สำเร็จ!', 'ล้างขยะ QR เรียบร้อยแล้วครับ', 'success');
        } else {
          Swal.fire('สะอาดแล้ว', 'ไม่มีขยะ QR ให้ล้างครับ', 'success');
        }
      }
    }

    document.addEventListener("DOMContentLoaded", fetchUsers);
  </script>
</body>
</html>
