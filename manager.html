<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KUB CAFE MANAGER</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root {
      --bg-color: #F9F8F6;
      --card-bg: #FFFFFF;
      --text-main: #4A3F35;
      --text-muted: #9A958F;
      --primary-green: #A3B18A;
      --border-color: #EAE5D9;
      --btn-edit: #E8A87C;
      --btn-refresh: #FFFFFF;
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      color: var(--text-main);
    }

    .header-container {
      max-width: 1000px;
      margin: 0 auto 20px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 24px;
      color: #8C7A6B;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card {
      background-color: var(--card-bg);
      max-width: 1000px;
      margin: 0 auto;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(140, 122, 107, 0.08);
      padding: 25px;
      border: 1px solid var(--border-color);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--border-color);
    }

    .card-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-refresh {
      background-color: var(--btn-refresh);
      color: var(--text-main);
    }

    .btn-refresh:hover {
      background-color: #f1f1f1;
    }

    .btn-edit {
      background-color: var(--btn-edit);
      color: #fff;
      border: none;
      padding: 6px 12px;
      font-size: 13px;
    }

    .btn-edit:hover {
      background-color: #D69365;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 14px;
      padding: 12px 10px;
      border-bottom: 2px solid var(--border-color);
    }

    td {
      padding: 15px 10px;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
      font-size: 15px;
    }

    .profile-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-color);
    }

    .no-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #EAE5D9;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
    }

    .pill-green {
      background-color: var(--primary-green);
      color: #fff;
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: bold;
      display: inline-block;
    }

    .pill-gray {
      background-color: #EAE5D9;
      color: var(--text-main);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    .user-name {
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: bold;
    }
    
    .loading-text {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="header-container">
    <h1>☕ KUB CAFE MANAGER</h1>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>รายชื่อสมาชิกล่าสุด</h2>
      <button class="btn btn-refresh" onclick="fetchUsers()">🔄 อัปเดตข้อมูล</button>
    </div>

    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>ลำดับ</th>
            <th>ชื่อลูกค้า</th>
            <th>แต้มสะสม</th>
            <th>แต้มเก่า</th>
            <th>ภาษา</th>
            <th>อัปเดตล่าสุด</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="user-table-body">
          <tr>
            <td colspan="7" class="loading-text">กำลังโหลดข้อมูล...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const FIREBASE_PROJECT_ID = "kub-cafe-pos";
    const FIREBASE_API_KEY = "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tLE";
    const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/users`;

    // แปลงวันที่ ISO เป็นรูปแบบภาษาไทย
    function formatThaiDate(isoString) {
      if (!isoString) return "-";
      const date = new Date(isoString);
      const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
      const d = date.getDate();
      const m = months[date.getMonth()];
      const y = date.getFullYear() + 543;
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${d} ${m} ${y} ${hours}:${minutes} น.`;
    }

    // โหลดข้อมูลลูกค้าจาก Firebase
    async function fetchUsers() {
      const tbody = document.getElementById('user-table-body');
      tbody.innerHTML = '<tr><td colspan="7" class="loading-text">กำลังโหลดข้อมูล...</td></tr>';

      try {
        const response = await fetch(`${FIRESTORE_BASE}?key=${FIREBASE_API_KEY}&pageSize=100`);
        const data = await response.json();
        
        tbody.innerHTML = '';

        if (!data.documents || data.documents.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="loading-text">ยังไม่มีข้อมูลสมาชิก</td></tr>';
          return;
        }

        // เรียงลำดับตามวันที่อัปเดตล่าสุด (ใหม่สุดขึ้นก่อน)
        const users = data.documents.map(doc => {
          const fields = doc.fields || {};
          const paths = doc.name.split('/');
          return {
            id: paths[paths.length - 1],
            displayName: fields.displayName?.stringValue || 'ไม่ระบุชื่อ',
            pictureUrl: fields.pictureUrl?.stringValue || '',
            totalPoints: parseInt(fields.totalPoints?.integerValue) || 0,
            legacyPoints: parseInt(fields.legacyPoints?.integerValue) || 0,
            lang: fields.lang?.stringValue || 'TH',
            lastUpdated: fields.lastUpdated?.timestampValue || ''
          };
        }).sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated));

        // สร้างตาราง
        users.forEach((user, index) => {
          // 1. ดึงรูปโปรไฟล์
          const picHtml = user.pictureUrl 
            ? `<img src="${user.pictureUrl}" class="profile-pic">` 
            : `<div class="no-pic">👤</div>`;
          
          // 2. ซ่อนแต้มเก่าที่ติดลบให้แสดงเป็น 0
          const safeLegacy = Math.max(0, user.legacyPoints);

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="color: #9A958F;">${index + 1}</td>
            <td>
              <div class="user-name">
                ${picHtml}
                ${user.displayName}
              </div>
            </td>
            <td><span class="pill-green">${user.totalPoints}</span></td>
            <td style="color: #8C7A6B; font-weight: bold;">${safeLegacy}</td>
            <td><span class="pill-gray">${user.lang}</span></td>
            <td style="font-size: 13px; color: #6C6863;">${formatThaiDate(user.lastUpdated)}</td>
            <td>
              <button class="btn btn-edit" onclick="editUserPoints('${user.id}', '${user.displayName}', ${user.totalPoints})">
                ✏️ แก้ไข
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (error) {
        console.error("Error fetching users:", error);
        tbody.innerHTML = '<tr><td colspan="7" class="loading-text" style="color:red;">โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่</td></tr>';
      }
    }

    // ฟังก์ชันเปิดหน้าต่างแก้ไขแต้ม
    async function editUserPoints(userId, userName, currentPoints) {
      const { value: newPoints } = await Swal.fire({
        title: `แก้ไขแต้ม`,
        html: `กำหนดแต้มใหม่ให้กับ<br><b>${userName}</b>`,
        input: 'number',
        inputValue: currentPoints,
        inputAttributes: { min: 0, step: 1 },
        showCancelButton: true,
        confirmButtonText: 'บันทึก',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#A3B18A',
        cancelButtonColor: '#E8A87C',
        customClass: {
          popup: 'custom-swal-popup'
        }
      });

      if (newPoints !== undefined && newPoints !== null && newPoints !== "") {
        const pts = parseInt(newPoints);
        if (isNaN(pts) || pts < 0) {
          Swal.fire('ข้อผิดพลาด', 'กรุณาระบุตัวเลขแต้มที่ถูกต้อง (0 ขึ้นไป)', 'error');
          return;
        }

        Swal.fire({
          title: 'กำลังบันทึกข้อมูล...',
          allowOutsideClick: false,
          didOpen: () => { Swal.showLoading(); }
        });

        try {
          // อัปเดตข้อมูลแต้มและเวลาล่าสุดกลับไปยัง Firestore
          const nowIso = new Date().toISOString();
          const updateUrl = `${FIRESTORE_BASE}/${userId}?updateMask.fieldPaths=totalPoints&updateMask.fieldPaths=lastUpdated&key=${FIREBASE_API_KEY}`;
          
          const response = await fetch(updateUrl, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              fields: { 
                totalPoints: { integerValue: pts },
                lastUpdated: { timestampValue: nowIso }
              }
            })
          });

          if (response.ok) {
            Swal.fire({
              title: 'สำเร็จ!', 
              text: `อัปเดตแต้มของ ${userName} เป็น ${pts} แต้มแล้ว`, 
              icon: 'success',
              confirmButtonColor: '#A3B18A'
            }).then(() => {
              fetchUsers(); // โหลดตารางใหม่
            });
          } else {
            throw new Error('Network error');
          }
        } catch (error) {
          Swal.fire('บันทึกไม่สำเร็จ', 'เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
        }
      }
    }

    // โหลดข้อมูลอัตโนมัติตอนเปิดหน้าเว็บ
    document.addEventListener("DOMContentLoaded", fetchUsers);
  </script>
</body>
</html>
