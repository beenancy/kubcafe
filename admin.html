<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>KUB Cafe - Admin POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    :root { --bg-cream: #FDFCF0; --card-white: #FFFFFF; --text-brown: #4A3F35; --text-light: #B0A69D; --matcha-green: #A3B18A; --matcha-dark: #7A8B62; --line-green: #06C755; --true-orange: #FF6600; --bank-blue: #1565C0; --border-color: #E8E2D9; }
    body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; background-color: var(--bg-cream); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; overflow-y: auto; -webkit-user-select: none; }
    #pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--matcha-green); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.3s; }
    #pin-overlay h2 { margin-bottom: 20px; font-size: 24px; letter-spacing: 2px; }
    #pin-input { width: 150px; text-align: center; font-size: 28px; padding: 10px; border: 3px solid white; border-radius: 15px; background: rgba(255,255,255,0.2); color: white; font-weight: bold; margin-bottom: 20px; outline: none; }
    #btn-unlock { background: white; color: var(--matcha-dark); border: none; padding: 12px 40px; border-radius: 20px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }
    
    #main-app { display: none; flex-direction: column; min-height: 100vh; position: relative; }
    .top-nav { position: absolute; top: 15px; left: 15px; z-index: 100; }
    .btn-home { background: rgba(255, 255, 255, 0.9); border: 2px solid var(--border-color); color: var(--text-brown); padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer; box-shadow: 0 4px 10px rgba(140, 122, 107, 0.1); display: flex; align-items: center; gap: 5px; text-decoration: none; backdrop-filter: blur(5px); }
    .preview-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; min-height: 250px; margin-top: 40px; }
    .qr-preview-box { background: white; padding: 8px; border-radius: 16px; border: 2px solid var(--border-color); display: flex; justify-content: center; align-items: center; width: 100%; max-width: 280px; aspect-ratio: 1/1; margin-bottom: 12px; cursor: pointer; box-shadow: 0 10px 25px rgba(140, 122, 107, 0.1); }
    .qr-preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
    .refresh-hint { font-size: 12px; color: var(--text-light); font-weight: bold; text-align: center; }
    .control-section { background: var(--card-white); padding: 15px 15px max(20px, env(safe-area-inset-bottom)) 15px; border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -10px 20px rgba(140, 122, 107, 0.08); display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
    .custom-point-row { display: flex; justify-content: space-between; align-items: center; background: var(--bg-cream); padding: 10px 15px; border-radius: 14px; }
    .input-group { display: flex; align-items: center; gap: 8px; }
    #sync-status-label { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; font-weight: 800; color: var(--text-brown); background: white; padding: 6px 12px; border-radius: 10px; border: 1px solid var(--border-color); }
    .custom-input { width: 55px; text-align: center; font-size: 20px; font-weight: bold; color: var(--matcha-dark); border: 1px solid var(--border-color); border-radius: 10px; padding: 6px; background: white; }
    .timer-text { font-size: 13px; font-weight: bold; color: #C57B57; }
    .keypad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .btn-key { background: #EAF0E4; color: var(--matcha-dark); border: none; border-radius: 14px; padding: 15px 0; font-size: 22px; font-weight: 900; box-shadow: 0 4px 0 #D5E0CB; transition: transform 0.1s; cursor: pointer; }
    .btn-key:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
    .btn-line { background: var(--line-green); color: white; font-size: 13px; box-shadow: 0 4px 0 #04A044; }
    .btn-true { background: var(--true-orange); color: white; font-size: 13px; box-shadow: 0 4px 0 #CC5200; }
    .btn-bank { background: var(--bank-blue); color: white; font-size: 13px; box-shadow: 0 4px 0 #0E4788; }
    .btn-action-group { display: flex; gap: 10px; margin-top: 5px; }
    .btn-copy { background: #F4EEFF; color: #8A56E2; border: 1px dashed #B89AEB; width: 100%; padding: 12px; border-radius: 14px; font-size: 14px; font-weight: bold; flex: 2; cursor: pointer; }
    .btn-lock { background: #FFEBEE; color: #D32F2F; border: 1px dashed #EF9A9A; width: 100%; padding: 12px; border-radius: 14px; font-size: 14px; font-weight: bold; flex: 1; cursor: pointer; }

    /* 🚀 สไตล์ระบบแจ้งเตือน KDS */
    #kds-toast-container { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; pointer-events: none; }
    .kds-toast { background: white; border-left: 8px solid #D84315; border-radius: 14px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: auto; cursor: pointer; display: flex; flex-direction: column; }
    .kds-toast-title { margin: 0 0 5px; color: #D84315; font-size: 18px; font-weight: bold; }
    .kds-toast-desc { margin: 0; color: var(--text-brown); font-size: 14px; font-weight: bold; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <audio id="kds-chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

  <div id="kds-toast-container"></div>

  <div id="pin-overlay">
    <h2>KUB POS SECURE</h2>
    <input type="password" id="pin-input" inputmode="numeric" pattern="[0-9]*" placeholder="PIN" maxlength="4">
    <button id="btn-unlock" onclick="checkPin()">UNLOCK</button>
  </div>

  <div id="main-app">
    <div class="top-nav"><a href="portal.html" class="btn-home">🏠 หน้าหลัก</a></div>
    <div class="preview-section">
      <div class="qr-preview-box" onclick="refreshCurrentPoint()">
        <img id="qr-preview-img" src="https://via.placeholder.com/300x300.png?text=STANDBY" alt="QR Preview">
      </div>
      <div class="refresh-hint">🔄 แตะที่รูปเพื่อรีเฟรชแต้มเดิมใหม่<br>(หากทิ้งไว้ 5 นาที ระบบจะเด้งเป็น 1 แต้มอัตโนมัติ)</div>
    </div>

    <div class="control-section">
      <div class="custom-point-row">
        <div class="input-group">
          <span id="sync-status-label">⚪ ว่าง</span>
          <input type="number" inputmode="numeric" pattern="[0-9]*" id="custom-pts" class="custom-input" placeholder="0" oninput="handleCustomInput(this.value)">
        </div>
        <div class="timer-text" id="timer-display">---</div>
      </div>

      <div class="keypad-grid">
        <button class="btn-key" onclick="fireAction('points', 1)">1</button>
        <button class="btn-key" onclick="fireAction('points', 2)">2</button>
        <button class="btn-key" onclick="fireAction('points', 3)">3</button>
        <button class="btn-key btn-line" onclick="fireAction('store_line')">LINE</button>

        <button class="btn-key" onclick="fireAction('points', 4)">4</button>
        <button class="btn-key" onclick="fireAction('points', 5)">5</button>
        <button class="btn-key" onclick="fireAction('points', 6)">6</button>
        <button class="btn-key btn-true" onclick="fireAction('true_payment')">True</button>

        <button class="btn-key" onclick="fireAction('points', 7)">7</button>
        <button class="btn-key" onclick="fireAction('points', 8)">8</button>
        <button class="btn-key" onclick="fireAction('points', 9)">9</button>
        <button class="btn-key btn-bank" onclick="fireAction('payment')">Bank</button>
      </div>

      <div class="btn-action-group">
        <button class="btn-copy" onclick="copyCurrentLink()">📋 คัดลอกลิงก์ส่งให้ลูกค้า</button>
        <button class="btn-lock" onclick="lockSystem()">🔒 ล็อกจอ</button>
      </div>
    </div>
  </div>

  <script>
    const CLOUDFLARE_WORKER_URL = "https://kub-backend.nan23082526.workers.dev";
    let absoluteIdleTimeout = null;

    if(localStorage.getItem("kub_admin_unlocked") === "true") {
      document.getElementById('pin-overlay').style.display = 'none';
      document.getElementById('main-app').style.display = 'flex';
      initApp();
    }

    function checkPin() {
      const pin = document.getElementById('pin-input').value;
      if (pin.length === 4) {
        fetch(`${CLOUDFLARE_WORKER_URL}/api/pos-update`, {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': pin },
          body: JSON.stringify({ mode: 'idle' })
        }).then(res => {
          if (res.status === 200) {
            localStorage.setItem("kub_admin_pin", pin);
            localStorage.setItem("kub_admin_unlocked", "true");
            location.reload();
          } else { alert("รหัส PIN หลังบ้านไม่ถูกต้องครับ"); }
        }).catch(() => alert("เชื่อมต่อตัวคุมระบบหลังบ้านล้มเหลว"));
      }
    }

    function lockSystem() {
      localStorage.removeItem("kub_admin_unlocked");
      localStorage.removeItem("kub_admin_pin");
      location.reload();
    }

    function resetActivityTimer() {
      clearTimeout(absoluteIdleTimeout);
      absoluteIdleTimeout = setTimeout(() => { fireAction('idle'); }, 1200000); 
    }

    // 🚀 ฟังก์ชันปลดล็อกเสียง (ทำงานครั้งแรกที่แตะจอ)
    let audioUnlocked = false;
    function unlockAudioContext() {
      if(audioUnlocked) return;
      const chime = document.getElementById('kds-chime');
      chime.play().then(() => {
        chime.pause();
        chime.currentTime = 0;
        audioUnlocked = true;
      }).catch(err => console.log("Audio unlock pending..."));
    }

    function initApp() {
      // 🚀 อัปเดตใส่กุญแจเต็มชุด (ดึงมาจากไฟล์ index.html)
      const firebaseConfig = {
        apiKey: "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tlE",
        authDomain: "kub-cafe-pos.firebaseapp.com",
        databaseURL: "https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kub-cafe-pos",
        storageBucket: "kub-cafe-pos.firebasestorage.app"
      };
      
      if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
      const db = firebase.database();
      
      window.syncedState = { mode: 'idle', points: 0, timestamp: 0 };
      window.currentLiffUrl = "";
      window.globalTimerInterval = null;
      window.inputDebounce = null;

      // ดัก Event การแตะจอครั้งแรกเพื่อปลดล็อกเสียง
      document.body.addEventListener('click', unlockAudioContext, { once: true });
      document.body.addEventListener('touchstart', unlockAudioContext, { once: true });

      document.addEventListener('touchstart', resetActivityTimer);
      document.addEventListener('click', resetActivityTimer);
      document.addEventListener('input', resetActivityTimer);
      resetActivityTimer(); 

      db.ref('pos_display').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        window.syncedState = data;
        
        if(data.mode === 'points') {
          const hash = data.hash || ''; 
          window.currentLiffUrl = `https://liff.line.me/2010206186-u1XRJldq?code=KUBBAR-${data.points}-${data.timestamp}-${hash}`;
        }
        updateAdminUI(data);
      });

      // 🚀 เริ่มระบบดักฟัง KDS แบบล่องหน
      initKDSListener(db);
    }

    // 🚀 ฟังก์ชันดักฟังและสร้างการ์ดออเดอร์
    function initKDSListener(db) {
      db.ref('kds_orders').orderByChild('status').equalTo('pending').on('child_added', (snapshot) => {
        const order = snapshot.val();
        if (order && order.id) {
          // เล่นเสียงแจ้งเตือน
          const chime = document.getElementById('kds-chime');
          chime.currentTime = 0;
          chime.play().catch(e => console.log("รอการทัชสกรีนเพื่อเล่นเสียง"));

          // เด้งการ์ด Popup ลงมา
          showKdsToast(order, snapshot.key, db);
        }
      });
    }

    // 🚀 ฟังก์ชันสร้าง Toast Card
    function showKdsToast(order, dbKey, db) {
      const container = document.getElementById('kds-toast-container');
      const toast = document.createElement('div');
      toast.className = 'kds-toast';
      
      const timeStr = new Date(order.timestamp).toLocaleTimeString('th-TH');
      
      toast.innerHTML = `
        <div class="kds-toast-title">🎁 ${order.item}</div>
        <div class="kds-toast-desc">👤 ลูกค้า: ${order.customerName}</div>
        <div style="font-size: 12px; color: #B0A69D; margin-top: 8px;">
          ⏱️ ${timeStr} | แตะการ์ดนี้เพื่อซ่อน
        </div>
      `;
      
      // เมื่อบาริสต้าแตะที่การ์ด -> ปิดการ์ด + อัปเดต DB ให้หายไป
      toast.onclick = () => {
        toast.style.animation = "slideDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) reverse forwards";
        setTimeout(() => toast.remove(), 300);
        db.ref('kds_orders').child(dbKey).update({ status: 'completed' });
      };

      // แทรกการ์ดใหม่ไว้บนสุด
      container.prepend(toast);
    }

    function updateAdminUI(data) {
      clearInterval(window.globalTimerInterval);
      const label = document.getElementById('sync-status-label');
      const previewImg = document.getElementById('qr-preview-img');
      const timerDisplay = document.getElementById('timer-display');

      if (data.mode === "idle") {
        label.innerHTML = "⚪ ว่าง (STANDBY)"; label.style.color = "#B0A69D"; label.style.backgroundColor = "white"; label.style.borderColor = "var(--border-color)";
        previewImg.src = "https://via.placeholder.com/300x300.png?text=STANDBY";
        timerDisplay.innerText = "---"; window.currentLiffUrl = "";
      } 
      else if (data.mode === "points") {
        label.innerHTML = `☕ <b style="font-size: 18px; color: #D32F2F;">${data.points}</b> <span style="color: #D32F2F;">แต้ม</span>`; 
        label.style.color = "#D32F2F"; label.style.backgroundColor = "#FFEBEE"; label.style.borderColor = "#EF9A9A";
        previewImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.currentLiffUrl)}`;
        startGlobalTimer(data.timestamp);
      } 
      else if (data.mode === "store_line") {
        label.innerHTML = `💬 LINE OA`; label.style.color = "#06C755"; label.style.backgroundColor = "white"; label.style.borderColor = "var(--border-color)";
        previewImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent("https://line.me/R/ti/p/@848dmzja")}`; timerDisplay.innerText = "---";
      } 
      else if (data.mode === "payment") {
        label.innerHTML = `🏦 ธนาคาร`; label.style.color = "#1565C0"; label.style.backgroundColor = "white"; label.style.borderColor = "var(--border-color)";
        previewImg.src = "https://raw.githubusercontent.com/beenancy/kubcafe/eccfab9beafd7e3dbab13523292cd3cb15dbff74/qr%20kshop.jpg"; timerDisplay.innerText = "---";
      } 
      else if (data.mode === "true_payment") {
        label.innerHTML = `🧡 TrueMoney`; label.style.color = "#FF6600"; label.style.backgroundColor = "white"; label.style.borderColor = "var(--border-color)";
        previewImg.src = "https://raw.githubusercontent.com/beenancy/kubcafe/914d5947e4c635a2bf03f3f123dd837c2b0b29a2/truescan.jpg"; timerDisplay.innerText = "---";
      }
    }

    function startGlobalTimer(startTimeMs) {
      window.globalTimerInterval = setInterval(() => {
        const remain = (5 * 60) - Math.floor((Date.now() - startTimeMs) / 1000);
        if (remain < 0) {
          clearInterval(window.globalTimerInterval);
          document.getElementById('timer-display').innerText = "กำลังรีเฟรชเป็น 1 แต้ม...";
          fireAction('points', 1);
          return;
        }
        document.getElementById('timer-display').innerText = `เหลือเวลา: ${Math.floor(remain / 60)}:${String(remain % 60).padStart(2, '0')}`;
      }, 1000);
    }

    function fireAction(mode, points = 0) {
      document.getElementById('custom-pts').value = '';
      const activePin = localStorage.getItem("kub_admin_pin");
      fetch(`${CLOUDFLARE_WORKER_URL}/api/pos-update`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': activePin },
        body: JSON.stringify({ mode, points, timestamp: Date.now() })
      });
    }

    function handleCustomInput(val) {
      clearTimeout(window.inputDebounce);
      window.inputDebounce = setTimeout(() => { const pts = parseInt(val); if (pts > 0) fireAction('points', pts); }, 400); 
    }

    function refreshCurrentPoint() {
      if (window.syncedState.mode === 'points' && window.syncedState.points > 0) { fireAction('points', window.syncedState.points); } else { fireAction('idle'); }
    }

    // 🚀 ฟังก์ชันคัดลอกลิงก์พร้อมข้อความ (ปรับแจ้งเตือนให้ระบุอายุ 24 ชั่วโมง)
    function copyCurrentLink() {
      if (!window.currentLiffUrl || window.syncedState.mode !== 'points') { 
        alert("หน้าจอปัจจุบันไม่ใช่โหมดแจกแต้มครับ"); return; 
      }
      
      const specialLink = window.currentLiffUrl.replace("KUBBAR-", "KUBLINK-");
      const pts = window.syncedState.points;
      
      // ข้อความ Template ระบุอายุการใช้งาน 24 ชม.
      const textMsg = `☕ รับไปเลย ${pts} แต้ม! 🎉\n\nขอบคุณที่อุดหนุน KUB Cafe นะคะ กดที่ลิงก์ด้านล่างเพื่อสะสมแต้มเข้าบัตรสมาชิกได้เลยค่ะ 👇\n${specialLink}\n\n*หมายเหตุ: ลิงก์นี้ใช้ได้เพียง 1 สิทธิ์เท่านั้น และมีอายุการใช้งาน 24 ชั่วโมงค่ะ ⏰`;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(textMsg).then(() => {
          alert("คัดลอกข้อความพร้อมลิงก์สำเร็จ! 🎉 นำไปวางส่งให้ลูกค้าได้เลยครับ");
        }).catch(() => fallbackCopy(textMsg));
      } else {
        fallbackCopy(textMsg);
      }
    }
    
    function fallbackCopy(text) {
      const tmpInput = document.createElement("textarea");
      tmpInput.value = text;
      document.body.appendChild(tmpInput);
      tmpInput.select();
      document.execCommand("copy");
      document.body.removeChild(tmpInput);
      alert("คัดลอกข้อความพร้อมลิงก์สำเร็จ! 🎉 นำไปวางส่งให้ลูกค้าได้เลยครับ");
    }
  </script>
</body>
</html>
