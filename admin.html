<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Admin POS v5.1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; min-height: 100dvh;
      background-color: #FDFCF0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }

    .pos-container {
      width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    h1 { margin: 0; color: #4A3F35; font-size: clamp(24px, 6vw, 28px); text-align: center; }

    .numpad { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; }

    .btn-point {
      background-color: #A3B18A; color: white; border: none; border-radius: 16px;
      padding: 20px 0; font-size: clamp(20px, 5vw, 24px); font-weight: bold;
      box-shadow: 0 6px 15px rgba(163, 177, 138, 0.4); cursor: pointer; transition: transform 0.1s;
    }
    .btn-point:active { transform: scale(0.95); }

    .btn-action {
      width: 100%; background-color: #C57B57; color: white; border: none; border-radius: 12px;
      padding: 15px 0; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(197, 123, 87, 0.3);
    }
    .btn-refresh { background-color: #8C7A6B; }
  </style>
</head>
<body>

  <div class="pos-container">
    <h1>KUB POS <span style="font-size:12px; font-weight:normal;">v5.1</span></h1>
    
    <div class="numpad">
      <button class="btn-point" onclick="generateQR(1)">+1 แต้ม</button>
      <button class="btn-point" onclick="generateQR(2)">+2 แต้ม</button>
      <button class="btn-point" onclick="generateQR(3)">+3 แต้ม</button>
      <button class="btn-point" onclick="generateQR(4)">+4 แต้ม</button>
      <button class="btn-point" onclick="generateQR(5)" style="grid-column: span 2;">+5 แต้ม</button>
    </div>

    <button class="btn-action btn-refresh" onclick="clearDisplay()">🔄 ล้างหน้าจอ (Refresh)</button>
    <button class="btn-action" onclick="copyLink()">🔗 คัดลอกลิงก์ส่งให้ลูกค้า</button>
  </div>

  <script>
    const SECRET_SALT = "KUB_SECRET_TOKEN_2026";
    const LIFF_URL = "https://liff.line.me/2010206186-u1XRJldq"; 
    
    const FIREBASE_PROJECT_ID = "kub-cafe-pos";
    const FIREBASE_API_KEY = "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tLE";
    
    // อัปเดตสถานะไปที่ Firebase ตรงเข้าหา Display.html
    async function syncToCloud(status, code = "", pts = 0) {
      const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/system/display_state?updateMask.fieldPaths=status&updateMask.fieldPaths=code&updateMask.fieldPaths=points&updateMask.fieldPaths=timestamp&key=${FIREBASE_API_KEY}`;
      
      try {
        await fetch(url, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fields: {
              status: { stringValue: status },
              code: { stringValue: code },
              points: { integerValue: pts },
              timestamp: { integerValue: Date.now() }
            }
          })
        });
      } catch (e) {
        console.error("Cloud Sync Failed:", e);
      }
    }

    let currentPoints = 0;

    function generateQR(pts) {
      currentPoints = pts;
      const timestamp = Date.now();
      const rawText = `${pts}-${timestamp}-${SECRET_SALT}`;
      const hash = CryptoJS.MD5(rawText).toString();
      
      const currentCode = `KUBBAR-${pts}-${timestamp}-${hash}`;
      
      // ส่งคำสั่งขึ้นคลาวด์ให้หน้าจอ Display แสดงผล
      syncToCloud("active", currentCode, pts);
      
      Swal.fire({ title: 'ส่งไปหน้าจอแล้ว', text: `แจก ${pts} แต้ม`, icon: 'success', timer: 1200, showConfirmButton: false });
    }

    function clearDisplay() {
      currentPoints = 0;
      // ส่งคำสั่งขึ้นคลาวด์ให้หน้าจอกลับไปสแตนด์บาย
      syncToCloud("standby");
      Swal.fire({ title: 'ล้างหน้าจอแล้ว', icon: 'info', timer: 1200, showConfirmButton: false });
    }

    function copyLink() {
      if (currentPoints === 0) return Swal.fire('ข้อผิดพลาด', 'กรุณากดเลือกแต้มก่อนคัดลอกลิงก์', 'error');
      
      const timestamp = Date.now();
      const rawText = `${currentPoints}-${timestamp}-${SECRET_SALT}`;
      const hash = CryptoJS.MD5(rawText).toString();
      const link = `${LIFF_URL}?code=KUB-${currentPoints}-${timestamp}-${hash}`;
      
      navigator.clipboard.writeText(link).then(() => {
        Swal.fire('คัดลอกสำเร็จ!', 'ส่งลิงก์นี้ให้ลูกค้าในแชทได้เลย (อายุ 2 ชม.)', 'success');
      });
    }
  </script>
</body>
</html>
