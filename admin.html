<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>KUB Cafe - Admin Control Panel (V.26.30)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  
  <!-- 🛢️ ติดตั้ง Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    body { text-align: center; font-family: sans-serif; padding: 20px; background: #fdfdfd; color: #2d3436; }
    h2 { font-weight: 800; margin-bottom: 5px; }
    p.desc { color: #636e72; font-size: 14px; margin-bottom: 20px; }
    .btn-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-width: 500px; margin: 0 auto 15px auto; }
    .point-btn { padding: 15px 0; font-size: 20px; background: #c1f2a1; color: #2d3436; border: none; border-radius: 12px; cursor: pointer; font-weight: 900; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; }
    .point-btn:active { transform: scale(0.95); background: #a8e6cf; }
    .line-btn { background: #06C755 !important; color: white !important; font-size: 14px !important; font-weight: bold !important; line-height: 1.2; display: flex; align-items: center; justify-content: center; }
    .line-btn:active { background: #05b04b !important; transform: scale(0.95); }
    .true-btn { background: #ff6600 !important; color: white !important; font-size: 16px !important; font-weight: bold !important; line-height: 1.2; display: flex; align-items: center; justify-content: center; }
    .true-btn:active { background: #e05500 !important; transform: scale(0.95); }
    .pay-btn { background: #004b87 !important; color: white !important; font-size: 13px !important; font-weight: bold !important; line-height: 1.2; display: flex; align-items: center; justify-content: center; }
    .pay-btn:active { background: #003366 !important; transform: scale(0.95); }
    
    .custom-input-container { background: #f1f2f6; padding: 15px; border-radius: 15px; max-width: 500px; margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .custom-input { width: 80px; font-size: 22px; padding: 8px; text-align: center; border: 2px solid #c1f2a1; border-radius: 10px; font-weight: bold; outline: none; color: #2d3436; }
    
    /* 📊 การ์ดรายงานสถานะสำหรับบาริสต้า */
    .control-status-card { margin-top: 10px; padding: 20px; background: #fff; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: none; max-width: 340px; margin-left: auto; margin-right: auto; }
    .copy-btn { margin-top: 15px; padding: 12px 20px; font-size: 15px; background: #e0ccff; color: #2d3436; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.03); transition: 0.2s; }
    .copy-btn:active { transform: scale(0.97); background: #d1b3ff; }
    #login-section { margin-top: 50px; }
    .pin-input { font-size: 24px; padding: 10px; width: 120px; text-align: center; letter-spacing: 5px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 15px; outline: none; }
    .login-btn { background: #2d3436; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .status-badge { display: inline-block; padding: 6px 15px; background: #e8f5e9; color: #2e7d32; font-weight: bold; border-radius: 20px; font-size: 14px; margin-top: 5px; margin-bottom: 5px; }

    /* 🖥️ กล่อง Live Preview จำลองหน้าจอลูกค้ามาไว้บนจอบาริสต้า */
    .live-preview-box {
      border: 2px dashed #b2bec3;
      border-radius: 15px;
      padding: 15px;
      background: #fafafa;
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .preview-img { width: 150px; height: auto; border-radius: 8px; border: 2px solid #ddd; display: block; margin: 10px auto; }
    .preview-title { font-size: 14px; font-weight: bold; color: #2d3436; margin-bottom: 5px; }
    .preview-footer-text { font-size: 10px; color: #7f8c8d; max-width: 250px; line-height: 1.3; }
  </style>
</head>
<body>
  <div id="login-section">
    <h2>กรุณากรอกรหัส PIN</h2>
    <p class="desc">เฉพาะพนักงาน KUB Cafe เท่านั้น</p>
    <input type="password" inputmode="numeric" pattern="[0-9]*" id="pin-code" class="pin-input" maxlength="4" placeholder="****">
    <br>
    <button class="login-btn" id="login-submit-btn" onclick="checkPIN()">เข้าสู่ระบบ</button>
  </div>

  <div id="admin-section" style="display: none;">
    <h2>แผงควบคุม KUB Cafe (บาริสต้า)</h2>
    <p class="desc">กดเลือกคำสั่งด้านล่าง ระบบจะซิงค์หน้าจอลูกค้าและสามารถคัดลอกลิงก์ส่งงานทางไกลได้ปกติค่ะ</p>
    
    <div class="btn-grid">
      <button class="point-btn" onclick="selectPoints(1, true)">1</button>
      <button class="point-btn" onclick="selectPoints(2, true)">2</button>
      <button class="point-btn" onclick="selectPoints(3, true)">3</button>
      <button class="point-btn" onclick="selectPoints(4, true)">4</button>
      <button class="point-btn" onclick="selectPoints(5, true)">5</button>
      <button class="point-btn line-btn" onclick="selectStoreLine()">LINE<br>ร้าน</button>
      <button class="point-btn" onclick="selectPoints(6, true)">6</button>
      <button class="point-btn" onclick="selectPoints(7, true)">7</button>
      <button class="point-btn" onclick="selectPoints(8, true)">8</button>
      <button class="point-btn" onclick="selectPoints(9, true)">9</button>
      <button class="point-btn true-btn" onclick="selectTruePayment()">True</button>
      <button class="point-btn pay-btn" onclick="selectPayment()">QR<br>รับเงิน</button>
    </div>

    <div class="custom-input-container">
      <label style="font-weight:bold; color:#2d3436;">ระบุแต้มเอง:</label>
      <input type="number" inputmode="numeric" pattern="[0-9]*" id="custom-point" class="custom-input" min="1" max="20" placeholder="0" oninput="handleCustomInput(this.value)">
    </div>

    <div class="control-status-card" id="control-status-card">
      <div style="font-weight: bold; color: #555; font-size: 13px;">สถานะระบบกลางปัจจุบัน:</div>
      <div id="live-status-text" class="status-badge">กำลังรอคำสั่ง...</div>
      
      <!-- 📋 🚨 ดึงระบบแผงรีโมทคัดลอกลิงก์กลับคืนมาประจำการ 100% ตามเดิม ไม่มีการตัดออกอีกต่อไป -->
      <div id="remote-link-section" style="display: none; margin-top: 5px; padding-top: 5px;">
        <button class="copy-btn" id="copy-btn" onclick="copyToClipboard()">📋 คัดลอกลิงก์ส่งให้ลูกค้าทางไลน์</button>
        <div style="font-size: 11px; color:#e74c3c; font-weight:bold; margin-top:10px; margin-bottom: 5px; cursor:pointer;" onclick="refreshQR()">🔄 สุ่มรหัสใหม่ (แต้มเดิม)</div>
      </div>

      <!-- 🖥️ กล่อง Live Preview แสดงภาพพรีวิวควบคู่ไปพร้อมกันเพื่อเช็คสถานะจอหน้าร้าน -->
      <div class="live-preview-box">
        <div style="font-size: 10px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px;">👁️ หน้าจอฝั่งลูกค้าตอนนี้ (Live Preview)</div>
        <div id="prev-header" class="preview-title" style="font-size: 13px; margin-top: 5px;"></div>
        <img id="prev-img" class="preview-img" src="" alt="พรีวิวหน้าจอ">
        <div id="prev-footer" class="preview-footer-text"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxpWU8NlPwIk4EChzbG93IJ0RxFf3qSbs4TDT5MSVOgVWLO3cQAYseD_xAWzOeewJvHrg/exec";
    const SCAN_LIFF_ID = "2010206186-u1XRJldq"; 
    const SECRET_SALT = 'KUB_SECRET_TOKEN_2026'; 
    const STORE_LINE_OA_LINK = "https://line.me/R/ti/p/@848dmzja"; 
    const PAYMENT_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/eccfab9beafd7e3dbab13523292cd3cb15dbff74/qr%20kshop.jpg";
    const TRUE_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/914d5947e4c635a2bf03f3f123dd837c2b0b29a2/truescan.jpg";

    const firebaseConfig = {
      apiKey: "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tlE",
      authDomain: "kub-cafe-pos.firebaseapp.com",
      databaseURL: "https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kub-cafe-pos",
      storageBucket: "kub-cafe-pos.firebasestorage.app",
      messagingSenderId: "980123459582",
      appId: "1:980123459582:web:8d1b54a7e1317975e06aaf",
      measurementId: "G-FTTX7BDSYD"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentGlobalState = {};
    let localTimer;

    async function checkPIN() {
      const pinInput = document.getElementById('pin-code').value;
      const loginBtn = document.getElementById('login-submit-btn');
      if(pinInput.length !== 4 || isNaN(pinInput)) { alert("กรุณากรอกรหัสเป็นตัวเลขให้ครบ 4 หลักค่ะ"); return; }
      loginBtn.innerText = "กำลังตรวจสอบ..."; loginBtn.disabled = true;
      try {
        const response = await fetch(`${API_URL}?action=checkAdminPIN&pin=${encodeURIComponent(pinInput)}`);
        const data = await response.json();
        if(data.status === "success") {
          document.getElementById('login-section').style.display = "none";
          document.getElementById('admin-section').style.display = "block";
          initRealtimeListener(); 
        } else {
          alert(data.message || "รหัส PIN ไม่ถูกต้อง"); document.getElementById('pin-code').value = "";
          loginBtn.innerText = "เข้าสู่ระบบ"; loginBtn.disabled = false;
        }
      } catch (err) { alert("การเชื่อมต่อระบบหลังบ้านขัดข้อง"); loginBtn.innerText = "เข้าสู่ระบบ"; loginBtn.disabled = false; }
    }

    function selectPoints(points, clearInput = false) {
      if (clearInput) { document.getElementById('custom-point').value = ""; }
      db.ref('pos_display').set({
        mode: "points",
        points: points,
        timestamp: new Date().getTime() 
      });
    }

    function selectStoreLine() { document.getElementById('custom-point').value = ""; db.ref('pos_display').set({ mode: "store_line" }); }
    function selectPayment() { document.getElementById('custom-point').value = ""; db.ref('pos_display').set({ mode: "payment" }); }
    function selectTruePayment() { document.getElementById('custom-point').value = ""; db.ref('pos_display').set({ mode: "true_payment" }); }

    function handleCustomInput(val) {
      let pts = parseInt(val, 10);
      if (isNaN(pts) || pts <= 0) { return; }
      if (pts > 20) { 
        alert("จำกัดการออกแต้มอิสระสูงสุดครั้งละ 20 แต้มค่ะ");
        document.getElementById('custom-point').value = 20;
        pts = 20;
      }
      selectPoints(pts, false);
    }

    function refreshQR() {
      if (currentGlobalState.mode === "points" && currentGlobalState.points > 0) {
        selectPoints(currentGlobalState.points, false);
      }
    }

    function initRealtimeListener() {
      db.ref('pos_display').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        currentGlobalState = data;
        updateAdminControlUI(data);
      });
    }

    function updateAdminControlUI(data) {
      clearInterval(localTimer);
      const statusText = document.getElementById('live-status-text');
      const remoteSection = document.getElementById('remote-link-section');
      
      const prevHeader = document.getElementById('prev-header');
      const prevImg = document.getElementById('prev-img');
      const prevFooter = document.getElementById('prev-footer');
      
      document.getElementById('control-status-card').style.display = "block";
      
      if (data.mode === "points") {
        statusText.innerText = `โหมดออกแต้มสะสม [ ${data.points} แต้ม ]`;
        statusText.style.background = "#e8f5e9";
        statusText.style.color = "#2e7d32";
        remoteSection.style.display = "block";
        
        const rawString = data.points + "-" + data.timestamp + "-" + SECRET_SALT;
        const hash = CryptoJS.MD5(rawString).toString();
        const secretCode = "KUBBAR-" + data.points + "-" + data.timestamp + "-" + hash; 
        const liffUrl = "https://liff.line.me/" + SCAN_LIFF_ID + "?code=" + secretCode;
        
        prevHeader.innerHTML = `สแกนรับ <span style="color:#27ae60;">${data.points}</span> แต้ม`;
        prevImg.style.border = "2px solid #c1f2a1";
        prevImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(liffUrl);
        prevFooter.innerHTML = "⏱️ กำลังนับถอยหลังอายุคิวอาร์โค้ด 5 นาที...";

        let limit = 5 * 60;
        localTimer = setInterval(() => {
          let elapsed = Math.floor((new Date().getTime() - data.timestamp) / 1000);
          let remain = limit - elapsed;
          if (remain < 0) { clearInterval(localTimer); selectPoints(1, true); return; }
          let m = Math.floor(remain / 60); let s = remain % 60;
          prevFooter.innerHTML = `⏱️ อายุโค้ดเหลือ: ${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
      } 
      else if (data.mode === "store_line") {
        statusText.innerText = "โหมด LINE ร้าน OA";
        statusText.style.background = "#e8f5e9";
        statusText.style.color = "#06C755";
        remoteSection.style.display = "none";
        
        prevHeader.innerHTML = "<span style='color:#06C755;'>LINE Official Account</span>";
        prevImg.style.border = "2px solid #06C755";
        prevImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(STORE_LINE_OA_LINK);
        prevFooter.innerHTML = "ลูกค้าสแกนเพื่อเพิ่มเพื่อน/เช็คแต้ม";
      } 
      else if (data.mode === "payment") {
        statusText.innerText = "โหมดป้ายเงินสด (ธนาคาร)";
        statusText.style.background = "#e3f2fd";
        statusText.style.color = "#0d47a1";
        remoteSection.style.display = "none";
        
        prevHeader.innerHTML = "คิวอาร์โค้ดพร้อมเพย์ (K Shop)";
        prevImg.style.border = "none";
        prevImg.src = PAYMENT_IMAGE_URL;
        prevFooter.innerHTML = "⚠️ บังคับแอปธนาคารสแกนจ่ายเท่านั้น";
      } 
      else if (data.mode === "true_payment") {
        statusText.innerText = "โหมดป้าย TrueMoney";
        statusText.style.background = "#fff3e0";
        statusText.style.color = "#e65100";
        remoteSection.style.display = "none";
        
        prevHeader.innerHTML = "คิวอาร์โค้ด TrueMoney Wallet";
        prevImg.style.border = "none";
        prevImg.src = TRUE_IMAGE_URL;
        prevFooter.innerHTML = "🔸 รองรับสแกนผ่านทรูมันนี่และแอปธนาคาร";
      }
    }

    function copyToClipboard() {
      if (currentGlobalState.mode !== "points") return;
      const timestamp = currentGlobalState.timestamp;
      const points = currentGlobalState.points;
      const rawString = points + "-" + timestamp + "-" + SECRET_SALT;
      const hash = CryptoJS.MD5(rawString).toString();
      const secretCode = "KUB-" + points + "-" + timestamp + "-" + hash; 
      const remoteLink = "https://liff.line.me/" + SCAN_LIFF_ID + "?code=" + secretCode;

      const text = "☕ รับแต้มสะสม KUB Cafe: " + remoteLink;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.innerText = "✅ คัดลอกสำเร็จ (รหัส KUB-)";
        setTimeout(() => { btn.innerText = "📋 คัดลอกลิงก์ส่งให้ลูกค้าทางไลน์"; }, 2500);
      }).catch(err => { alert("ไม่สามารถคัดลอกได้"); });
    }

    window.addEventListener('load', function() { document.getElementById('custom-point').value = ""; });
  </script>
</body>
</html>
