<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>KUB Cafe - Admin POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    :root {
      --bg-cream: #FDFCF0; --card-white: #FFFFFF; --text-brown: #4A3F35;
      --text-light: #B0A69D; --matcha-green: #A3B18A; --matcha-dark: #7A8B62;
      --line-green: #06C755; --true-orange: #FF6600; --bank-blue: #1565C0;
      --border-color: #E8E2D9;
    }

    body, html {
      margin: 0; padding: 0; 
      width: 100%; height: 100dvh; /* บังคับ 100% ของจอ */
      background-color: var(--bg-cream);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column;
      overflow: hidden; /* ปิด Scroll ถาวร */
      -webkit-user-select: none;
    }

    /* 📱 ส่วนบน: Preview หน้าจอลูกค้า */
    .preview-section {
      flex: 1; /* กินพื้นที่ที่เหลือ */
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px; min-height: 0; /* สำคัญมากเพื่อให้บีบตัวได้ */
    }

    .status-badge {
      background: white; padding: 8px 20px; border-radius: 20px;
      font-size: 18px; font-weight: bold; color: var(--text-brown);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 10px;
    }
    .status-badge span { color: var(--matcha-dark); font-size: 22px; }

    .qr-preview-box {
      background: white; padding: 10px; border-radius: 16px; border: 2px solid var(--border-color);
      display: flex; justify-content: center; align-items: center;
      height: 35vh; /* ล็อกความสูง QR ไม่ให้ใหญ่เกิน */
      aspect-ratio: 1/1; 
      margin-bottom: 10px;
    }
    .qr-preview-box img { width: 100%; height: 100%; object-fit: contain; }

    .timer-text { font-size: 13px; font-weight: bold; color: #C57B57; }

    /* 🎛️ ส่วนล่าง: แผงควบคุม (Control Panel) */
    .control-section {
      background: var(--card-white);
      padding: 15px 20px 25px 20px;
      border-top-left-radius: 30px; border-top-right-radius: 30px;
      box-shadow: 0 -10px 30px rgba(140, 122, 107, 0.1);
      display: flex; flex-direction: column; gap: 12px;
    }

    /* แถบระบุแต้มเอง */
    .custom-point-row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-cream); padding: 5px 15px; border-radius: 16px;
    }
    .custom-point-row label { font-size: 14px; font-weight: bold; color: var(--text-brown); }
    .custom-input {
      width: 60px; text-align: center; font-size: 18px; font-weight: bold; color: var(--matcha-dark);
      border: 1px solid var(--border-color); border-radius: 10px; padding: 5px; background: white;
    }
    .btn-custom { background: var(--matcha-green); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; }

    /* แผงปุ่ม 4x3 Grid */
    .keypad-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .btn-key {
      background: #EAF0E4; color: var(--matcha-dark);
      border: none; border-radius: 14px;
      padding: 15px 0; font-size: 22px; font-weight: 900;
      box-shadow: 0 4px 0 #D5E0CB;
      transition: all 0.1s;
    }
    .btn-key:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

    /* ปุ่มลัดพิเศษ */
    .btn-line { background: var(--line-green); color: white; font-size: 15px; box-shadow: 0 4px 0 #04A044; }
    .btn-true { background: var(--true-orange); color: white; font-size: 15px; box-shadow: 0 4px 0 #CC5200; }
    .btn-bank { background: var(--bank-blue); color: white; font-size: 15px; box-shadow: 0 4px 0 #0E4788; }
    
    .btn-copy { background: #F4EEFF; color: #8A56E2; border: 1px dashed #B89AEB; width: 100%; padding: 12px; border-radius: 14px; font-size: 14px; font-weight: bold; margin-top: 5px; }

  </style>
</head>
<body>

  <div class="preview-section">
    <div class="status-badge" id="status-badge">สถานะ: รอสั่งการ</div>
    <div class="qr-preview-box">
      <img id="qr-preview-img" src="https://via.placeholder.com/300x300.png?text=STANDBY" alt="QR Preview">
    </div>
    <div class="timer-text" id="timer-display">---</div>
  </div>

  <div class="control-section">
    
    <div class="custom-point-row">
      <label>ระบุแต้มเอง:</label>
      <input type="number" id="custom-pts" class="custom-input" value="10">
      <button class="btn-custom" onclick="sendCustomPoint()">ส่งแต้ม</button>
    </div>

    <div class="keypad-grid">
      <button class="btn-key" onclick="sendPoint(1)">1</button>
      <button class="btn-key" onclick="sendPoint(2)">2</button>
      <button class="btn-key" onclick="sendPoint(3)">3</button>
      <button class="btn-key btn-line" onclick="sendMode('store_line')">LINE<br>ร้าน</button>

      <button class="btn-key" onclick="sendPoint(4)">4</button>
      <button class="btn-key" onclick="sendPoint(5)">5</button>
      <button class="btn-key" onclick="sendPoint(6)">6</button>
      <button class="btn-key btn-true" onclick="sendMode('true_payment')">True</button>

      <button class="btn-key" onclick="sendPoint(7)">7</button>
      <button class="btn-key" onclick="sendPoint(8)">8</button>
      <button class="btn-key" onclick="sendPoint(9)">9</button>
      <button class="btn-key btn-bank" onclick="sendMode('payment')">QR<br>รับเงิน</button>
    </div>

    <button class="btn-copy" onclick="copyCurrentLink()">📋 คัดลอกลิงก์ส่งให้ลูกค้าทางไลน์</button>
  </div>

  <script>
    const SCAN_LIFF_ID = "2010206186-u1XRJldq"; 
    const SECRET_SALT = 'KUB_SECRET_TOKEN_2026'; 
    const STORE_LINE_OA_LINK = "https://line.me/R/ti/p/@848dmzja"; 
    const PAYMENT_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/eccfab9beafd7e3dbab13523292cd3cb15dbff74/qr%20kshop.jpg";
    const TRUE_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/914d5947e4c635a2bf03f3f123dd837c2b0b29a2/truescan.jpg";

    const firebaseConfig = {
      apiKey: "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tlE",
      authDomain: "kub-cafe-pos.firebaseapp.com",
      databaseURL: "https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kub-cafe-pos",
      storageBucket: "kub-cafe-pos.firebasestorage.app"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let currentLiffUrl = "";
    let localTimer;

    function sendPoint(pts) {
      const timestamp = Date.now();
      const hash = CryptoJS.MD5(`${pts}-${timestamp}-${SECRET_SALT}`).toString();
      const secretCode = `KUBBAR-${pts}-${timestamp}-${hash}`; 
      currentLiffUrl = `https://liff.line.me/${SCAN_LIFF_ID}?code=${secretCode}`;

      db.ref('pos_display').set({ mode: "points", points: pts, timestamp: timestamp });

      document.getElementById('status-badge').innerHTML = `สแกนรับ <span>${pts}</span> แต้ม`;
      document.getElementById('qr-preview-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(currentLiffUrl)}`;
      startLocalTimer();
    }

    function sendCustomPoint() {
      const pts = parseInt(document.getElementById('custom-pts').value);
      if(pts > 0) sendPoint(pts);
    }

    function sendMode(mode) {
      db.ref('pos_display').set({ mode: mode, timestamp: Date.now() });
      clearInterval(localTimer);
      document.getElementById('timer-display').innerText = "---";

      if(mode === 'store_line') {
        document.getElementById('status-badge').innerHTML = `โหมด: <span>เพิ่มเพื่อน LINE</span>`;
        document.getElementById('qr-preview-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(STORE_LINE_OA_LINK)}`;
      } else if(mode === 'payment') {
        document.getElementById('status-badge').innerHTML = `โหมด: <span>โอนเงินผ่านธนาคาร</span>`;
        document.getElementById('qr-preview-img').src = PAYMENT_IMAGE_URL;
      } else if(mode === 'true_payment') {
        document.getElementById('status-badge').innerHTML = `โหมด: <span>จ่ายผ่าน TrueMoney</span>`;
        document.getElementById('qr-preview-img').src = TRUE_IMAGE_URL;
      }
    }

    function startLocalTimer() {
      clearInterval(localTimer);
      let remain = 5 * 60;
      document.getElementById('timer-display').innerText = `รีเฟรชใหม่ใน: 05:00`;
      
      localTimer = setInterval(() => {
        remain--;
        if (remain < 0) {
          clearInterval(localTimer);
          document.getElementById('timer-display').innerText = "หมดเวลา (กลับสู่หน้าหลัก)";
          document.getElementById('qr-preview-img').src = "https://via.placeholder.com/300x300.png?text=STANDBY";
          document.getElementById('status-badge').innerHTML = "สถานะ: รอสั่งการ";
          return;
        }
        let m = Math.floor(remain / 60);
        let s = remain % 60;
        document.getElementById('timer-display').innerText = `รีเฟรชใหม่ใน: ${m}:${s < 10 ? '0'+s : s}`;
      }, 1000);
    }

    function copyCurrentLink() {
      if (!currentLiffUrl) { alert("กรุณากดสร้างแต้มก่อนคัดลอกลิงก์ครับ"); return; }
      navigator.clipboard.writeText(currentLiffUrl).then(() => {
        alert("คัดลอกลิงก์รับแต้มสำเร็จ! นำไปวางในแชทลูกค้าได้เลยครับ");
      });
    }
  </script>
</body>
</html>
