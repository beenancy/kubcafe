<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>KUB Cafe - Admin POS V.9.12</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    :root { 
      --bg-color: #E6E2D8; 
      --shadow-light: #ffffff; 
      --shadow-dark: #c9c4b8; 
      --text-brown: #4A3F35; 
      --text-light: #9A8F83; 
      --matcha-green: #A3B18A; 
      --matcha-dark: #7A8B62; 
      --line-green: #06C755; 
      --true-orange: #FF6600; 
      --bank-blue: #1565C0; 
      --border-color: #E8E2D9;
      --neu-out: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
      --neu-in: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
      --neu-out-sm: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
      --neu-in-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
    }
    body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; background-color: var(--bg-color); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; overflow-y: auto; -webkit-user-select: none; }
    
    #pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-brown); transition: opacity 0.3s; }
    #pin-overlay h2 { margin-bottom: 20px; font-size: 24px; letter-spacing: 2px; }
    #pin-input { width: 150px; text-align: center; font-size: 28px; padding: 15px; border: none; border-radius: 15px; background: var(--bg-color); box-shadow: var(--neu-in); color: var(--text-brown); font-weight: bold; margin-bottom: 30px; outline: none; }
    #btn-unlock { background: var(--bg-color); color: var(--matcha-dark); border: none; padding: 15px 40px; border-radius: 20px; font-size: 18px; font-weight: bold; box-shadow: var(--neu-out); cursor: pointer; transition: all 0.2s; }
    #btn-unlock:active { box-shadow: var(--neu-in); transform: scale(0.98); }
    
    #main-app { display: none; flex-direction: column; min-height: 100vh; position: relative; }
    .top-nav { position: absolute; top: 15px; left: 15px; z-index: 100; }
    .btn-home { background: var(--bg-color); border: none; color: var(--text-brown); padding: 10px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer; box-shadow: var(--neu-out-sm); display: flex; align-items: center; gap: 5px; text-decoration: none; transition: all 0.2s; }
    .btn-home:active { box-shadow: var(--neu-in-sm); transform: scale(0.98); }
    
    .preview-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; min-height: 250px; margin-top: 40px; }
    .qr-preview-box { background: var(--bg-color); padding: 12px; border-radius: 24px; border: none; display: flex; justify-content: center; align-items: center; width: 100%; max-width: 200px; height: 200px; aspect-ratio: 1/1; margin-bottom: 20px; cursor: pointer; box-shadow: var(--neu-out); overflow: hidden; transition: all 0.2s; }
    .qr-preview-box:active { box-shadow: var(--neu-in); transform: scale(0.98); }
    .qr-preview-box img { width: 100%; height: 100%; object-fit: contain; border-radius: 12px; }
    
    .refresh-hint { font-size: 12px; color: var(--text-light); font-weight: bold; text-align: center; }
    
    .control-section { background: var(--bg-color); padding: 25px 15px max(25px, env(safe-area-inset-bottom)) 15px; border-top-left-radius: 35px; border-top-right-radius: 35px; box-shadow: 0 -10px 30px rgba(180, 170, 150, 0.3); display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
    .custom-point-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 20px; box-shadow: var(--neu-in); }
    .input-group { display: flex; align-items: center; gap: 12px; }
    #sync-status-label { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 800; color: var(--text-brown); background: var(--bg-color); padding: 8px 12px; border-radius: 12px; border: none; box-shadow: var(--neu-out-sm); }
    .custom-input { width: 60px; text-align: center; font-size: 20px; font-weight: bold; color: var(--matcha-dark); border: none; border-radius: 12px; padding: 10px; background: var(--bg-color); box-shadow: var(--neu-in-sm); outline: none; }
    .timer-text { font-size: 14px; font-weight: bold; color: var(--accent-brick); }
    
    .keypad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 10px 5px; }
    .btn-key { background: var(--bg-color); color: var(--text-brown); border: none; border-radius: 16px; padding: 14px 0; font-size: 18px; font-weight: 900; box-shadow: var(--neu-out); transition: all 0.2s ease; cursor: pointer; }
    .btn-key:active { transform: scale(0.95); box-shadow: var(--neu-in); }
    .btn-line { color: var(--line-green); font-size: 11px; }
    .btn-true { color: var(--true-orange); font-size: 11px; }
    .btn-bank { color: var(--bank-blue); font-size: 11px; }
    
    .btn-action-group { display: flex; gap: 15px; margin-top: 10px; padding: 0 5px; }
    .btn-copy { background: var(--bg-color); color: #8A56E2; border: none; width: 100%; padding: 12px; border-radius: 16px; font-size: 11px; font-weight: bold; flex: 2; cursor: pointer; box-shadow: var(--neu-out); transition: all 0.2s; }
    .btn-copy:active { box-shadow: var(--neu-in); transform: scale(0.98); }
    .btn-lock { background: var(--bg-color); color: #D32F2F; border: none; width: 100%; padding: 12px; border-radius: 16px; font-size: 11px; font-weight: bold; flex: 1; cursor: pointer; box-shadow: var(--neu-out); transition: all 0.2s; }
    .btn-lock:active { box-shadow: var(--neu-in); transform: scale(0.98); }

    /* 🚀 สไตล์ระบบแจ้งเตือน KDS */
    #kds-toast-container { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; pointer-events: none; }
    
    /* โทนสี 3 โหมด */
    .kds-toast { 
      background: var(--bg-color); 
      border-left: 8px solid #D32F2F; 
      border-radius: 20px; 
      padding: 18px; 
      box-shadow: 
        inset 4px 4px 10px var(--shadow-light), 
        inset -4px -4px 10px var(--shadow-dark), 
        10px 10px 30px rgba(74, 63, 53, 0.22);
      -webkit-animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      pointer-events: auto; 
      cursor: pointer; 
      display: flex; 
      flex-direction: column; 
    }
    .kds-toast-title { margin: 0 0 5px; color: #D32F2F; font-size: 18px; font-weight: bold; } /* แดง (แลกแต้ม Default) */
    .kds-toast-desc { margin: 0; color: var(--text-brown); font-size: 14px; font-weight: bold; }
    
    .kds-toast-chat { border-left-color: #06C755; } /* เขียว (พิมพ์แชทมา) */
    .kds-toast-chat .kds-toast-title { color: #06C755; }

    .kds-toast-duplicate { border-left-color: #F39C12; } /* ส้ม (สแกนซ้ำ) */
    .kds-toast-duplicate .kds-toast-title { color: #F39C12; }

    @-webkit-keyframes slideDown { from { opacity: 0; -webkit-transform: translateY(-50px); } to { opacity: 1; -webkit-transform: translateY(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }

    /* 📱 Responsive overrides for small screen heights (e.g., iPhone 5s / 320x568px) */
    @media (max-height: 600px) {
      body {
        overflow-y: hidden; /* Prevent dragging/bouncing scroll on small screens */
      }
      #pin-overlay h2 {
        margin-bottom: 12px;
        font-size: 20px;
      }
      #pin-input {
        padding: 10px;
        font-size: 22px;
        margin-bottom: 15px;
        border-radius: 12px;
        width: 130px;
      }
      #btn-unlock {
        padding: 12px 30px;
        font-size: 16px;
        border-radius: 15px;
      }
      .preview-section {
        margin-top: 35px; /* Leave room for absolute Home button */
        min-height: auto;
        padding: 8px;
        flex: 1;
        justify-content: center;
      }
      .qr-preview-box {
        max-width: 140px;
        height: 140px;
        padding: 6px;
        margin-bottom: 8px;
        border-radius: 16px;
      }
      .refresh-hint {
        font-size: 10px;
        line-height: 1.3;
      }
      .control-section {
        padding: 12px 12px max(12px, env(safe-area-inset-bottom)) 12px;
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
        gap: 8px;
      }
      .custom-point-row {
        padding: 8px 12px;
        border-radius: 14px;
      }
      .custom-input {
        width: 45px;
        font-size: 16px;
        padding: 6px;
        border-radius: 8px;
      }
      #sync-status-label {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 8px;
      }
      .timer-text {
        font-size: 12px;
      }
      .keypad-grid {
        gap: 8px;
        padding: 4px 0;
      }
      .btn-key {
        padding: 9px 0;
        font-size: 13px;
        border-radius: 12px;
      }
      .btn-action-group {
        margin-top: 4px;
        gap: 8px;
      }
      .btn-copy, .btn-lock {
        padding: 9px;
        font-size: 10px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>

  <audio id="kds-chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" playsinline></audio>
  <div id="kds-toast-container"></div>

  <div id="pin-overlay">
    <h2>KUB POS SECURE</h2>
    <input type="password" id="pin-input" inputmode="numeric" pattern="[0-9]*" placeholder="PIN" maxlength="4">
    <button id="btn-unlock" onclick="checkPin()">UNLOCK</button>
  </div>

  <div id="main-app">
    <div class="top-nav"><a href="portal.html" class="btn-home">🏠 หน้าหลัก</a></div>
    <div class="preview-section">
      <div class="qr-preview-box" onclick="refreshCurrentPoint()">
        <img id="qr-preview-img" src="https://via.placeholder.com/300x300.png?text=STANDBY" alt="QR Preview">
      </div>
      <div class="refresh-hint" id="qr-hint-text">🔄 แตะที่รูปเพื่อรีเฟรชแต้มเดิมใหม่<br>(หากทิ้งไว้ 5 นาที ระบบจะเด้งเป็น 1 แต้มอัตโนมัติ)</div>
    </div>

    <div class="control-section">
      <div class="custom-point-row">
        <div class="input-group">
          <span id="sync-status-label">⚪ ว่าง</span>
          <input type="number" inputmode="numeric" pattern="[0-9]*" id="custom-pts" class="custom-input" placeholder="0" oninput="handleCustomInput(this.value)">
        </div>
        <div class="timer-text" id="timer-display">---</div>
      </div>

      <div class="keypad-grid">
        <button class="btn-key" onclick="fireAction('points', 1)">1</button>
        <button class="btn-key" onclick="fireAction('points', 2)">2</button>
        <button class="btn-key" onclick="fireAction('points', 3)">3</button>
        <button class="btn-key btn-line" onclick="fireAction('store_line')">LINE</button>

        <button class="btn-key" onclick="fireAction('points', 4)">4</button>
        <button class="btn-key" onclick="fireAction('points', 5)">5</button>
        <button class="btn-key" onclick="fireAction('points', 6)">6</button>
        <button class="btn-key btn-true" onclick="fireAction('true_payment')">True</button>

        <button class="btn-key" onclick="fireAction('points', 7)">7</button>
        <button class="btn-key" onclick="fireAction('points', 8)">8</button>
        <button class="btn-key" onclick="fireAction('points', 9)">9</button>
        <button class="btn-key btn-bank" onclick="fireAction('payment')">Bank</button>
      </div>

      <div class="btn-action-group">
        <button class="btn-copy" onclick="copyCurrentLink()">📋 คัดลอกลิงก์ส่งให้ลูกค้า</button>
        <button class="btn-lock" onclick="lockSystem()">🔒 ล็อกจอ</button>
      </div>
    </div>
  </div>

  <script>
    const CLOUDFLARE_WORKER_URL = "https://kub-backend.nan23082526.workers.dev";
    let absoluteIdleTimeout = null;

    if(localStorage.getItem("kub_admin_unlocked") === "true") {
      document.getElementById('pin-overlay').style.display = 'none';
      document.getElementById('main-app').style.display = 'flex';
      initApp();
    }

    function checkPin() {
      const pin = document.getElementById('pin-input').value;
      if (pin.length === 4) {
        fetch(`${CLOUDFLARE_WORKER_URL}/api/pos-update`, {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': pin },
          body: JSON.stringify({ mode: 'idle' })
        }).then(res => {
          if (res.status === 200) {
            localStorage.setItem("kub_admin_pin", pin);
            localStorage.setItem("kub_admin_unlocked", "true");
            location.reload();
          } else { alert("รหัส PIN หลังบ้านไม่ถูกต้องครับ"); }
        }).catch(() => alert("เชื่อมต่อตัวคุมระบบหลังบ้านล้มเหลว"));
      }
    }

    function lockSystem() {
      localStorage.removeItem("kub_admin_unlocked");
      localStorage.removeItem("kub_admin_pin");
      location.reload();
    }

    function resetActivityTimer() {
      clearTimeout(absoluteIdleTimeout);
      absoluteIdleTimeout = setTimeout(() => { fireAction('idle'); }, 1200000); 
    }

    let audioUnlocked = false;
    function unlockAudioContext() {
      if(audioUnlocked) return;
      const chime = document.getElementById('kds-chime');
      chime.volume = 0; 
      const playPromise = chime.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          chime.pause(); chime.currentTime = 0; chime.volume = 1; audioUnlocked = true;
        }).catch(err => console.log("iOS Auto-play blocked unlock."));
      }
    }

    function initApp() {
      const firebaseConfig = {
        apiKey: "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tlE",
        authDomain: "kub-cafe-pos.firebaseapp.com",
        databaseURL: "https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kub-cafe-pos",
        storageBucket: "kub-cafe-pos.firebasestorage.app"
      };
      
      if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
      const db = firebase.database();
      
      window.syncedState = { mode: 'idle', points: 0, timestamp: 0 };
      window.currentLiffUrl = "";
      window.globalTimerInterval = null;
      window.inputDebounce = null;

      document.body.addEventListener('click', unlockAudioContext, { once: true });
      document.body.addEventListener('touchstart', unlockAudioContext, { once: true });

      document.addEventListener('touchstart', resetActivityTimer);
      document.addEventListener('click', resetActivityTimer);
      document.addEventListener('input', resetActivityTimer);
      resetActivityTimer(); 

      db.ref('pos_display').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        window.syncedState = data;
        
        if(data.mode === 'points') {
          const hash = data.hash || ''; 
          window.currentLiffUrl = `https://liff.line.me/2010206186-u1XRJldq?code=KUBBAR-${data.points}-${data.timestamp}-${hash}`;
        }
        updateAdminUI(data);
      });

      initKDSListener(db);
    }

    function initKDSListener(db) {
      db.ref('kds_orders').orderByChild('status').equalTo('pending').on('child_added', (snapshot) => {
        const order = snapshot.val();
        if (order && order.id) {
          try { showKdsToast(order, snapshot.key, db); } catch(e) { console.error("UI Error:", e); }
          try {
            const chime = document.getElementById('kds-chime');
            chime.currentTime = 0;
            const playPromise = chime.play();
            if (playPromise !== undefined) { playPromise.catch(e => console.log("iOS: รอการทัชหน้าจอ")); }
          } catch(e) { console.error("Audio Error:", e); }
        }
      });
    }

    function showKdsToast(order, dbKey, db) {
      const container = document.getElementById('kds-toast-container');
      const toast = document.createElement('div');
      
      // 🚀 แยกเงื่อนไขการใช้สี
      const isChat = order.type === 'chat';
      const isDup = order.type === 'duplicate';
      
      let extraClass = '';
      if (isChat) extraClass = ' kds-toast-chat';
      else if (isDup) extraClass = ' kds-toast-duplicate';
      
      toast.className = 'kds-toast' + extraClass;
      
      const timeStr = new Date(order.timestamp).toLocaleTimeString('th-TH');
      
      // 🚀 เลือกไอคอนนำหน้าให้เข้ากับโหมด
      let iconPrefix = '🎁 ';
      if (isChat) iconPrefix = '';
      if (isDup) iconPrefix = '⚠️ ';
      
      let html = `
        <div class="kds-toast-title">${iconPrefix}${order.item}</div>
        <div class="kds-toast-desc">👤 ลูกค้า: ${order.customerName}</div>
        <div style="font-size: 12px; color: #B0A69D; margin-top: 8px;">
          ⏱️ ${timeStr} | แตะพื้นที่ว่างเพื่อรับทราบ (ซ่อนการ์ด)
        </div>
      `;

      toast.innerHTML = html;
      
      toast.onclick = () => {
        toast.style.animation = "slideDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) reverse forwards";
        setTimeout(() => toast.remove(), 300);
        db.ref('kds_orders').child(dbKey).update({ status: 'completed' });
      };

      container.prepend(toast);
    }

    function updateAdminUI(data) {
      clearInterval(window.globalTimerInterval);
      const label = document.getElementById('sync-status-label');
      const previewImg = document.getElementById('qr-preview-img');
      const timerDisplay = document.getElementById('timer-display');
      const hintText = document.getElementById('qr-hint-text');

      if (data.mode === "idle") {
        label.innerHTML = "⚪ ว่าง (STANDBY)"; label.style.color = "#B0A69D"; label.style.backgroundColor = "white"; label.style.borderColor = "var(--border-color)";
        previewImg.src = "https://via.placeholder.com/300x300.png?text=STANDBY";
        timerDisplay.innerText = "---"; window.currentLiffUrl = "";
        hintText.innerHTML = "🔄 แตะที่รูปเพื่อรีเฟรชแต้มเดิมใหม่<br>(หากทิ้งไว้ 5 นาที ระบบจะเด้งเป็น 1 แต้มอัตโนมัติ)";
      } 
      else if (data.mode === "points") {
        label.innerHTML = `☕ <b style="font-size: 18px; color: #D32F2F;">${data.points}</b> <span style="color: #D32F2F;">แต้ม</span>`; 
        label.style.color = "#D32F2F"; label.style.backgroundColor = "#FFEBEE"; label.style.borderColor = "#EF9A9A";
        previewImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.currentLiffUrl)}`;
        startGlobalTimer(data.timestamp);
        hintText.innerHTML = "🔄 แตะที่รูปเพื่อรีเฟรชแต้มเดิมใหม่<br>(หากทิ้งไว้ 5 นาที ระบบจะเด้งเป็น 1 แต้มอัตโนมัติ)";
      } 
      else if (data.mode === "store_line") {
        label.innerHTML = `💬 LINE OA`; label.style.color = "#06C755"; label.style.backgroundColor = "white"; label.style.borderColor = "var(--border-color)";
        previewImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent("https://line.me/R/ti/p/@848dmzja")}`; timerDisplay.innerText = "---";
        hintText.innerHTML = "💬 คิวอาร์โค้ดสำหรับเพิ่มเพื่อน LINE OA ของร้าน";
      } 
      else if (data.mode === "payment") {
        label.innerHTML = `🏦 ธนาคาร`; label.style.color = "#1565C0"; label.style.backgroundColor = "white"; label.style.borderColor = "var(--border-color)";
        previewImg.src = "https://raw.githubusercontent.com/beenancy/kubcafe/main/qr%20kshop.jpg"; timerDisplay.innerText = "---";
        hintText.innerHTML = "⚠️ สแกนจ่ายด้วยแอปธนาคารเท่านั้น (ห้ามใช้ LINE สแกน)";
      } 
      else if (data.mode === "true_payment") {
        label.innerHTML = `🧡 TrueMoney`; label.style.color = "#FF6600"; label.style.backgroundColor = "white"; label.style.borderColor = "var(--border-color)";
        previewImg.src = "https://raw.githubusercontent.com/beenancy/kubcafe/main/truescan.jpg"; timerDisplay.innerText = "---";
        hintText.innerHTML = "🔸 รองรับสแกนผ่าน TrueMoney และแอปธนาคาร";
      }
    }

    function startGlobalTimer(startTimeMs) {
      window.globalTimerInterval = setInterval(() => {
        const remain = (5 * 60) - Math.floor((Date.now() - startTimeMs) / 1000);
        if (remain < 0) {
          clearInterval(window.globalTimerInterval);
          document.getElementById('timer-display').innerText = "กำลังรีเฟรชเป็น 1 แต้ม...";
          fireAction('points', 1);
          return;
        }
        document.getElementById('timer-display').innerText = `เหลือเวลา: ${Math.floor(remain / 60)}:${String(remain % 60).padStart(2, '0')}`;
      }, 1000);
    }

    function fireAction(mode, points = 0) {
      document.getElementById('custom-pts').value = '';
      const activePin = localStorage.getItem("kub_admin_pin");
      fetch(`${CLOUDFLARE_WORKER_URL}/api/pos-update`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': activePin },
        body: JSON.stringify({ mode, points, timestamp: Date.now() })
      });
    }

    function handleCustomInput(val) {
      clearTimeout(window.inputDebounce);
      window.inputDebounce = setTimeout(() => { const pts = parseInt(val); if (pts > 0) fireAction('points', pts); }, 400); 
    }

    function refreshCurrentPoint() {
      if (window.syncedState.mode === 'points' && window.syncedState.points > 0) { fireAction('points', window.syncedState.points); } else { fireAction('idle'); }
    }

    function copyCurrentLink() {
      if (!window.currentLiffUrl || window.syncedState.mode !== 'points') { 
        alert("หน้าจอปัจจุบันไม่ใช่โหมดแจกแต้มครับ"); return; 
      }
      
      const specialLink = window.currentLiffUrl.replace("KUBBAR-", "KUBLINK-");
      const pts = window.syncedState.points;
      
      const textMsg = `☕ รับไปเลย ${pts} แต้ม! 🎉\n\nขอบคุณที่อุดหนุน KUB Cafe นะคะ กดที่ลิงก์ด้านล่างเพื่อสะสมแต้มเข้าบัตรสมาชิกได้เลยค่ะ 👇\n${specialLink}\n\n*หมายเหตุ: ลิงก์นี้ใช้ได้เพียง 1 สิทธิ์เท่านั้น และมีอายุการใช้งาน 24 ชั่วโมงค่ะ ⏰`;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(textMsg).then(() => {
          alert("คัดลอกข้อความพร้อมลิงก์สำเร็จ! 🎉 นำไปวางส่งให้ลูกค้าได้เลยครับ");
        }).catch(() => fallbackCopy(textMsg));
      } else {
        fallbackCopy(textMsg);
      }
    }
    
    function fallbackCopy(text) {
      const tmpInput = document.createElement("textarea");
      tmpInput.value = text;
      document.body.appendChild(tmpInput);
      tmpInput.select();
      document.execCommand("copy");
      document.body.removeChild(tmpInput);
      alert("คัดลอกข้อความพร้อมลิงก์สำเร็จ! 🎉 นำไปวางส่งให้ลูกค้าได้เลยครับ");
    }
  </script>
</body>
