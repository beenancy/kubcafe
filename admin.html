<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>KUB Cafe - Admin POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    :root { --bg-cream: #FDFCF0; --card-white: #FFFFFF; --text-brown: #4A3F35; --text-light: #B0A69D; --matcha-green: #A3B18A; --matcha-dark: #7A8B62; --line-green: #06C755; --true-orange: #FF6600; --bank-blue: #1565C0; --border-color: #E8E2D9; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background-color: var(--bg-cream); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden; -webkit-user-select: none; }
    #pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--matcha-green); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.3s; }
    #pin-overlay h2 { margin-bottom: 20px; font-size: 24px; letter-spacing: 2px; }
    #pin-input { width: 150px; text-align: center; font-size: 28px; padding: 10px; border: 3px solid white; border-radius: 15px; background: rgba(255,255,255,0.2); color: white; font-weight: bold; margin-bottom: 20px; outline: none; }
    #btn-unlock { background: white; color: var(--matcha-dark); border: none; padding: 12px 40px; border-radius: 20px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }
    #main-app { display: none; flex-direction: column; height: 100%; }
    .preview-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: clamp(10px, 2vh, 15px); min-height: 0; }
    .qr-preview-box { background: white; padding: 10px; border-radius: 16px; border: 2px solid var(--border-color); display: flex; justify-content: center; align-items: center; width: 100%; max-width: 350px; flex: 1; min-height: 0; margin-bottom: 8px; cursor: pointer; transition: transform 0.1s; }
    .qr-preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
    .refresh-hint { font-size: clamp(11px, 1.5vh, 12px); color: var(--text-light); font-weight: bold; }
    .control-section { background: var(--card-white); padding: clamp(12px, 2vh, 15px) 20px clamp(15px, 3vh, 25px) 20px; border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -10px 30px rgba(140, 122, 107, 0.1); display: flex; flex-direction: column; gap: clamp(10px, 1.5vh, 12px); flex-shrink: 0; }
    .custom-point-row { display: flex; justify-content: space-between; align-items: center; background: var(--bg-cream); padding: clamp(8px, 1vh, 10px) 15px; border-radius: 16px; }
    .input-group { display: flex; align-items: center; gap: 8px; }
    #sync-status-label { font-size: clamp(12px, 2vh, 15px); font-weight: 800; color: var(--text-brown); background: white; padding: 5px 10px; border-radius: 10px; border: 1px solid var(--border-color); }
    .custom-input { width: 55px; text-align: center; font-size: clamp(18px, 2.5vh, 22px); font-weight: bold; color: var(--matcha-dark); border: 1px solid var(--border-color); border-radius: 10px; padding: clamp(4px, 0.5vh, 6px); background: white; }
    .custom-input:focus { outline: 2px solid var(--matcha-green); border-color: transparent; }
    .timer-text { font-size: clamp(12px, 2vh, 14px); font-weight: bold; color: #C57B57; }
    .keypad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(8px, 1.2vh, 10px); }
    .btn-key { background: #EAF0E4; color: var(--matcha-dark); border: none; border-radius: 14px; padding: clamp(12px, 2.2vh, 18px) 0; font-size: clamp(20px, 3vh, 24px); font-weight: 900; box-shadow: 0 4px 0 #D5E0CB; transition: all 0.1s; }
    .btn-key:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
    .btn-line { background: var(--line-green); color: white; font-size: clamp(13px, 2vh, 15px); box-shadow: 0 4px 0 #04A044; }
    .btn-true { background: var(--true-orange); color: white; font-size: clamp(13px, 2vh, 15px); box-shadow: 0 4px 0 #CC5200; }
    .btn-bank { background: var(--bank-blue); color: white; font-size: clamp(13px, 2vh, 15px); box-shadow: 0 4px 0 #0E4788; }
    .btn-action-group { display: flex; gap: 10px; margin-top: 2px; }
    .btn-copy { background: #F4EEFF; color: #8A56E2; border: 1px dashed #B89AEB; width: 100%; padding: clamp(10px, 1.5vh, 14px); border-radius: 14px; font-size: clamp(13px, 2vh, 15px); font-weight: bold; flex: 2; }
    .btn-lock { background: #FFEBEE; color: #D32F2F; border: 1px dashed #EF9A9A; width: 100%; padding: clamp(10px, 1.5vh, 14px); border-radius: 14px; font-size: clamp(13px, 2vh, 15px); font-weight: bold; flex: 1; cursor: pointer; }
  </style>
</head>
<body>

  <div id="pin-overlay">
    <h2>KUB POS SECURE</h2>
    <input type="password" id="pin-input" inputmode="numeric" pattern="[0-9]*" placeholder="PIN" maxlength="4">
    <button id="btn-unlock" onclick="checkPin()">UNLOCK</button>
  </div>

  <div id="main-app">
    <div class="preview-section">
      <div class="qr-preview-box" onclick="refreshCurrentPoint()">
        <img id="qr-preview-img" src="https://via.placeholder.com/300x300.png?text=STANDBY" alt="QR Preview">
      </div>
      <div class="refresh-hint">🔄 แต้ที่รูปเพื่อรีเฟรชแต้มใหม่ (หรือเคลียร์จอ)</div>
    </div>

    <div class="control-section">
      <div class="custom-point-row">
        <div class="input-group">
          <span id="sync-status-label">⚪ ว่าง</span>
          <input type="number" inputmode="numeric" pattern="[0-9]*" id="custom-pts" class="custom-input" placeholder="0" oninput="handleCustomInput(this.value)">
        </div>
        <div class="timer-text" id="timer-display">---</div>
      </div>

      <div class="keypad-grid">
        <button class="btn-key" onclick="fireAction('points', 1)">1</button>
        <button class="btn-key" onclick="fireAction('points', 2)">2</button>
        <button class="btn-key" onclick="fireAction('points', 3)">3</button>
        <button class="btn-key btn-line" onclick="fireAction('store_line')">LINE</button>

        <button class="btn-key" onclick="fireAction('points', 4)">4</button>
        <button class="btn-key" onclick="fireAction('points', 5)">5</button>
        <button class="btn-key" onclick="fireAction('points', 6)">6</button>
        <button class="btn-key btn-true" onclick="fireAction('true_payment')">True</button>

        <button class="btn-key" onclick="fireAction('points', 7)">7</button>
        <button class="btn-key" onclick="fireAction('points', 8)">8</button>
        <button class="btn-key" onclick="fireAction('points', 9)">9</button>
        <button class="btn-key btn-bank" onclick="fireAction('payment')">Bank</button>
      </div>

      <div class="btn-action-group">
        <button class="btn-copy" onclick="copyCurrentLink()">📋 คัดลอกลิงก์ส่งให้ลูกค้า</button>
        <button class="btn-lock" onclick="lockSystem()">🔒 ล็อกหน้าจอ</button>
      </div>
    </div>
  </div>

  <script>
    // 🌐 [ สำคัญมาก 🌟 ] ใส่ URL ของ Cloudflare Worker ของร้านลงในช่องนี้ครับ
    const CLOUDFLARE_WORKER_URL = "https://kub-backend.nan23082526.workers.dev";

    if(localStorage.getItem("kub_admin_unlocked") === "true") {
      document.getElementById('pin-overlay').style.display = 'none';
      document.getElementById('main-app').style.display = 'flex';
      initApp();
    }

    function checkPin() {
      const pin = document.getElementById('pin-input').value;
      if (pin.length === 4) {
        // ทดลองยิงเข้าหลังบ้าน ถ้า PIN ผิด Cloudflare จะตีกลับ 401 ทันที
        fetch(`${CLOUDFLARE_WORKER_URL}/api/pos-update`, {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': pin },
          body: JSON.stringify({ mode: 'idle' })
        }).then(res => {
          if (res.status === 200) {
            localStorage.setItem("kub_admin_pin", pin);
            localStorage.setItem("kub_admin_unlocked", "true");
            location.reload();
          } else { alert("รหัส PIN หลังบ้านไม่ถูกต้องครับ"); }
        }).catch(() => alert("เชื่อมต่อตัวคุมระบบหลังบ้านล้มเหลว"));
      }
    }

    function lockSystem() {
      localStorage.removeItem("kub_admin_unlocked");
      localStorage.removeItem("kub_admin_pin");
      location.reload();
    }

    function initApp() {
      // ดึงแค่ฟังก์ชันการอ่านข้อมูลแบบ Realtime จาก Firebase มาแสดงผลพรีวิว
      const firebaseConfig = {
        databaseURL: "https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app"
      };
      if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
      const db = firebase.database();
      window.syncedState = { mode: 'idle', points: 0, timestamp: 0 };
      window.currentLiffUrl = "";
      window.globalTimerInterval = null;
      window.inputDebounce = null;

      db.ref('pos_display').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        window.syncedState = data;
        
        // จำลองสร้าง URL ขาถอดรหัสในเครื่องแอดมิน เพื่อใช้ฟังก์ชันปุ่มก็อปปี้ลิงก์ส่งงานได้เหมือนเดิม
        if(data.mode === 'points') {
          const hash = data.shopCode ? data.shopCode.split('-')[3] : ''; 
          window.currentLiffUrl = `https://liff.line.me/2010206186-u1XRJldq?code=KUBBAR-${data.points}-${data.timestamp}-${hash}`;
        }
        updateAdminUI(data);
      });
    }

    function updateAdminUI(data) {
      clearInterval(window.globalTimerInterval);
      const label = document.getElementById('sync-status-label');
      const previewImg = document.getElementById('qr-preview-img');
      const timerDisplay = document.getElementById('timer-display');

      if (data.mode === "idle") {
        label.innerHTML = "⚪ ว่าง"; label.style.color = "#B0A69D";
        previewImg.src = "https://via.placeholder.com/300x300.png?text=STANDBY";
        timerDisplay.innerText = "---"; window.currentLiffUrl = "";
      } 
      else if (data.mode === "points") {
        label.innerHTML = `☕ <b>${data.points}</b> แต้ม`; label.style.color = "#A3B18A";
        previewImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.currentLiffUrl)}`;
        startGlobalTimer(data.timestamp);
      } 
      else if (data.mode === "store_line") {
        label.innerHTML = `💬 LINE OA`; label.style.color = "#06C755";
        previewImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent("https://line.me/R/ti/p/@848dmzja")}`;
        timerDisplay.innerText = "---";
      } 
      else if (data.mode === "payment") {
        label.innerHTML = `🏦 ธนาคาร`; label.style.color = "#1565C0";
        previewImg.src = "https://raw.githubusercontent.com/beenancy/kubcafe/eccfab9beafd7e3dbab13523292cd3cb15dbff74/qr%20kshop.jpg"; timerDisplay.innerText = "---";
      } 
      else if (data.mode === "true_payment") {
        label.innerHTML = `🧡 TrueMoney`; label.style.color = "#FF6600";
        previewImg.src = "https://raw.githubusercontent.com/beenancy/kubcafe/914d5947e4c635a2bf03f3f123dd837c2b0b29a2/truescan.jpg"; timerDisplay.innerText = "---";
      }
    }

    function startGlobalTimer(startTimeMs) {
      window.globalTimerInterval = setInterval(() => {
        const remain = (5 * 60) - Math.floor((Date.now() - startTimeMs) / 1000);
        if (remain < 0) { clearInterval(window.globalTimerInterval); document.getElementById('timer-display').innerText = "หมดเวลา"; return; }
        document.getElementById('timer-display').innerText = `เหลือเวลา: ${Math.floor(remain / 60)}:${String(remain % 60).padStart(2, '0')}`;
      }, 1000);
    }

    // 🚀 ยิงคำสั่งเข้าถังควบคุมหลังบ้านผ่าน Cloudflare ตัวเดียว
    function fireAction(mode, points = 0) {
      document.getElementById('custom-pts').value = '';
      const activePin = localStorage.getItem("kub_admin_pin");
      fetch(`${CLOUDFLARE_WORKER_URL}/api/pos-update`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': activePin },
        body: JSON.stringify({ mode, points, timestamp: Date.now() })
      });
    }

    function handleCustomInput(val) {
      clearTimeout(window.inputDebounce);
      window.inputDebounce = setTimeout(() => {
        const pts = parseInt(val);
        if (pts > 0) fireAction('points', pts);
      }, 400); 
    }

    function refreshCurrentPoint() {
      if (window.syncedState.mode === 'points' && window.syncedState.points > 0) { fireAction('points', window.syncedState.points); } 
      else { fireAction('idle'); }
    }

    function copyCurrentLink() {
      if (!window.currentLiffUrl || window.syncedState.mode !== 'points') { alert("หน้าจอปัจจุบันไม่ใช่โหมดแจกแต้มครับ"); return; }
      navigator.clipboard.writeText(window.currentLiffUrl).then(() => { alert(`คัดลอกลิงก์สำเร็จ!`); });
    }
  </script>
</body>
</html>
