<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>KUB Cafe - Customer Display (V.26.28)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <style>
    body { text-align: center; font-family: sans-serif; padding: 20px; background: #fdfdfd; color: #2d3436; }
    
    /* 🖥️ กล่องล็อกตำแหน่งให้อยู่ตรงกลางหน้าจออย่างถาวร */
    .qr-container { 
      margin-top: 20px; 
      padding: 20px; 
      background: #fff; 
      border-radius: 20px; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
      max-width: 320px; 
      margin-left: auto; 
      margin-right: auto; 
      overflow: hidden;
      min-height: 480px; 
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;
    }
    
    .qr-box-inner { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    img { border: 4px solid #c1f2a1; border-radius: 15px; width: 100%; height: auto; margin: 0 auto; display: block; }
    .point-display { font-size: 22px; font-weight: 900; color: #2d3436; margin-bottom: 10px; width: 100%; }
  </style>
</head>
<body>

  <div class="qr-container" id="qr-container">
    <div class="qr-box-inner">
      <div id="dynamic-qr-header"></div>
      <img id="qr-img" src="">
      <div id="dynamic-qr-footer"></div>
    </div>
  </div>

  <script>
    const SCAN_LIFF_ID = "2010206186-u1XRJldq"; 
    const SECRET_SALT = 'KUB_SECRET_TOKEN_2026'; 
    const STORE_LINE_OA_LINK = "https://line.me/R/ti/p/@848dmzja"; 
    const PAYMENT_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/eccfab9beafd7e3dbab13523292cd3cb15dbff74/qr%20kshop.jpg";
    const TRUE_IMAGE_URL = "https://raw.githubusercontent.com/beenancy/kubcafe/914d5947e4c635a2bf03f3f123dd837c2b0b29a2/truescan.jpg";

    const firebaseConfig = {
      apiKey: "AIzaSyAi-8gxkAs3N4b5r3EULZHckqq3tHa6tlE",
      authDomain: "kub-cafe-pos.firebaseapp.com",
      databaseURL: "https://kub-cafe-pos-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kub-cafe-pos",
      storageBucket: "kub-cafe-pos.firebasestorage.app",
      messagingSenderId: "980123459582",
      appId: "1:980123459582:web:8d1b54a7e1317975e06aaf",
      measurementId: "G-FTTX7BDSYD"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let timerInterval;

    // เปิดระบบหูทิพย์คอยดักฟังรูปภาพจากเครื่องบาริสต้า
    db.ref('pos_display').on('value', (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      renderCustomerDisplay(data);
    });

    function renderCustomerDisplay(data) {
      clearInterval(timerInterval); 
      const imgElement = document.getElementById('qr-img');
      
      if (data.mode === "points") {
        const points = data.points;
        const timestamp = data.timestamp;
        
        const rawString = points + "-" + timestamp + "-" + SECRET_SALT;
        const hash = CryptoJS.MD5(rawString).toString();
        const secretCode = "KUBBAR-" + points + "-" + timestamp + "-" + hash; 
        const liffUrl = "https://liff.line.me/" + SCAN_LIFF_ID + "?code=" + secretCode;
        
        document.getElementById('dynamic-qr-header').innerHTML = `<div class="point-display" id="qr-title-display">สแกนรับ <span style="color: #27ae60;">${points}</span> แต้ม ☕</div>`;
        imgElement.style.border = "4px solid #c1f2a1";
        imgElement.src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(liffUrl);
        
        document.getElementById('dynamic-qr-footer').innerHTML = `
          <div id="timer-display" style="color:#8e44ad; font-weight:bold; font-size:13px; margin-top:8px;">รีเฟรชใหม่ใน: 05:00</div>
          <p style="font-size: 11px; color:#636e72; margin-top:10px;">⚠️ QR บนจอนี้มีอายุ 5 นาที</p>
        `;
        
        startSynchronizedTimer(timestamp);
      } 
      else if (data.mode === "store_line") {
        document.getElementById('dynamic-qr-header').innerHTML = `<div class="point-display" id="qr-title-display"><span style="color: #06C755;">LINE Official Account</span> 💬</div>`;
        imgElement.style.border = "4px solid #06C755";
        imgElement.src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(STORE_LINE_OA_LINK);
        document.getElementById('dynamic-qr-footer').innerHTML = "";
      } 
      else if (data.mode === "payment") {
        document.getElementById('dynamic-qr-header').innerHTML = "";
        imgElement.style.border = "none";
        imgElement.src = PAYMENT_IMAGE_URL; 
        document.getElementById('dynamic-qr-footer').innerHTML = `
          <div style="margin-top: 15px; padding: 10px; background: #fff3cd; border: 1px solid #ffe69c; color: #856404; border-radius: 10px; font-size: 12px; font-weight: bold; line-height: 1.4; box-sizing: border-box;">
            ⚠️ กรุณาใช้ <span style="color:#d35400;">"แอปธนาคาร"</span> สแกนจ่ายเท่านั้น
          </div>
        `;
      } 
      else if (data.mode === "true_payment") {
        document.getElementById('dynamic-qr-header').innerHTML = "";
        imgElement.style.border = "none";
        imgElement.src = TRUE_IMAGE_URL; 
        document.getElementById('dynamic-qr-footer').innerHTML = `
          <div style="margin-top: 15px; padding: 10px; background: #e3f2fd; border: 1px solid #90caf9; color: #0d47a1; border-radius: 10px; font-size: 12px; font-weight: bold; line-height: 1.4; box-sizing: border-box;">
            🔸 รองรับการสแกนผ่าน <span style="color:#ff6600;">TrueMoney Wallet</span> และแอปธนาคาร
          </div>
        `;
      }
    }

    function startSynchronizedTimer(startTimeMs) {
      const display = document.getElementById('timer-display');
      if (!display) return;
      const limitSeconds = 5 * 60; 
      timerInterval = setInterval(() => {
        const nowMs = new Date().getTime();
        const elapsedSeconds = Math.floor((nowMs - startTimeMs) / 1000);
        const remainingSeconds = limitSeconds - elapsedSeconds;
        if (remainingSeconds < 0) { clearInterval(timerInterval); return; }
        let m = Math.floor(remainingSeconds / 60);
        let s = remainingSeconds % 60;
        display.innerText = `รีเฟรชใหม่ใน: ${m}:${s < 10 ? '0'+s : s}`;
      }, 1000);
    }
  </script>
</body>
</html>
