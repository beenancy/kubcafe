<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Cafe - Member App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --bg-cream: #FDFCF0; --matcha: #A3B18A; --matcha-dark: #7A8B62; --text-main: #4A3F35; --text-light: #B0A69D; --border: #E8E2D9; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100vh; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-cream); overflow: hidden; display: flex; flex-direction: column; }
    
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-cream); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--matcha-dark); transition: opacity 0.5s; }
    .spinner { border: 4px solid rgba(163, 177, 138, 0.3); border-left-color: var(--matcha-dark); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .app-content { flex: 1; overflow-y: auto; padding-bottom: 80px; position: relative; }
    .view-section { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)) 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 1000; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--text-light); text-decoration: none; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .nav-item.active { color: var(--matcha-dark); }
    .nav-icon { font-size: 24px; margin-bottom: 2px; }

    .member-card { background: linear-gradient(135deg, #A3B18A, #7A8B62); border-radius: 20px; padding: 25px; color: white; box-shadow: 0 10px 25px rgba(122, 139, 98, 0.3); text-align: center; margin-bottom: 20px; position: relative; overflow: hidden; }
    .profile-pic { width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; }
    .points-number { font-size: 48px; font-weight: 900; margin: 0; line-height: 1; }
    
    .reward-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .reward-box { background: white; border-radius: 16px; padding: 15px; text-align: center; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
    .reward-icon { font-size: 40px; margin-bottom: 10px; }
    .btn-redeem { background: var(--matcha); color: white; border: none; padding: 8px 20px; border-radius: 12px; font-weight: bold; margin-top: 10px; width: 100%; cursor: pointer; transition: 0.2s; }
    .btn-redeem:active { transform: scale(0.95); }
    .btn-redeem:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    .history-box { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
    .history-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .history-item:last-child { border-bottom: none; }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div style="font-weight: bold;">กำลังดึงข้อมูลสมาชิก...</div>
  </div>

  <div class="app-content">
    
    <div id="view-home" class="view-section active">
      <h2 style="color: var(--text-main); margin-top:0;">บัตรสมาชิกของฉัน</h2>
      <div class="member-card">
        <img id="userProfilePic" class="profile-pic" src="https://via.placeholder.com/60" alt="Profile">
        <div class="points-number"><span id="userPoints">0</span><span style="font-size: 20px;"> แต้ม</span></div>
        <div style="font-size: 14px; margin-top: 5px; opacity: 0.9;">คุณ <span id="userName">...</span></div>
      </div>
      <div style="background: white; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid var(--border);" onclick="openQRScanner()">
        <p style="color: var(--text-main); font-weight: bold; margin-top:0;">📷 แตะที่นี่เพื่อสแกนรับแต้ม</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://line.me/R/nv/QRCodeReader" style="width: 120px; border-radius: 10px; opacity: 0.8;">
      </div>
    </div>

    <div id="view-rewards" class="view-section">
      <h2 style="color: var(--text-main); margin-top:0;">แลกของรางวัล</h2>
      <div class="reward-grid">
        <div class="reward-box">
          <div class="reward-icon">☕</div>
          <div style="font-weight: bold; color: var(--text-main);">ส่วนลด 50%</div>
          <div style="font-size: 12px; color: var(--text-light);">ใช้ 10 แต้ม</div>
          <button class="btn-redeem" onclick="redeemPoints(10, 'ส่วนลด 50% 1 แก้ว')">แลกเลย</button>
        </div>
        <div class="reward-box">
          <div class="reward-icon">🍰</div>
          <div style="font-weight: bold; color: var(--text-main);">ฟรี เค้ก 1 ชิ้น</div>
          <div style="font-size: 12px; color: var(--text-light);">ใช้ 20 แต้ม</div>
          <button class="btn-redeem" onclick="redeemPoints(20, 'ฟรีเค้ก 1 ชิ้น')">แลกเลย</button>
        </div>
      </div>
    </div>

    <div id="view-history" class="view-section">
      <h2 style="color: var(--text-main); margin-top:0;">ประวัติย้อนหลัง</h2>
      <div class="history-box" id="historyContainer">
        <div style="padding: 20px; text-align: center; color: var(--text-light);">ไม่มีประวัติการใช้งาน</div>
      </div>
    </div>

    <div id="view-more" class="view-section">
      <h2 style="color: var(--text-main); margin-top:0;">เมนูร้านค้า</h2>
      <div style="background: white; border-radius: 16px; border: 1px solid var(--border); padding: 15px; display:flex; gap:10px; flex-direction:column;">
        <button style="padding:15px; border-radius:10px; border:1px solid #eee; background:#fafafa; text-align:left; font-size:16px; cursor:pointer;">🥤 เมนูเครื่องดื่ม</button>
        <button style="padding:15px; border-radius:10px; border:1px solid #eee; background:#fafafa; text-align:left; font-size:16px; cursor:pointer;" onclick="window.location.href='https://maps.app.goo.gl/jHLN2KvxMJEDJ8gm8'">📍 แผนที่ร้าน</button>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <div id="nav-home" class="nav-item active" onclick="switchTab('home')">
      <span class="nav-icon">💳</span><span>หน้าหลัก</span>
    </div>
    <div id="nav-rewards" class="nav-item" onclick="switchTab('rewards')">
      <span class="nav-icon">🎁</span><span>แลกรางวัล</span>
    </div>
    <div id="nav-history" class="nav-item" onclick="switchTab('history')">
      <span class="nav-icon">📜</span><span>ประวัติ</span>
    </div>
    <div id="nav-more" class="nav-item" onclick="switchTab('more')">
      <span class="nav-icon">🥤</span><span>เมนู</span>
    </div>
  </nav>

  <script>
    const API_URL = "https://kub-backend.nan23082526.workers.dev";
    
    // 🚀 [อัปเดต]: ฝังรหัส LIFF ID ตัวใหม่ให้เรียบร้อยแล้วครับคุณบี
    const LIFF_ID = "2010206186-p1vWfgui"; 

    let globalUserId = "";
    let globalUserName = "";
    let globalTotalPoints = 0;

    async function initApp() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        globalUserId = profile.userId;
        globalUserName = profile.displayName;
        
        document.getElementById('userProfilePic').src = profile.pictureUrl || "https://via.placeholder.com/60";
        document.getElementById('userName').innerText = profile.displayName;

        await fetchMemberData();

        const urlParams = new URLSearchParams(window.location.search);
        const targetTab = urlParams.get('tab');
        if (targetTab) switchTab(targetTab);

        document.getElementById('loading-overlay').style.opacity = "0";
        setTimeout(() => document.getElementById('loading-overlay').style.display = "none", 500);

      } catch (err) {
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อ LINE");
        console.error(err);
      }
    }

    async function fetchMemberData() {
      try {
        const res = await fetch(`${API_URL}/api/get-member?userId=${globalUserId}`);
        const result = await res.json();
        
        if (result.status === "success") {
          globalTotalPoints = result.data.totalPoints;
          document.getElementById('userPoints').innerText = globalTotalPoints;
          
          document.querySelectorAll('.btn-redeem').forEach(btn => {
            const cost = parseInt(btn.getAttribute('onclick').match(/\d+/)[0]);
            if (globalTotalPoints < cost) {
              btn.disabled = true;
              btn.innerText = "แต้มไม่พอ";
            } else {
              btn.disabled = false;
              btn.innerText = "แลกเลย";
            }
          });

          renderHistory(result.data.history);
        }
      } catch (err) { console.error("Fetch Data Error:", err); }
    }

    function renderHistory(historyArr) {
      const container = document.getElementById('historyContainer');
      if (!historyArr || historyArr.length === 0) return;

      let html = "";
      historyArr.forEach(item => {
        const d = new Date(item.timestamp);
        const dateStr = d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        
        let icon = "☕"; let title = "ได้รับแต้ม"; let ptsText = `+${item.points}`; let ptsColor = "#A3B18A";
        if (item.type === "redeem") { icon = "🎁"; title = "แลกรางวัล"; ptsText = `-${item.points}`; ptsColor = "#C57B57"; }
        else if (item.type === "edit") { icon = "⚙️"; title = "ปรับปรุงแต้ม"; ptsText = item.points > 0 ? `+${item.points}` : item.points; }

        html += `
          <div class="history-item">
            <div><div style="font-weight:bold; color:var(--text-main);">${icon} ${title}</div><div style="font-size:12px; color:var(--text-light);">${dateStr}</div></div>
            <div style="color: ${ptsColor}; font-weight: 900; font-size: 18px;">${ptsText}</div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    async function redeemPoints(pointsNeeded, rewardName) {
      if (globalTotalPoints < pointsNeeded) return alert("แต้มไม่พอครับ");
      if (!confirm(`ยืนยันใช้ ${pointsNeeded} แต้ม เพื่อแลก ${rewardName} ใช่ไหมครับ?`)) return;

      document.getElementById('loading-overlay').style.display = "flex";
      document.getElementById('loading-overlay').style.opacity = "1";

      try {
        const res = await fetch(`${API_URL}/api/redeem-reward`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: globalUserId,
            customerName: globalUserName,
            pointsUsed: pointsNeeded,
            rewardName: rewardName
          })
        });

        const data = await res.json();
        if (data.status === "success") {
          alert(`🎉 แลกรางวัลสำเร็จ!\nโปรดแสดงหน้าจอนี้ให้พนักงาน\n(Ref: ${data.refCode})`);
          await fetchMemberData(); 
        } else {
          alert("❌ แลกไม่สำเร็จ: " + data.message);
        }
      } catch (err) { alert("เชื่อมต่อล้มเหลว"); }
      
      document.getElementById('loading-overlay').style.opacity = "0";
      setTimeout(() => document.getElementById('loading-overlay').style.display = "none", 500);
    }

    function switchTab(tabId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + tabId).classList.add('active');
      document.getElementById('nav-' + tabId).classList.add('active');
    }

    function openQRScanner() {
      if (liff.isApiAvailable('scanCodeV2')) {
        liff.scanCodeV2().then(result => { if(result.value) alert("Scan สำเร็จ ระบบจะโหลดแต้มเข้าให้ครับ"); });
      } else {
        window.location.href = "https://line.me/R/nv/QRCodeReader";
      }
    }

    window.onload = initApp;
  </script>
</body>
</html>
