<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUB Cafe - Member App</title>
  <style>
    :root { --bg-cream: #FDFCF0; --matcha: #A3B18A; --matcha-dark: #7A8B62; --text-main: #4A3F35; --text-light: #B0A69D; --border: #E8E2D9; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100vh; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-cream); overflow: hidden; display: flex; flex-direction: column; }
    
    .app-content { flex: 1; overflow-y: auto; padding-bottom: 80px; position: relative; }
    
    .view-section { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)) 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 1000; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--text-light); text-decoration: none; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .nav-item.active { color: var(--matcha-dark); }
    .nav-icon { font-size: 24px; margin-bottom: 2px; }

    .member-card { background: linear-gradient(135deg, #A3B18A, #7A8B62); border-radius: 20px; padding: 25px; color: white; box-shadow: 0 10px 25px rgba(122, 139, 98, 0.3); text-align: center; margin-bottom: 20px; }
    .points-number { font-size: 48px; font-weight: 900; margin: 10px 0; }
    
    .reward-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .reward-box { background: white; border-radius: 16px; padding: 15px; text-align: center; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
    .reward-icon { font-size: 40px; margin-bottom: 10px; }
    .btn-redeem { background: var(--matcha); color: white; border: none; padding: 8px 20px; border-radius: 12px; font-weight: bold; margin-top: 10px; width: 100%; cursor: pointer; }
  </style>
</head>
<body>

  <div class="app-content">
    
    <div id="view-home" class="view-section active">
      <h2 style="color: var(--text-main); margin-top:0;">บัตรสมาชิกของฉัน</h2>
      <div class="member-card">
        <div style="font-size: 14px; opacity: 0.8;">KUB CAFE MEMBER</div>
        <div class="points-number">15<span style="font-size: 20px;"> แต้ม</span></div>
        <div style="font-size: 14px;">คุณ ลูกค้าคนสำคัญ</div>
      </div>
      <div style="background: white; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid var(--border);">
        <p style="color: var(--text-light); font-size: 14px; margin-top:0;">สแกนเพื่อรับแต้มที่หน้าบาร์</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=example" style="width: 150px; border-radius: 10px;">
      </div>
    </div>

    <div id="view-rewards" class="view-section">
      <h2 style="color: var(--text-main); margin-top:0;">แลกของรางวัล</h2>
      <div class="reward-grid">
        <div class="reward-box">
          <div class="reward-icon">☕</div>
          <div style="font-weight: bold; color: var(--text-main);">ส่วนลด 50%</div>
          <div style="font-size: 12px; color: var(--text-light);">ใช้ 10 แต้ม</div>
          <button class="btn-redeem">แลกเลย</button>
        </div>
        <div class="reward-box">
          <div class="reward-icon">🍰</div>
          <div style="font-weight: bold; color: var(--text-main);">ฟรี เค้ก 1 ชิ้น</div>
          <div style="font-size: 12px; color: var(--text-light);">ใช้ 20 แต้ม</div>
          <button class="btn-redeem" style="background:#ccc;">แต้มไม่พอ</button>
        </div>
      </div>
    </div>

    <div id="view-history" class="view-section">
      <h2 style="color: var(--text-main); margin-top:0;">ประวัติย้อนหลัง</h2>
      <div style="background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden;">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
          <div><div style="font-weight:bold; color:var(--text-main);">☕ ได้รับแต้ม</div><div style="font-size:12px; color:var(--text-light);">18/06/26 14:30</div></div>
          <div style="color: #A3B18A; font-weight: 900; font-size: 18px;">+1</div>
        </div>
        <div style="padding: 15px; display: flex; justify-content: space-between;">
          <div><div style="font-weight:bold; color:var(--text-main);">🎁 แลกส่วนลด</div><div style="font-size:12px; color:var(--text-light);">10/06/26 09:15</div></div>
          <div style="color: #C57B57; font-weight: 900; font-size: 18px;">-10</div>
        </div>
      </div>
    </div>

    <div id="view-more" class="view-section">
      <h2 style="color: var(--text-main); margin-top:0;">เมนูร้านค้า</h2>
      <div style="background: white; border-radius: 16px; border: 1px solid var(--border); padding: 15px; display:flex; gap:10px; flex-direction:column;">
        <button style="padding:15px; border-radius:10px; border:1px solid #eee; background:#fafafa; text-align:left; font-size:16px; cursor:pointer;">🥤 เมนูเครื่องดื่ม</button>
        <button style="padding:15px; border-radius:10px; border:1px solid #eee; background:#fafafa; text-align:left; font-size:16px; cursor:pointer;">📍 แผนที่ร้าน</button>
        <button style="padding:15px; border-radius:10px; border:1px solid #eee; background:#fafafa; text-align:left; font-size:16px; cursor:pointer;">💬 ติดต่อพนักงาน</button>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <div id="nav-home" class="nav-item active" onclick="switchTab('home')">
      <span class="nav-icon">💳</span><span>หน้าหลัก</span>
    </div>
    <div id="nav-rewards" class="nav-item" onclick="switchTab('rewards')">
      <span class="nav-icon">🎁</span><span>แลกรางวัล</span>
    </div>
    <div id="nav-history" class="nav-item" onclick="switchTab('history')">
      <span class="nav-icon">📜</span><span>ประวัติ</span>
    </div>
    <div id="nav-more" class="nav-item" onclick="switchTab('more')">
      <span class="nav-icon">🥤</span><span>เมนู</span>
    </div>
  </nav>

  <script>
    // 🚀 ระบบเปลี่ยนแท็บ
    function switchTab(tabId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + tabId).classList.add('active');
      document.getElementById('nav-' + tabId).classList.add('active');
    }

    // 🚀 ระบบดักจับ URL Parameter ตอนโหลดหน้าเว็บ (Deep Linking)
    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const targetTab = urlParams.get('tab');
      // ถ้าระบุ tab มา ให้กระโดดไปหน้านั้นทันที ถ้าไม่ระบุให้โชว์หน้า home
      if (targetTab) {
        switchTab(targetTab);
      }
    };
  </script>
</body>
</html>
