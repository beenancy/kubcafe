<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>KUB Cafe</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap');
    
    :root {
      --bg-cream: #FAF6F0; /* Soft warm ivory/cream */
      --matcha: #556B2F; /* Rich Matcha Green */
      --matcha-light: #8FBC8F; /* Soft Sage Green */
      --matcha-dark: #3B4B27; /* Dark Forest/Espresso Green */
      --matcha-glow: rgba(85, 107, 47, 0.1); /* Soft green glow */
      --text-main: #3C332D; /* Espresso charcoal */
      --text-light: #9B8E85; /* Muted warm gray */
      --border: #ECE6DC; /* Soft warm borders */
      --card-bg: #FFFFFF;
      --accent-caramel: #C68B59; /* Accent for rewards/redeem */
      --accent-caramel-glow: rgba(198, 139, 89, 0.1);
      
      --shadow-sm: 0 4px 12px rgba(60, 51, 45, 0.03);
      --shadow-md: 0 8px 24px rgba(60, 51, 45, 0.06);
      --shadow-lg: 0 16px 36px rgba(60, 51, 45, 0.1);
    }
    
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      font-family: 'Prompt', 'Quicksand', sans-serif;
      background-color: #EFECE6;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
    }
    
    .app-container {
      width: 100%;
      max-width: 480px;
      height: 100%;
      background-color: var(--bg-cream);
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-cream);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: var(--matcha-dark);
      transition: opacity 0.4s ease, visibility 0.4s;
    }
    
    .loading-logo {
      font-size: 48px;
      margin-bottom: 16px;
      animation: bounce 2s infinite ease-in-out;
    }
    
    .spinner {
      border: 3px solid rgba(85, 107, 47, 0.1);
      border-left-color: var(--matcha);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      margin-bottom: 20px;
    }
    
    .loading-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      animation: pulse 1.5s infinite ease-in-out;
      font-family: 'Prompt', sans-serif;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    
    .app-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
    }
    
    .view-section {
      display: none;
      animation: slideUpFade 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      padding-bottom: 24px;
    }
    
    .view-section.active {
      display: flex;
      flex-direction: column;
    }
    
    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .header-title {
      font-size: 24px;
      font-weight: 700;
      margin: 8px 0 20px 0;
      color: var(--matcha-dark);
      text-align: center;
      letter-spacing: -0.5px;
    }
    
    .member-card {
      background: linear-gradient(135deg, #3B4B27, #556B2F);
      border-radius: 28px;
      padding: 28px 24px;
      color: white;
      text-align: center;
      box-shadow: var(--shadow-lg), inset 0 1px 1px rgba(255,255,255,0.15);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .member-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 70%);
      pointer-events: none;
    }
    
    .member-card::after {
      content: 'KUB CAFE';
      position: absolute;
      bottom: 16px;
      right: 24px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      opacity: 0.15;
      font-family: 'Quicksand', sans-serif;
    }
    
    .profile-pic {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.95);
      object-fit: cover;
      margin-bottom: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.12);
      transition: transform 0.3s ease;
    }
    
    .profile-pic:hover {
      transform: scale(1.05);
    }
    
    .welcome-msg {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 14px;
      line-height: 1.4;
    }
    
    .welcome-msg span {
      font-weight: 600;
      color: #FFF;
    }
    
    .points-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .points-number {
      font-family: 'Quicksand', sans-serif;
      font-size: 60px;
      font-weight: 700;
      line-height: 1;
      margin: 0;
      color: #FFF;
      text-shadow: 0 4px 8px rgba(0,0,0,0.08);
      letter-spacing: -1px;
    }
    
    .points-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 6px;
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .action-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .action-box:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    
    .action-box:active {
      transform: translateY(-1px) scale(0.97);
      box-shadow: var(--shadow-sm);
    }
    
    .action-icon {
      font-size: 38px;
      margin-bottom: 8px;
      transition: transform 0.3s ease;
    }
    
    .action-box:hover .action-icon {
      transform: scale(1.1) translateY(-2px);
    }
    
    .action-text {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.1px;
    }
    
    .action-box-scan {
      border-color: rgba(85, 107, 47, 0.15);
    }
    .action-box-scan:hover {
      background: #F3F6F1;
    }
    
    .action-box-redeem {
      border-color: rgba(198, 139, 89, 0.15);
    }
    .action-box-redeem:hover {
      background: #FAF4EE;
    }
    
    .section-container {
      margin-top: 8px;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-main);
    }
    
    .card-box {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px 16px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .card-box:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    
    .card-icon {
      font-size: 48px;
      margin-bottom: 10px;
      transition: transform 0.3s ease;
    }
    
    .card-box:hover .card-icon {
      transform: scale(1.1);
    }
    
    .btn-matcha {
      background: var(--matcha);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 16px;
      font-weight: 600;
      font-family: 'Prompt', sans-serif;
      margin-top: 16px;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(85, 107, 47, 0.15);
    }
    
    .btn-matcha:hover {
      background: var(--matcha-dark);
      box-shadow: 0 6px 16px rgba(85, 107, 47, 0.25);
    }
    
    .btn-matcha:active {
      transform: scale(0.96);
    }
    
    .btn-matcha.disabled, .btn-matcha:disabled {
      background: #EAE5DE !important;
      color: var(--text-light) !important;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    
    .list-container {
      background: var(--card-bg);
      border-radius: 24px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
    }
    
    .list-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.2s ease;
    }
    
    .list-item:hover {
      background-color: #FAF9F6;
    }
    
    .list-item:last-child {
      border-bottom: none;
    }
    
    /* Dynamic history styling overrides */
    .list-item > div:last-child {
      font-family: 'Quicksand', sans-serif !important;
      font-weight: 700 !important;
      font-size: 20px !important;
    }
    
    .list-item > div[style*="#A3B18A"] {
      color: var(--matcha) !important;
    }
    
    .list-item > div[style*="#C57B57"] {
      color: var(--accent-caramel) !important;
    }
    
    .coming-soon-box {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 48px 24px;
      text-align: center;
      border: 2px dashed var(--border);
      color: var(--matcha-dark);
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    
    .coming-soon-icon {
      font-size: 56px;
      margin-bottom: 16px;
      animation: rotateSlow 12s linear infinite;
    }
    
    @keyframes rotateSlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .coming-soon-title {
      margin: 0 0 6px 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--matcha-dark);
    }
    
    .coming-soon-subtitle {
      font-size: 14px;
      margin: 0;
      color: var(--text-light);
    }
    
    .btn-close-app {
      background: #EFECE6;
      color: var(--text-main);
      border: 1px solid var(--border);
      padding: 14px 20px;
      border-radius: 18px;
      font-weight: 600;
      font-family: 'Prompt', sans-serif;
      margin-top: 24px;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 15px;
    }
    
    .btn-close-app:hover {
      background: #E6E2DA;
    }
    
    .btn-close-app:active {
      transform: scale(0.97);
    }
    
    /* Bottom Navigation Bar */
    .bottom-nav {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      position: relative;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.02);
      z-index: 100;
    }
    
    .nav-item {
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      padding: 4px 8px;
      flex: 1;
      transition: all 0.3s ease;
      text-decoration: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    .nav-icon-wrapper {
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .nav-label {
      font-size: 10px;
      font-weight: 500;
      font-family: 'Prompt', sans-serif;
      transition: color 0.3s ease;
    }
    
    /* Active states via parent container state */
    .app-container:has(#view-home.active) .nav-home,
    .app-container:has(#view-rewards.active) .nav-rewards,
    .app-container:has(#view-history.active) .nav-history,
    .app-container:has(#view-menu.active) .nav-menu,
    .app-container:has(#view-promo.active) .nav-promo {
      color: var(--matcha-dark);
    }
    
    .app-container:has(#view-home.active) .nav-home .nav-icon-wrapper,
    .app-container:has(#view-rewards.active) .nav-rewards .nav-icon-wrapper,
    .app-container:has(#view-history.active) .nav-history .nav-icon-wrapper,
    .app-container:has(#view-menu.active) .nav-menu .nav-icon-wrapper,
    .app-container:has(#view-promo.active) .nav-promo .nav-icon-wrapper {
      background-color: var(--matcha-glow);
      color: var(--matcha-dark);
      transform: scale(1.1) translateY(-2px);
    }
    
    .app-container:has(#view-home.active) .nav-home .nav-label,
    .app-container:has(#view-rewards.active) .nav-rewards .nav-label,
    .app-container:has(#view-history.active) .nav-history .nav-label,
    .app-container:has(#view-menu.active) .nav-menu .nav-label,
    .app-container:has(#view-promo.active) .nav-promo .nav-label {
      font-weight: 700;
    }
    
    /* SweetAlert2 Elegant Theme Override */
    .swal2-container {
      z-index: 10000 !important;
    }
    .swal2-popup {
      border-radius: 28px !important;
      background-color: var(--bg-cream) !important;
      font-family: 'Prompt', sans-serif !important;
      border: 1px solid var(--border) !important;
      box-shadow: var(--shadow-lg) !important;
      padding: 30px 20px !important;
    }
    .swal2-title {
      color: var(--text-main) !important;
      font-weight: 700 !important;
      font-size: 20px !important;
    }
    .swal2-html-container {
      color: var(--text-light) !important;
      font-size: 14px !important;
      line-height: 1.6 !important;
    }
    .swal2-confirm {
      background-color: var(--matcha) !important;
      border-radius: 16px !important;
      font-weight: 600 !important;
      padding: 12px 30px !important;
      box-shadow: 0 4px 12px rgba(85, 107, 47, 0.2) !important;
      font-family: 'Prompt', sans-serif !important;
    }
    .swal2-confirm:focus {
      box-shadow: 0 0 0 3px rgba(85, 107, 47, 0.3) !important;
    }
    .swal2-cancel {
      background-color: #EFECE6 !important;
      color: var(--text-main) !important;
      border-radius: 16px !important;
      font-weight: 600 !important;
      padding: 12px 30px !important;
      font-family: 'Prompt', sans-serif !important;
      border: 1px solid var(--border) !important;
    }
    
    /* Custom Minimal SWAL classes matching app.html */
    .custom-swal-popup { width: 80% !important; max-width: 290px !important; background-color: #FFFFFF !important; box-shadow: 0 15px 35px rgba(140, 122, 107, 0.2) !important; overflow: hidden; }
    .swal-btn-confirm { font-size: 13px !important; padding: 9px 22px !important; border-radius: 20px !important; font-weight: 700; background-color: var(--matcha) !important; color: #ffffff !important; border: none !important; margin: 0 6px !important; cursor: pointer; box-shadow: 0 4px 10px rgba(163, 177, 138, 0.25) !important; transition: all 0.2s; }
    .swal-btn-confirm:active { transform: scale(0.97); }
    .swal-btn-cancel { font-size: 13px !important; padding: 9px 22px !important; border-radius: 20px !important; font-weight: 700; background-color: #F4F1EC !important; color: var(--text-main) !important; border: none !important; margin: 0 6px !important; cursor: pointer; transition: all 0.2s; }
    .swal-btn-cancel:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">กำลังเข้าสู่ระบบ...</div>
  </div>

  <div class="app-container">
    <div class="app-content">
      
      <div id="view-home" class="view-section active">
        <h2 class="header-title" id="txt-home-title">เช็กแต้ม</h2>
        
        <div class="member-card">
          <img id="userProfilePic" class="profile-pic" src="https://via.placeholder.com/70" alt="Profile">
          <div class="welcome-msg" id="txt-welcome">ยินดีต้อนรับคุณ <span id="userName">...</span></div>
          <div class="points-container">
            <div class="points-number"><span id="userPoints">0</span></div>
            <div class="points-label" id="txt-pts-label">คะแนนสะสม</div>
          </div>
        </div>
        
        <div class="grid-2">
          <div class="action-box action-box-scan" onclick="openQRScanner()">
            <div class="action-icon">📷</div>
            <div class="action-text" style="color: var(--matcha-dark);" id="txt-scan-btn">สแกนรับแต้ม</div>
          </div>
          <div class="action-box action-box-redeem" onclick="switchTab('rewards')">
            <div class="action-icon">🎁</div>
            <div class="action-text" style="color: var(--accent-caramel);" id="txt-go-reward-btn">แลกของรางวัล</div>
          </div>
        </div>
  
        <div class="section-container">
          <h3 class="section-title" id="txt-recent-history">ประวัติล่าสุด</h3>
          <div class="list-container" id="recentHistoryContainer"></div>
        </div>
  
        <button class="btn-close-app text-close-btn" onclick="liff.closeWindow()">กลับหน้าแชท (OK)</button>
      </div>
  
      <div id="view-rewards" class="view-section">
        <h2 class="header-title" id="txt-reward-title">แลกของรางวัล</h2>
        <div class="grid-2" id="rewardGridContainer"></div>
        <button class="btn-close-app text-close-btn" onclick="liff.closeWindow()">กลับหน้าแชท (OK)</button>
      </div>
  
      <div id="view-history" class="view-section">
        <h2 class="header-title" id="txt-history-title">ประวัติการใช้งาน</h2>
        <div class="list-container" id="historyContainer"></div>
        <button class="btn-close-app text-close-btn" onclick="liff.closeWindow()">กลับหน้าแชท (OK)</button>
      </div>
  
      <div id="view-menu" class="view-section">
        <h2 class="header-title" id="txt-menu-title">เมนูเครื่องดื่ม</h2>
        <div class="coming-soon-box">
          <div class="coming-soon-icon">🥤</div>
          <h3 class="coming-soon-title">Coming Soon</h3>
          <p class="coming-soon-subtitle" id="txt-cs-1">เตรียมพบกับเมนูใหม่เร็วๆ นี้</p>
        </div>
        <button class="btn-close-app text-close-btn" onclick="liff.closeWindow()">กลับหน้าแชท (OK)</button>
      </div>
  
      <div id="view-promo" class="view-section">
        <h2 class="header-title" id="txt-promo-title">โปรโมชั่นพิเศษ</h2>
        <div class="coming-soon-box">
          <div class="coming-soon-icon">📢</div>
          <h3 class="coming-soon-title">Coming Soon</h3>
          <p class="coming-soon-subtitle" id="txt-cs-2">โปรโมชั่นเด็ดๆ กำลังมา</p>
        </div>
        <button class="btn-close-app text-close-btn" onclick="liff.closeWindow()">กลับหน้าแชท (OK)</button>
      </div>
  
    </div>

    <!-- Modern Bottom Navigation Bar -->
    <nav class="bottom-nav">
      <button class="nav-item nav-home" onclick="switchTab('home')">
        <div class="nav-icon-wrapper">🏡</div>
        <span class="nav-label">หน้าแรก</span>
      </button>
      <button class="nav-item nav-rewards" onclick="switchTab('rewards')">
        <div class="nav-icon-wrapper">🎁</div>
        <span class="nav-label">แลกรางวัล</span>
      </button>
      <button class="nav-item nav-history" onclick="switchTab('history')">
        <div class="nav-icon-wrapper">📋</div>
        <span class="nav-label">ประวัติ</span>
      </button>
      <button class="nav-item nav-menu" onclick="switchTab('menu')">
        <div class="nav-icon-wrapper">🥤</div>
        <span class="nav-label">เมนู</span>
      </button>
      <button class="nav-item nav-promo" onclick="switchTab('promo')">
        <div class="nav-icon-wrapper">📢</div>
        <span class="nav-label">โปรโมชั่น</span>
      </button>
    </nav>
  </div>

  <script>
    const API_URL = "https://kub-backend-test.nan23082526.workers.dev";
    const LIFF_ID = "2010460841-oPhekHvX"; 

    let globalUserId = ""; let globalUserName = ""; let globalTotalPoints = 0; let globalLang = "TH";

    const i18n = {
      TH: {
        homeTitle: "เช็กแต้ม", ptsLabel: "คะแนนสะสม", welcome: "ยินดีต้อนรับคุณ ", 
        scanBtn: "สแกนรับแต้ม", goRewardBtn: "แลกของรางวัล", recentHistory: "ประวัติล่าสุด",
        rewardTitle: "แลกของรางวัล", btnRedeem: "แลกเลย", btnNoPts: "แต้มไม่พอ", 
        historyTitle: "ประวัติการใช้งาน", noHistory: "ไม่มีประวัติการใช้งาน",
        menuTitle: "เมนูเครื่องดื่ม", promoTitle: "โปรโมชั่นพิเศษ", 
        txtEarn: "ได้รับแต้ม", txtRedeem: "แลกรางวัล", txtEdit: "ปรับปรุงแต้ม", closeBtn: "กลับหน้าแชท (OK)",
        comingSoon1: "เตรียมพบกับเมนูใหม่เร็วๆ นี้", comingSoon2: "โปรโมชั่นเด็ดๆ กำลังมา",
        rewards: [
          { icon: "☕", name: "ส่วนลด 50%", req: "ใช้ 10 แต้ม", cost: 10, logName: "ส่วนลด 50% 1 แก้ว" },
          { icon: "🍰", name: "ฟรี เค้ก 1 ชิ้น", req: "ใช้ 20 แต้ม", cost: 20, logName: "ฟรีเค้ก 1 ชิ้น" }
        ]
      },
      EN: {
        homeTitle: "Check Points", ptsLabel: "Total Points", welcome: "Welcome, ", 
        scanBtn: "Scan QR", goRewardBtn: "Redeem Rewards", recentHistory: "Recent History",
        rewardTitle: "Redeem Rewards", btnRedeem: "Redeem", btnNoPts: "Not enough", 
        historyTitle: "Transaction History", noHistory: "No transactions yet",
        menuTitle: "Beverage Menu", promoTitle: "Special Promo", 
        txtEarn: "Points Earned", txtRedeem: "Redeemed", txtEdit: "Points Edited", closeBtn: "Back to Chat (OK)",
        comingSoon1: "New menus are coming very soon", comingSoon2: "Stay tuned for special offers",
        rewards: [
          { icon: "☕", name: "50% Discount", req: "10 Pts req.", cost: 10, logName: "ส่วนลด 50% 1 แก้ว" },
          { icon: "🍰", name: "Free 1 Cake", req: "20 Pts req.", cost: 20, logName: "ฟรีเค้ก 1 ชิ้น" }
        ]
      }
    };

    function safeSetText(id, text) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = text;
    }

    async function initApp() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const profile = await liff.getProfile();
        globalUserId = profile.userId; globalUserName = profile.displayName;
        document.getElementById('userProfilePic').src = profile.pictureUrl || "https://via.placeholder.com/70";

        const currentUrl = window.location.href.toLowerCase();
        let targetTab = 'home'; 
        if (currentUrl.includes('tab=rewards')) targetTab = 'rewards';
        else if (currentUrl.includes('tab=history')) targetTab = 'history';
        else if (currentUrl.includes('tab=menu') || currentUrl.includes('tab=more')) targetTab = 'menu';
        else if (currentUrl.includes('tab=promo')) targetTab = 'promo';
        
        switchTab(targetTab); 
        await fetchMemberData();

        document.getElementById('loading-overlay').style.opacity = "0";
        setTimeout(() => document.getElementById('loading-overlay').style.display = "none", 400);
      } catch (err) { Swal.fire({ icon: 'error', title: 'Error', text: 'ไม่สามารถเชื่อมต่อ LINE ได้' }); }
    }

    async function fetchMemberData() {
      try {
        const fetchUrl = `${API_URL}/api/get-member?userId=${globalUserId}&t=${Date.now()}`;
        const res = await fetch(fetchUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bypassCache: true })
        }); 
        const result = await res.json();
        
        if (result.status === "success") {
          globalTotalPoints = result.data.totalPoints;
          globalLang = result.data.lang || "TH"; 
          document.getElementById('userPoints').innerText = globalTotalPoints;
          
          let historyData = result.data.history || [];
          historyData.sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());

          applyLanguage(); 
          renderHistory(historyData); 
        }
      } catch (err) { console.error("Fetch Data Error:", err); }
    }

    function applyLanguage() {
      try {
        const t = i18n[globalLang];
        safeSetText('txt-home-title', t.homeTitle);
        safeSetText('txt-pts-label', t.ptsLabel);
        safeSetText('txt-welcome', `${t.welcome} <span style="font-weight:bold;">${globalUserName}</span>`);
        safeSetText('txt-scan-btn', t.scanBtn);
        safeSetText('txt-go-reward-btn', t.goRewardBtn);
        safeSetText('txt-recent-history', t.recentHistory);
        
        safeSetText('txt-reward-title', t.rewardTitle);
        safeSetText('txt-history-title', t.historyTitle);
        safeSetText('txt-menu-title', t.menuTitle);
        safeSetText('txt-promo-title', t.promoTitle);

        safeSetText('txt-cs-1', t.comingSoon1); 
        safeSetText('txt-cs-2', t.comingSoon2); 
        
        document.querySelectorAll('.text-close-btn').forEach(el => el.innerText = t.closeBtn);
        
        let rewardHtml = "";
        t.rewards.forEach(rw => {
          const isEnough = globalTotalPoints >= rw.cost;
          const btnClass = isEnough ? "btn-matcha" : "btn-matcha disabled";
          const btnAttr = isEnough ? `onclick="redeemPoints(${rw.cost}, '${rw.logName}', '${rw.name}')"` : "disabled";
          const btnText = isEnough ? t.btnRedeem : t.btnNoPts;
          
          rewardHtml += `
            <div class="card-box">
              <div class="card-icon">${rw.icon}</div>
              <div style="font-weight: 600; font-size: 15px;">${rw.name}</div>
              <div style="font-size: 12px; color: var(--text-light); margin-top: 5px;">${rw.req}</div>
              <button class="${btnClass}" ${btnAttr}>${btnText}</button>
            </div>
          `;
        });
        document.getElementById('rewardGridContainer').innerHTML = rewardHtml;
      } catch (err) { console.error(err); }
    }

    function renderHistory(historyArr) {
      try {
        const fullContainer = document.getElementById('historyContainer');
        const recentContainer = document.getElementById('recentHistoryContainer');
        const t = i18n[globalLang];
        
        if (!historyArr || historyArr.length === 0) {
          const emptyHtml = `<div style="padding: 30px; text-align: center; color: var(--text-light); font-size:14px;">${t.noHistory}</div>`;
          fullContainer.innerHTML = emptyHtml;
          if(recentContainer) recentContainer.innerHTML = emptyHtml;
          return;
        }

        let fullHtml = "";
        let recentHtml = "";

        historyArr.forEach((item, index) => {
          const d = new Date(item.timestamp);
          const dateStr = d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
          
          let icon = "☕"; let title = t.txtEarn; let ptsText = `+${item.points}`; let ptsColor = "#A3B18A";
          if (item.type === "redeem") { icon = "🎁"; title = t.txtRedeem; ptsText = `-${item.points}`; ptsColor = "#C57B57"; }
          else if (item.type === "edit") { icon = "⚙️"; title = t.txtEdit; ptsText = item.points > 0 ? `+${item.points}` : item.points; }

          const itemHtml = `
            <div class="list-item">
              <div><div style="font-weight:600; font-size:14px; color:var(--text-main);">${icon} ${title}</div><div style="font-size:11px; color:var(--text-light); margin-top:3px;">${dateStr}</div></div>
              <div style="color: ${ptsColor}; font-weight: 700; font-size: 18px;">${ptsText}</div>
            </div>
          `;
          
          fullHtml += itemHtml;
          if(index < 3) { recentHtml += itemHtml; }
        });
        
        fullContainer.innerHTML = fullHtml;
        if(recentContainer) recentContainer.innerHTML = recentHtml;

      } catch (err) { console.error(err); }
    }

    async function redeemPoints(pointsNeeded, logName, displayRewardName) {
      if (globalTotalPoints < pointsNeeded) return;
      
      const txtConfirm = globalLang === "EN" ? `Confirm to use ${pointsNeeded} PTS for ${displayRewardName}?` : `ยืนยันใช้ ${pointsNeeded} แต้ม เพื่อแลก ${displayRewardName}?`;
      const txtYes = globalLang === "EN" ? "Yes, Redeem" : "ยืนยันแลกเลย";
      const txtNo = globalLang === "EN" ? "Cancel" : "ยกเลิก";

      const confirmHtml = `
        <div style="text-align: center; padding: 10px 0 5px 0;">
          <div style="display: flex; justify-content: center; margin-bottom: 14px;">
            <div style="width: 56px; height: 56px; border-radius: 50%; background: #FFF5EB; display: flex; justify-content: center; align-items: center;">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#C57B57" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 12 20 22 4 22 4 12"></polyline>
                <rect x="2" y="7" width="20" height="5"></rect>
                <line x1="12" y1="22" x2="12" y2="7"></line>
                <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
                <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
              </svg>
            </div>
          </div>
          <div style="color: #4A3F35; font-size: 17px; font-weight: 800; margin-bottom: 6px;">${globalLang === "EN" ? 'Confirm?' : 'ยืนยันการแลก?'}</div>
          <div style="color: #6B705C; font-size: 14px; line-height: 1.4; margin-bottom: 5px;">${txtConfirm}</div>
        </div>
      `;

      const confirmResult = await Swal.fire({
        html: confirmHtml,
        showCancelButton: true,
        confirmButtonText: txtYes, cancelButtonText: txtNo, reverseButtons: true,
        customClass: { popup: 'custom-swal-popup', confirmButton: 'swal-btn-confirm', cancelButton: 'swal-btn-cancel' },
        buttonsStyling: false
      });

      if (!confirmResult.isConfirmed) return;

      Swal.fire({ title: globalLang === "EN" ? 'Processing...' : 'กำลังดำเนินการ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }, customClass: { popup: 'custom-swal-popup' } });

      try {
        const res = await fetch(`${API_URL}/api/redeem-reward`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: globalUserId, customerName: globalUserName, pointsUsed: pointsNeeded, rewardName: logName })
        });
        const data = await res.json();
        
        if (data.status === "success") {
          const successHtml = `
            <div style="text-align: center; padding: 10px 0 5px 0;">
              <div style="display: flex; justify-content: center; margin-bottom: 14px;">
                <div style="width: 56px; height: 56px; border-radius: 50%; background: #EAF0E4; display: flex; justify-content: center; align-items: center;">
                  <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#7A8B62" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                  </svg>
                </div>
              </div>
              <div style="color: #7A8B62; font-size: 17px; font-weight: 800; margin-bottom: 6px;">${globalLang === "EN" ? 'Success!' : 'แลกรางวัลสำเร็จ!'}</div>
              <div style="color: #6B705C; font-size: 13px; line-height: 1.4; margin-bottom: 15px;">${globalLang === "EN" ? 'Please show this screen to staff.' : 'โปรดแสดงหน้าจอนี้ให้พนักงาน'}</div>
              <div style="background: #FFFBF5; border: 1.5px dashed #A3B18A; border-radius: 12px; padding: 12px; color: #4A3F35; font-weight: 800; font-size: 18px; letter-spacing: 1px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
                ${data.refCode}
              </div>
            </div>
          `;

          Swal.fire({
            html: successHtml,
            customClass: { popup: 'custom-swal-popup', confirmButton: 'swal-btn-confirm' },
            buttonsStyling: false, confirmButtonText: 'OK'
          }).then(() => {
            switchTab('home'); 
          });
          await fetchMemberData(); 
        } else { Swal.fire({ icon: 'error', title: 'Failed', text: data.message, confirmButtonColor: '#C57B57' }); }
      } catch (err) { Swal.fire({ icon: 'error', title: 'Network Error', confirmButtonColor: '#C57B57' }); }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      const targetView = document.getElementById('view-' + tabId);
      if (targetView) { targetView.classList.add('active'); } 
      else { document.getElementById('view-home').classList.add('active'); }
      window.scrollTo(0, 0); 
    }

    // ฟังก์ชันนี้แหละครับที่เป็นพระเอก! สั่งให้สแกนแล้วพาวาร์ปไปลิงก์ที่ซ่อนอยู่ในคิวอาร์โค้ด
    function openQRScanner() {
      if (liff.isApiAvailable('scanCodeV2')) { 
        liff.scanCodeV2().then(result => {
          if (result && result.value) {
            window.location.href = result.value; 
          }
        }).catch(err => { console.log(err); }); 
      } else { 
        window.location.href = "https://line.me/R/nv/QRCodeReader"; 
      }
    }

    window.onload = initApp;
  </script>
</body>
</html>
