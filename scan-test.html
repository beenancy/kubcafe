<!-- 
======================================================
KUB Cafe - Customer Scan Frontend (V.4.5 MASTER)
Changelog: Extreme Minimal UI, Button Countdown, Enforce Deep Link, Add Haptic Feedback
======================================================
-->
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>KUB Cafe - Scan</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #FDFCF0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    .loader { border: 4px solid #E8E2D9; border-left-color: #A3B18A; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .text { color: #A3B18A; font-weight: bold; font-size: 16px; }
    
    /* 🎨 Extreme Minimal Popup Styling (Uniform Size) */
    .swal2-popup { border-radius: 20px !important; font-family: 'Prompt', sans-serif !important; padding: 1.2em 1em !important; }
    .custom-swal-popup { width: 75% !important; max-width: 280px !important; background-color: #FFFFFF !important; box-shadow: 0 10px 25px rgba(140, 122, 107, 0.15) !important; overflow: hidden; }
    .matcha-btn { font-size: 14px !important; padding: 12px 24px !important; border-radius: 12px !important; font-weight: 600 !important; background-color: #A3B18A !important; color: #ffffff !important; border: none !important; width: 100% !important; margin-top: 10px !important;}
    .warning-btn { background-color: #C57B57 !important; }
  </style>
</head>
<body>

  <div class="loader" id="spinner"></div>
  <div class="text" id="statusText">กำลังประมวลผลรับแต้ม...</div>
  <audio id="dingSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

  <script>
    const API_URL = "https://kub-backend-test.nan23082526.workers.dev";
    const SCAN_LIFF_ID = "2010460841-1So0N2Jn"; 

    function redirectToMemberApp() {
      // เด้งกลับไปไฟล์ app-test.html
      window.location.replace("https://beenancy.github.io/kubcafe/app-test.html?tab=home&nocache=" + new Date().getTime());
    }

    // 🚀 ฟังก์ชันกระชากเข้า LINE OA แบบบังคับ 100%
    function closeAppAndGoToLINE() {
      window.location.href = "https://line.me/R/ti/p/@848dmzja";
    }

    // 🎨 ปรับโฉมหน้าต่างแจ้งเตือนข้อผิดพลาด/สแกนซ้ำ ให้มินิมอลและสั้นกะทัดรัด
    async function showAlert(title, text, icon, btnText, isWarning = false) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('statusText').style.display = 'none';
      
      let emoji = "&#128276;";
      if (icon === "error") emoji = "&#10060;";
      if (icon === "warning") emoji = "&#9888;&#65039;";

      const alertHtml = `
        <div style="text-align: center; padding: 10px 0 5px 0;">
          <div style="font-size: 42px; margin-bottom: 10px; line-height: 1;">${emoji}</div>
          <div style="color: #4A3F35; font-size: 18px; font-weight: 800; margin-bottom: 6px;">${title}</div>
          <div style="color: #6B705C; font-size: 14px; line-height: 1.4; margin-bottom: 5px;">${text}</div>
        </div>
      `;

      await Swal.fire({
        html: alertHtml,
        customClass: { popup: 'custom-swal-popup', confirmButton: isWarning ? 'matcha-btn warning-btn' : 'matcha-btn' },
        allowOutsideClick: false, confirmButtonText: btnText, buttonsStyling: false 
      });
      closeAppAndGoToLINE(); 
    }

    // 🎨 ปรับโฉมหน้าต่างคูลดาวน์ (หน่วงเวลาสแกนซ้ำ) ให้เป็นทรงสั้นแบบกล่องจัตุรัส เท่ากับหน้าต่างสำเร็จ
    async function showCooldownCountdown(remainSec, lang) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('statusText').style.display = 'none';
      let currentRemain = remainSec; let countdownInterval; const isEN = lang === "EN";
      
      const cooldownHtml = `
        <div style="text-align: center; padding: 10px 0 5px 0;">
          <div style="font-size: 42px; margin-bottom: 10px; line-height: 1;">&#9201;&#65039;</div>
          <div style="color: #C57B57; font-size: 18px; font-weight: 800; margin-bottom: 6px;">${isEN ? 'Wait a moment' : 'ใจเย็นๆ น้า'}</div>
          <div style="color: #6B705C; font-size: 14px; margin-bottom: 2px;">
            ${isEN ? 'Next scan available in' : 'สแกนรอบถัดไปได้ในอีก'}
          </div>
          <div style="margin-bottom: 5px;">
            <span style="font-size: 36px; font-weight: 900; color: #C57B57;" id="cd-timer">${currentRemain}</span>
            <span style="font-size: 14px; color: #B0A69D; font-weight: 600; margin-left: 2px;">${isEN ? 'sec' : 'วิ'}</span>
          </div>
        </div>
      `;

      await Swal.fire({
        html: cooldownHtml,
        customClass: { popup: 'custom-swal-popup', confirmButton: 'matcha-btn warning-btn' },
        allowOutsideClick: false, showConfirmButton: true, confirmButtonText: isEN ? 'OK' : 'ตกลง', buttonsStyling: false,
        didOpen: () => {
          const timerSpan = document.getElementById('cd-timer');
          countdownInterval = setInterval(() => {
            currentRemain--;
            if (timerSpan) timerSpan.innerText = currentRemain;
            if (currentRemain <= 0) { clearInterval(countdownInterval); if (timerSpan) timerSpan.innerText = "0"; }
          }, 1000);
        },
        willClose: () => { clearInterval(countdownInterval); }
      });
      closeAppAndGoToLINE(); 
    }

    async function processPoints() {
      try {
        if (!navigator.onLine) { await showAlert('ไม่มีเน็ต', 'กรุณาเช็กอินเทอร์เน็ตค่ะ', 'error', 'ตกลง', true); return; }
        await liff.init({ liffId: SCAN_LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
        
        const urlParams = new URLSearchParams(window.location.search);
        const shopCode = urlParams.get('code');
        if (!shopCode) { await showAlert('ไม่พบข้อมูล', '&#10060; สแกนผิดวิธีค่ะ', 'error', 'ตกลง', true); return; }
        
        const profile = await liff.getProfile();
        const cleanedName = encodeURIComponent((profile.displayName || '').replace(/[-]|[-]|[-]|[‑-⛿]|[-]/g, ''));
        
        const response = await fetch(`${API_URL}?action=scanAddPoint&userId=${profile.userId}&name=${cleanedName}&shopCode=${encodeURIComponent(shopCode)}`);
        const data = await response.json();
        const isEN = data.lang === "EN";
        
        if (data.status === "success") {
          // 📳 ระบบเสียงและระบบสั่นตอบสนอง (Haptic Feedback) เพื่อความพรีเมียม
          try { document.getElementById('dingSound').play().catch(()=>{}); } catch(e) {}
          try { if (navigator.vibrate) navigator.vibrate(200); } catch(e) {}

          // ✨ Extreme Minimal Custom HTML (Tight Compact layout)
          const minimalHtml = `
            <div style="text-align: center; padding: 10px 0 5px 0;">
              <div style="display: flex; align-items: flex-end; justify-content: center; gap: 5px; margin-bottom: 15px;">
                <span style="font-size: 32px; line-height: 1; margin-bottom: -4px;">&#9749;</span>
                <span style="color: #A3B18A; font-size: 56px; font-weight: 900; line-height: 1;">+${data.ptsAdded}</span>
                <span style="color: #A3B18A; font-size: 14px; font-weight: 600; padding-bottom: 5px;">${isEN ? 'PTS' : 'แต้ม'}</span>
              </div>
              <div style="background: #FDFCF0; border: 1px solid #E8E2D9; border-radius: 12px; padding: 8px 12px; display: inline-block; font-size: 14px; color: #4A3F35; margin-bottom: 10px;">
                ${isEN ? 'Total Points:' : 'คะแนนสะสมรวม:'} <span style="color: #E65100; font-size: 17px; font-weight: 900; margin-left: 4px;">${data.totalPts}</span>
              </div>
              <div style="font-size: 12px; font-weight: 600; color: #A3B18A; border-top: 1px dashed #E8E2D9; padding-top: 12px; margin-top: 5px;">
                ${isEN ? 'Loading Member App...' : 'กำลังพาท่านเข้าสู่หน้าเช็กแต้ม...'}
              </div>
            </div>
          `;
          
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('statusText').style.display = 'none';
          
          Swal.fire({
            html: minimalHtml,
            showConfirmButton: true, 
            confirmButtonText: isEN ? 'Go to App' : 'เข้าสู่หน้าเช็กแต้ม',
            customClass: { popup: 'custom-swal-popup', confirmButton: 'matcha-btn' },
            buttonsStyling: false, 
            timer: 2500, 
            timerProgressBar: true,
            allowOutsideClick: false,
          }).then(() => { 
            redirectToMemberApp(); 
          });

        } else if (data.status === "cooldown") {
          await showCooldownCountdown(data.remain || 30, data.lang);
        } else {
          await showAlert(isEN ? 'Scan Failed' : 'สแกนไม่สำเร็จ', `${data.message}`, 'error', isEN ? 'OK' : 'ตกลง', true);
        }
      } catch (err) { 
        await showAlert('ระบบขัดข้อง', 'กรุณาสแกนใหม่ค่ะ', 'error', 'ตกลง', true);
      }
    }
    
    document.addEventListener("DOMContentLoaded", processPoints);
  </script>
</body>
</html>
