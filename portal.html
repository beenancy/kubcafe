<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KUB Cafe App</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#A3B18A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KUB Cafe">

  <style>
    :root { --bg-color: #FDFCF0; --text-main: #4A3F35; --primary-matcha: #A3B18A; --matcha-dark: #7A8B62; --accent-brick: #C57B57; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background-color: var(--bg-color); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    .hub-container { background: #FFFFFF; padding: 40px 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(140, 122, 107, 0.1); text-align: center; width: 85%; max-width: 400px; }
    .logo-text { font-size: 32px; font-weight: 900; color: var(--primary-matcha); margin: 0 0 5px 0; letter-spacing: 2px; }
    .sub-text { font-size: 14px; color: #B0A69D; margin-bottom: 30px; }
    
    .btn-menu { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 20px; border-radius: 16px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; box-sizing: border-box; margin-bottom: 15px; }
    .btn-menu:active { transform: scale(0.97); }
    
    .btn-pos { background-color: var(--primary-matcha); color: white; box-shadow: 0 8px 20px rgba(163, 177, 138, 0.4); }
    .btn-manager { background-color: #4A3F35; color: white; box-shadow: 0 8px 20px rgba(74, 63, 53, 0.3); }
    .btn-icon { font-size: 28px; margin-bottom: 5px; }
    
    .install-hint { margin-top: 25px; font-size: 12px; color: #C57B57; background: #FAE5D3; padding: 10px; border-radius: 10px; display: none; }
  </style>
</head>
<body>

  <div class="hub-container">
    <div class="logo-text">KUB CAFE</div>
    <div class="sub-text">Enterprise Operating System</div>

    <a href="admin.html" class="btn-menu btn-pos">
      <span class="btn-icon">☕</span>
      เครื่อง POS (บาริสต้า)
    </a>

    <a href="manager.html" class="btn-menu btn-manager">
      <span class="btn-icon">📊</span>
      ระบบจัดการ (ผู้จัดการ)
    </a>
    
    <div id="install-hint" class="install-hint">
      💡 <b>เคล็ดลับ:</b> กดปุ่ม "Share" แล้วเลือก "Add to Home Screen" เพื่อติดตั้งเป็นแอปพลิเคชัน
    </div>
  </div>

  <script>
    // สั่งให้ Service Worker ทำงานเพื่อปลดล็อกฟีเจอร์ PWA (ติดตั้งเป็นแอปได้)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('Service Worker Registered!', reg);
        }).catch(err => {
          console.log('Service Worker Failed!', err);
        });
      });
    }

    // ตรวจสอบว่าเปิดผ่านเว็บปกติ หรือเปิดผ่านแอปที่ติดตั้งแล้ว
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (!isStandalone) {
      // ถ้าเปิดใน Safari/Chrome ปกติ ให้โชว์คำแนะนำวิธีติดตั้งแอป
      document.getElementById('install-hint').style.display = 'block';
    }
  </script>
</body>
</html>
